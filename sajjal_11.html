    ${list.map(o=>{
      const days=daysInWarehouse(o);
      const dayColor=days>=25?'#C0392B':(days>=15?'#B8860B':'#2F7A4D');
      return`<tr data-id="${o.id}" class="wh-row" style="cursor:pointer;">
      <td data-label="موقع التسكين"><span class="wh-loc-badge">${escapeHtml(o.placementLocation)}</span></td>
      <td data-label="رقم السند"><span class="receipt-display" style="color:#C0392B;font-weight:800;">${formatReceiptNoHtml(o.receiptNo||'—')}</span>${daysWithoutMfgBadge(o)}</td>
      <td data-label="العميل"><strong style="color:#C0392B;">${escapeHtml(o.customerName||'—')}</strong></td>
      <td data-label="نوع التمر">${escapeHtml(o.dateType||'—')}</td>
      <td data-label="الكمية المستلمة">${qtyReceivedHtml(o)}</td>
      <td data-label="الكمية المصنعة">${canEditQtyMfg()?qtyMfgEditableHtml(o):qtyMfgDisplayHtml(o)}</td>
      <td data-label="عدد أيام التخزين"><strong style="color:${dayColor};">${days} يوم</strong>${days>=25?' 🔴':(days>=15?' 🟡':'')}</td>
      <td data-label="واتساب">${whatsAppCellHtml(o)}</td>
    </tr>`;}).join('')}
    </tbody></table>
  </div></div>`}
  `;
}

/* ============== production ============== */
function renderProduction(view){
  const type=PROD_VIEW_LABELS[view];
  const allOrders=sortedOrders(state.orders.filter(o=>o.processingType===type));
  const canEdit=canEditProductionView(view);
  const showPlacement=view==='vacuum';
  const pf=((state.productionFilter||{})[view])||'all';
  let filteredByStatus=allOrders;
  if(pf==='remaining')filteredByStatus=allOrders.filter(o=>o.status!=='تم التسليم');
  else if(pf==='delivered')filteredByStatus=allOrders.filter(o=>o.status==='تم التسليم');
  else if(pf==='urgent')filteredByStatus=allOrders.filter(o=>o.urgent&&o.status!=='تم التسليم');
  else if(pf==='overdue')filteredByStatus=allOrders.filter(o=>isOverdue(o));
  else if(pf==='nearing')filteredByStatus=allOrders.filter(o=>isNearingDelay(o));
  const term=((state.productionSearchTerm||{})[view]||'').trim().toLowerCase();
  const orders=term?filteredByStatus.filter(o=>
    (o.receiptNo||'').toLowerCase().includes(term)||
    (o.customerName||'').toLowerCase().includes(term)||
    (o.mobile||'').includes(term)
  ):filteredByStatus;
  const searchInputId='prod-search-'+view;
  const totalHere=allOrders.length;
  const deliveredHere=allOrders.filter(o=>o.status==='تم التسليم').length;
  const remainingHere=totalHere-deliveredHere;
  const pendingHere=allOrders.filter(o=>o.status!=='تم التسليم'&&!(o.qtyMfg||'').toString().trim()).length;
  const urgentHere=allOrders.filter(o=>o.urgent&&o.status!=='تم التسليم').length;
  const overdueHere=allOrders.filter(o=>isOverdue(o)).length;
  const nearingHere=allOrders.filter(o=>isNearingDelay(o)).length;

  return`
  <div class="page-head">
    <div><h1 class="page-title" style="color:var(--accent)">خط ${type}</h1>
    <div class="page-desc">${canEdit?`تحديث الحالة والملاحظات لطلبات "${type}"`:`عرض طلبات "${type}"`}</div></div>
    <div class="toolbar">
      <span class="last-sync">آخر تحديث: ${state.lastSync||'—'}</span>
      <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ تحديث</button>
    </div>
  </div>
  ${pf==='remaining'?`<div class="filter-banner filter-nearing">📋 عرض الطلبات المتبقية (غير المسلَّمة) فقط — <button class="btn-clear-filter" id="btn-clear-prod-filter" data-view="${view}">× مسح الفلتر</button></div>`:''}
  ${pf==='delivered'?`<div class="filter-banner filter-nearing">✅ عرض الطلبات المسلَّمة فقط — <button class="btn-clear-filter" id="btn-clear-prod-filter" data-view="${view}">× مسح الفلتر</button></div>`:''}
  ${pf==='urgent'?`<div class="filter-banner filter-urgent">⚡ عرض الطلبات المستعجلة (غير المسلَّمة) فقط — <button class="btn-clear-filter" id="btn-clear-prod-filter" data-view="${view}">× مسح الفلتر</button></div>`:''}
  ${pf==='overdue'?`<div class="filter-banner filter-urgent">⚠️ عرض الطلبات المتأخرة فقط — <button class="btn-clear-filter" id="btn-clear-prod-filter" data-view="${view}">× مسح الفلتر</button></div>`:''}
  ${pf==='nearing'?`<div class="filter-banner filter-nearing">🟡 عرض الطلبات القريبة من التأخير فقط — <button class="btn-clear-filter" id="btn-clear-prod-filter" data-view="${view}">× مسح الفلتر</button></div>`:''}

  <div class="stats">
    <div class="stat-chip" style="cursor:pointer;" id="stat-chip-total-prod" data-view="${view}"><span class="stat-num">${totalHere}</span><span class="stat-label">إجمالي الطلبات</span></div>
    <div class="stat-chip" style="border-color:#2F7A4D;cursor:pointer;" id="stat-chip-delivered-prod" data-view="${view}"><span class="stat-num">${deliveredHere}</span><span class="stat-label">تم التسليم</span></div>
    <div class="chip-wrap"><div class="stat-chip" style="border-color:#B8860B;cursor:pointer;" id="stat-chip-remaining-prod" data-view="${view}"><span class="stat-num">${remainingHere}</span><span class="stat-label">المتبقي</span></div>${chipHintLabel('اختر هذا الفلتر دائمًا')}</div>

    <div class="chip-wrap">${chipAlertIcon(nearingHere,'yellow')}<div class="stat-chip" style="border-color:#B8860B;cursor:pointer;" id="stat-chip-nearing-prod" data-view="${view}"><span class="stat-num">${nearingHere}</span><span class="stat-label">قربت على التأخير</span></div></div>

      <td data-label="التاريخ"><span class="mono" style="font-weight:700;">${formatDate(o.date)}</span>${isOverdue(o)?` <span style="color:#C0392B;font-size:10px;font-weight:700;">متأخر</span>`:(isNearingDelay(o)?` <span style="color:#8A6500;font-size:10px;font-weight:700;">🟡 قرّب يتأخر</span>`:'')}</td>
      <td data-label="رقم السند"><span class="receipt-display">${formatReceiptNoHtml(o.receiptNo)}</span>${daysWithoutMfgBadge(o)}</td>
      <td data-label="العميل"><strong>${escapeHtml(o.customerName)}</strong><br><span class="mono" style="font-size:11px;color:var(--ink-soft)">${escapeHtml(o.mobile||'')}</span></td>
      <td data-label="نوع التمر">${escapeHtml(o.dateType||'—')}</td>
      <td data-label="الكمية المستلمة">${qtyReceivedHtml(o)}</td>
      <td data-label="حجم العبوة">${escapeHtml(o.packageSize||'—')}</td>
      <td data-label="حجم الكرتون">${escapeHtml(o.cartonSize||'—')}</td>

        :(showPlacement?`<td data-label="الخدمات الإضافية">—</td>`:'')}

/* ============== services page ============== */
function renderServices(){
  const canManage=isAdmin();
  const allList=[...state.serviceOrders].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const filterVal=state.servicesFilter||'all';
  const sf=state.servicesStatusFilter||'all';
  /* خدمات الفاكيوم/العملاء = لها رقم سند أو مرجع — خدمات أخرى للشركة = بدون رقم سند */
  const hasReceipt=so=>!!((so.receiptNo||'').trim());
  const isDone=so=>!!((so.qtyMfg||'').toString().trim());
  /* متأخر / قرّب على التأخير — بنفس منطق الطلبات (25 يوم) لكن بالاعتماد على "تم تصنيعه" بدل حالة التسليم */
  const svcDaysSince=so=>so.date?Math.floor((Date.now()-new Date(so.date).getTime())/(1000*60*60*24)):null;
  const svcIsOverdue=so=>{ const d=svcDaysSince(so); return d!==null&&!isDone(so)&&d>25; };
  const svcIsNearing=so=>{ const d=svcDaysSince(so); return d!==null&&!isDone(so)&&d>=18&&d<=25; };
  const byType=filterVal==='all'?allList:(filterVal==='auto'?allList.filter(hasReceipt):allList.filter(so=>!hasReceipt(so)));
  let list=byType;
  if(sf==='done')list=byType.filter(isDone);
  else if(sf==='pending')list=byType.filter(so=>!isDone(so));
  else if(sf==='urgent')list=byType.filter(so=>so.urgent&&!isDone(so));
  else if(sf==='overdue')list=byType.filter(svcIsOverdue);
  else if(sf==='nearing')list=byType.filter(svcIsNearing);
  const autoCount=allList.filter(hasReceipt).length;
  const manualCount=allList.length-autoCount;
  const doneCount=allList.filter(isDone).length;
  const pendingCount=allList.length-doneCount;
  const urgentCount=allList.filter(so=>so.urgent&&!isDone(so)).length;
  const overdueCount=allList.filter(svcIsOverdue).length;
  const nearingCount=allList.filter(svcIsNearing).length;
  return`
  <div class="page-head">
    <div><h1 class="page-title" style="color:#7B2FBE;">🟣 الخدمات الإضافية</h1><div class="page-desc">خدمات الفاكيوم وخدمات أخرى للشركات</div></div>
    <div class="toolbar">
      <span class="last-sync">آخر تحديث: ${state.lastSync||'—'}</span>
      <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ تحديث</button>
      ${canManage?`<button class="btn btn-primary" id="btn-add-service" style="background:#7B2FBE;">+ خدمات أخرى للشركة</button>`:''}
    </div>
  </div>
  ${sf==='done'?`<div class="filter-banner filter-nearing">✅ عرض الخدمات التي تم تصنيعها فقط — <button class="btn-clear-filter" id="btn-clear-services-status-filter">× مسح الفلتر</button></div>`:''}
  ${sf==='pending'?`<div class="filter-banner filter-nearing">📋 عرض الخدمات المتبقية (لم تُصنّع بعد) فقط — <button class="btn-clear-filter" id="btn-clear-services-status-filter">× مسح الفلتر</button></div>`:''}
  ${sf==='urgent'?`<div class="filter-banner filter-urgent">⚡ عرض الخدمات المستعجلة (لم تُصنّع بعد) فقط — <button class="btn-clear-filter" id="btn-clear-services-status-filter">× مسح الفلتر</button></div>`:''}
  ${sf==='overdue'?`<div class="filter-banner filter-urgent">⚠️ عرض الخدمات المتأخرة فقط — <button class="btn-clear-filter" id="btn-clear-services-status-filter">× مسح الفلتر</button></div>`:''}
  ${sf==='nearing'?`<div class="filter-banner filter-nearing">🟡 عرض الخدمات القريبة من التأخير فقط — <button class="btn-clear-filter" id="btn-clear-services-status-filter">× مسح الفلتر</button></div>`:''}

  <div class="stats">
    <div class="stat-chip" style="cursor:pointer;" id="stat-chip-total-services"><span class="stat-num">${allList.length}</span><span class="stat-label">إجمالي الخدمات</span></div>
    <div class="stat-chip" style="border-color:#1B6E62;"><span class="stat-num">${autoCount}</span><span class="stat-label">خدمات العملاء (لها رقم سند)</span></div>
    <div class="stat-chip" style="border-color:#7B2FBE;"><span class="stat-num">${manualCount}</span><span class="stat-label">خدمات أخرى للشركة</span></div>
    <div class="stat-chip" style="border-color:#2F7A4D;cursor:pointer;" id="stat-chip-services-done"><span class="stat-num">${doneCount}</span><span class="stat-label">تم تصنيعه</span></div>
    <div class="chip-wrap"><div class="stat-chip" style="border-color:#B8860B;cursor:pointer;" id="stat-chip-services-pending"><span class="stat-num">${pendingCount}</span><span class="stat-label">المتبقي</span></div>${chipHintLabel('اختر هذا الفلتر دائمًا')}</div>
    <div class="chip-wrap">${chipAlertIcon(urgentCount,'red')}<div class="stat-chip urgent" style="cursor:pointer;" id="stat-chip-services-urgent">${bigAlertNum(urgentCount)}<span class="stat-label">مستعجلة</span></div></div>
    <div class="chip-wrap">${chipAlertIcon(overdueCount,'red')}<div class="stat-chip" style="border-color:#A23B33;cursor:pointer;" id="stat-chip-services-overdue">${bigAlertNum(overdueCount)}<span class="stat-label">متأخرة</span></div></div>
    <div class="chip-wrap">${chipAlertIcon(nearingCount,'yellow')}<div class="stat-chip" style="border-color:#B8860B;cursor:pointer;" id="stat-chip-services-nearing"><span class="stat-num">${nearingCount}</span><span class="stat-label">قربت على التأخير</span></div></div>
  </div>

  <div class="toolbar" style="margin-bottom:16px;">
    <select id="services-filter" style="max-width:240px;">
      <option value="all" ${filterVal==='all'?'selected':''}>كل الخدمات</option>
      <option value="auto" ${filterVal==='auto'?'selected':''}>خدمات العملاء (لها رقم سند)</option>
      <option value="manual" ${filterVal==='manual'?'selected':''}>خدمات أخرى للشركة (بدون رقم سند)</option>
    </select>
  </div>

  <div class="card"><div class="table-wrap">
    ${list.length===0?`<div class="empty-state"><div class="big">🟣</div><div>لا توجد خدمات مسجلة بعد</div></div>`:`
    <table><thead><tr>
      <th>تاريخ الطلب</th><th>المرجع</th><th>اسم العميل</th><th>نوع التمر</th>
      <th>الكمية المستلمة</th><th>نوع الخدمة</th><th>المصدر</th><th>الكمية المصنعة</th><th>تاريخ التصنيع</th><th>تم تصنيعه؟</th><th>ملاحظات</th>
      ${canManage?'<th></th>':''}
    </tr></thead><tbody>
    ${list.map(so=>`<tr data-svc-id="${so.id}">
      <td data-label="تاريخ الطلب"><span class="mono" style="font-weight:700;">${formatDate(so.date)}</span></td>
      <td data-label="المرجع"><span class="receipt-display" style="font-size:13px;">${formatReceiptNoHtml(so.receiptNo||'—')}</span>${daysWithoutMfgBadge(so)}</td>
      <td data-label="اسم العميل"><strong>${escapeHtml(so.customerName||'—')}</strong></td>
      <td data-label="نوع التمر">${escapeHtml((so.dateTypes||[]).join('،')||so.dateType||'—')}</td>
      <td data-label="الكمية المستلمة">${escapeHtml(so.qtyReceived||'—')}</td>
      <td data-label="نوع الخدمة">${serviceBadge(so.serviceType||'—','20px')}</td>
      <td data-label="المصدر">${hasReceipt(so)?`<span class="badge" style="background:#DCF3EF;color:#1B6E62;">عميل (له سند)</span>`:`<span class="badge" style="background:#EDE3FF;color:#7B2FBE;">شركة أخرى</span>`}</td>
      <td data-label="الكمية المصنعة">${canEditQtyMfg()?`<input type="text" class="svc-qty-mfg" data-id="${so.id}" value="${escapeHtml(so.qtyMfg||'')}" style="width:110px;font-weight:800;font-size:14px;" placeholder="اكتب الكمية هنا">`:`<span class="qty-mfg-display">${escapeHtml(so.qtyMfg||'—')}</span>`}</td>
      <td data-label="تاريخ التصنيع">${so.mfgDate?`<span class="mono" style="color:#7B2FBE;font-size:12px;font-weight:700;">${formatDate(so.mfgDate)}</span>`:'<span style="color:var(--ink-soft);">—</span>'}</td>
      <td data-label="تم تصنيعه؟">${(so.qtyMfg||'').toString().trim()?`<span class="badge" style="background:#E3F3E8;color:#2F7A4D;">✅ تم تصنيعه</span>`:`<span class="badge" style="background:#FEF6D9;color:#8A6500;">⏳ لم يُصنّع بعد</span>`}</td>
      <td data-label="ملاحظات" class="cell-notes">${canManage?`<textarea class="svc-notes-input" data-id="${so.id}" rows="2" placeholder="أضف ملاحظة…">${escapeHtml(so.notes||'')}</textarea>`:escapeHtml(so.notes||'—')}</td>
      ${canManage?`<td><div style="display:flex;gap:6px;justify-content:flex-end;">
        <button class="icon-btn danger btn-delete-svc" data-id="${so.id}" title="حذف">🗑</button>
      </div></td>`:''}
    </tr>`).join('')}
    </tbody></table>`}
  </div></div>`;
}

/* ============== search ============== */
function renderSearch(){
  const term=state.searchTerm.trim().toLowerCase();
  /* orders only ever appear after the user actually types something (receipt code / name / mobile) —
     choosing a status alone is not enough, by design */
  const hasSearch=term.length>0;
  let results=[];
  if(hasSearch){
    results=sortedOrders(state.orders).filter(o=>
      (o.receiptNo||'').toLowerCase().includes(term)||
      (o.customerName||'').toLowerCase().includes(term)||
      (o.mobile||'').toLowerCase().includes(term)
    );
    if(state.searchStatus!=='all') results=results.filter(o=>o.status===state.searchStatus);
  }
  const canManage=isAdmin();
  const canUpdate=canUpdateFromSearch();
  return`
  <div class="page-head">
    <div><h1 class="page-title">البحث وحالة الطلب</h1><div class="page-desc">دوّر برقم السند أو اسم العميل أو رقم الجوال</div></div>
    <div class="toolbar">
      <span class="last-sync">آخر تحديث: ${state.lastSync||'—'}</span>
      <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ تحديث</button>
    </div>
  </div>
  ${hasSearch?`<div style="margin-bottom:10px;font-size:16px;">عدد النتائج: <strong style="color:var(--accent-dark);font-size:19px;">${results.length}</strong></div>`:''}
  <div class="toolbar search-toolbar-sticky">
    ${searchBoxHtml('search-input','رقم السند / اسم العميل / رقم الجوال…',state.searchTerm)}
    <select id="status-filter" style="max-width:130px;font-size:12.5px;padding:7px 8px;">
      <option value="all" ${state.searchStatus==='all'?'selected':''}>كل الحالات</option>
      ${STATUS_FLOW.map(s=>`<option value="${s}" ${state.searchStatus===s?'selected':''}>${statusLabel(s)}</option>`).join('')}
    </select>
  </div>
  <div>
    ${!hasSearch?`<div class="search-hint"><div class="big">🔎</div><div>اكتب رقم السند أو اسم العميل لعرض النتائج</div></div>`
    :results.length===0?`<div class="card"><div class="empty-state"><div class="big">🔍</div><div>لا توجد نتائج مطابقة</div></div></div>`
    :results.map(o=>`
      <div class="result-card${o.status==='تم التسليم'?' delivered-row':''}" data-id="${o.id}">
        <div class="result-top">
          <div>
            <div class="result-name">${escapeHtml(o.customerName)}</div>
            <div><span class="receipt-display" style="font-size:16px;">سند ${formatReceiptNoHtml(o.receiptNo)}</span> — <span style="font-weight:700;font-size:15px;">${formatDate(o.date)}</span> ${overdueBadge(o)} ${nearingDelayBadge(o)}${daysWithoutMfgBadge(o)}${receiptPricingNoteBadge(o)}</div>
          </div>
          <div style="display:flex;align-items:flex-start;gap:10px;">
            ${canManage?`<button class="icon-btn danger btn-delete" data-id="${o.id}" title="حذف">🗑</button>`:''}
            ${whatsAppCellHtml(o)}
          </div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:10px;">
          ${canManageStatus()?statusEditControlHtml(o):statusBadge(o.status)}
          ${urgentBadge(o.urgent)} ${dateConditionBadge(o)}
          <button class="icon-btn btn-view-detail" data-id="${o.id}" title="تفاصيل الطلب">👁</button>
          ${canManage?`<button class="icon-btn btn-edit" data-id="${o.id}" title="تعديل">✎</button>`:''}
        </div>
        ${auditLine(o)||(canUpdate?`<div class="audit-row">لم يتم التعديل عليه بعد</div>`:'')}
        <div class="result-grid">
          <div><div class="k">رقم الجوال</div><div class="v mono">${escapeHtml(o.mobile||'—')}</div></div>
          <div><div class="k">نوع التمر</div><div class="v">${escapeHtml(o.dateType||'—')}</div></div>
          <div><div class="k">الكمية المستلمة</div><div class="v">${qtyReceivedHtml(o)}</div></div>
          <div><div class="k">نوع التصنيع</div><div class="v">${processingTypeBadge(o.processingType)}</div></div>
          <div><div class="k">حجم العبوة</div><div class="v">${escapeHtml(o.packageSize||'—')}</div></div>
          <div><div class="k">حجم الكرتون</div><div class="v">${escapeHtml(o.cartonSize||'—')}</div></div>
          <div><div class="k">الكمية المصنعة</div><div class="v">${canEditQtyMfg()?qtyMfgEditableHtml(o):qtyMfgDisplayHtml(o)}</div></div>
          ${o.placementLocation?`<div><div class="k">موقع التسكين</div><div class="v" style="color:#C0392B;font-weight:700;">${escapeHtml(o.placementLocation)}</div></div>`:''}
          ${(o.vacuumServices&&o.vacuumServices.length>0)?`<div style="grid-column:1/-1;"><div class="k">⚡ الخدمات الإضافية المحددة</div><div class="v" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">${o.vacuumServices.map(s=>serviceBadge(s,'14px')).join('')}</div></div>`:''}
          ${canUpdate?`<div style="grid-column:1/-1;"><div class="k">ملاحظة سريعة</div><textarea class="notes-input" data-id="${o.id}" rows="2" placeholder="أضف ملاحظة…" style="color:#C0392B;font-weight:700;">${escapeHtml(o.processingNotes||'')}</textarea></div>`
            :(o.processingNotes?`<div style="grid-column:1/-1;"><div class="k">ملاحظات التصنيع</div><div class="v">${escapeHtml(o.processingNotes)}</div></div>`:'')}
          ${(o.dateCondition&&o.dateCondition.hasNotes&&o.dateCondition.detail)?`<div style="grid-column:1/-1;"><div class="k">تفاصيل ملاحظة حالة التمر</div><div class="v" style="color:#C0392B;font-weight:700;">${escapeHtml(o.dateCondition.detail)}</div></div>`:''}
        </div>
      </div>`).join('')}
  </div>`;
}

/* ============== order details ============== */
function openOrderDetailModal(id){
  const o=state.orders.find(x=>x.id===id);
  if(!o)return;
  state.modalOpen=true;
  const related=(state.auditLog||[]).filter(l=>o.receiptNo&&l.action&&l.action.includes(o.receiptNo));
  byId('modal-root').innerHTML=`
  <div class="overlay" id="overlay">
    <div class="modal" style="max-width:560px;">
      <div class="modal-head"><h3>تفاصيل الطلب</h3><button class="icon-btn" id="modal-close">✕</button></div>
      <div class="result-grid">
        <div><div class="k">رقم السند</div><div class="v"><span class="receipt-display" style="font-size:14px;">${formatReceiptNoHtml(o.receiptNo||'—')}</span>${daysWithoutMfgBadge(o)}</div></div>
        <div><div class="k">العميل</div><div class="v">${escapeHtml(o.customerName||'—')}</div></div>
        <div><div class="k">الجوال</div><div class="v mono">${escapeHtml(o.mobile||'—')}</div></div>
        <div><div class="k">نوع التمر</div><div class="v">${escapeHtml(o.dateType||'—')}</div></div>
        <div><div class="k">نوع التصنيع</div><div class="v">${escapeHtml(o.processingType||'—')}</div></div>
        <div><div class="k">الكمية المستلمة</div><div class="v">${qtyReceivedHtml(o)}</div></div>
        <div><div class="k">الكمية المصنعة</div><div class="v">${qtyMfgDisplayHtml(o)}</div></div>
        <div style="grid-column:1/-1;"><div class="k">الحالة</div><div class="v">${statusBadge(o.status)} ${urgentBadge(o.urgent)}</div></div>
        ${(o.vacuumServices&&o.vacuumServices.length>0)?`<div style="grid-column:1/-1;"><div class="k">⚡ الخدمات الإضافية</div><div class="v" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">${o.vacuumServices.map(s=>serviceBadge(s,'14px')).join('')}</div></div>`:''}
        <div style="grid-column:1/-1;"><div class="k">الملاحظات</div><div class="v">${escapeHtml(o.processingNotes||'لا توجد ملاحظات')}</div></div>
      </div>
      ${(o.mobile&&o.qtyMfg&&canSendWhatsappMsg())?`<div style="margin-top:14px;">
        <button type="button" class="btn btn-sm" id="btn-send-whatsapp" style="background:#25D366;color:#fff;font-weight:800;">📱 إرسال واتساب — التمر جاهز</button>
        ${o.whatsappSentAt?`<div style="font-size:13px;color:#128C4A;font-weight:800;margin-top:6px;">✅ تم إرسال رسالة — ${formatDateTime(o.whatsappSentAt)}</div>`:''}
      </div>`:''}
      ${(()=>{ const pc=(state.receiptPricing||{})[(o.receiptNo||'').toString().trim()]; if(!pc)return''; return `
      <div class="section-title" style="margin-top:18px;">🧮 بيانات التسعير</div>
      <div class="result-grid">
        ${pc.isDibs?`<div><div class="k">نوع الطلب</div><div class="v">🟡 دبس</div></div>`:''}
        ${pc.isDibs&&pc.cartonWeight!=null&&pc.cartonWeight!==''?`<div><div class="k">وزن الكرتون</div><div class="v mono">${escapeHtml(String(pc.cartonWeight))}</div></div>`:''}
        ${pc.isDibs&&pc.totalWeightKg!=null&&pc.totalWeightKg!==''?`<div><div class="k">اجمالي الوزن بالكيلو</div><div class="v mono">${escapeHtml(String(pc.totalWeightKg))}</div></div>`:''}
        ${pc.priceNoTax!=null&&pc.priceNoTax!==''?`<div><div class="k">السعر بدون ضريبة</div><div class="v mono">${escapeHtml(String(pc.priceNoTax))}</div></div>`:''}
        ${pc.priceWithTax!=null&&pc.priceWithTax!==''?`<div><div class="k">السعر بالضريبة</div><div class="v mono">${escapeHtml(String(pc.priceWithTax))}</div></div>`:''}
        ${pc.total!=null&&pc.total!==''?`<div><div class="k">اجمالي السعر بعد الضريبة</div><div class="v mono" style="font-weight:800;color:var(--accent-dark);">${escapeHtml(String(pc.total))} ريال</div></div>`:''}
      </div>
      ${pc.notes?`<div style="margin-top:8px;"><div class="k">ملاحظات حاسبة الأسعار</div><div class="v" style="white-space:pre-wrap;">${escapeHtml(pc.notes)}</div></div>`:''}
      `; })()}
      <div class="section-title" style="margin-top:18px;">سجل التعديلات</div>
      ${related.length===0?`<div class="hint">لا يوجد سجل تعديلات لهذا الطلب بعد</div>`:`
      <div class="table-wrap audit-history"><table><thead><tr><th>الوقت</th><th>المستخدم</th><th>العملية</th></tr></thead><tbody>
        ${related.map(l=>`<tr><td><span class="mono" style="font-size:12px;">${formatDateTime(l.time)}</span></td><td>${escapeHtml(l.user)}</td><td>${escapeHtml(l.action)}</td></tr>`).join('')}
      </tbody></table></div>`}
      <div class="modal-foot">
        <button type="button" class="btn btn-ghost" id="modal-cancel">إغلاق</button>
        <button type="button" class="btn btn-primary" id="btn-print-order">🖨️ طباعة أمر التصنيع</button>
      </div>
    </div>
  </div>`;
  const close=()=>{ byId('modal-root').innerHTML=''; state.modalOpen=false; };
  byId('modal-close').addEventListener('click',close);
  byId('modal-cancel').addEventListener('click',close);
  byId('overlay').addEventListener('click',e=>{ if(e.target.id==='overlay')close(); });
  byId('btn-print-order').addEventListener('click',()=>{ close(); printOrder(o.id); });
  const waBtn=byId('btn-send-whatsapp');
  if(waBtn)waBtn.addEventListener('click',async()=>{
    if(!o.mobile||!o.qtyMfg){ toast('لا يمكن الإرسال — لا يوجد رقم جوال أو الكمية المصنعة لم تُسجل بعد','error'); return; }
    if(!isValidSaudiMobile(o.mobile)){ toast('رقم الجوال غير صحيح — تأكد من الرقم قبل الإرسال','error'); return; }
    window.open(whatsAppLink(o),'_blank');
    showConfirm('هل تم إرسال الرسالة بنجاح على واتساب؟ (لو الرقم غلط أو مش موجود بواتساب اضغط "لم يتم الإرسال")',async()=>{
      await markWhatsAppSent(o.id);
      openOrderDetailModal(o.id);
    },'تم الإرسال','لم يتم الإرسال');
  });
}

      sysName:v('pr-sysname'),
      dates1kg:v('pr-dates-1kg'), datesHalfKg:v('pr-dates-half'), datesIftarSaem:v('pr-dates-iftar'),

      doughMfg1kg:v('pr-dough-mfg1'), doughMfg5kg:v('pr-dough-mfg5'),
    };
    await setCustomerPricing(key,data);

    else if(!receiptNoVal){firstInvalid=get('receiptNo');errorMsg='رقم السند مطلوب';}

    else if(!mobileRaw||!/^\d{10}$/.test(mobileRaw)){firstInvalid=get('mobile');errorMsg='رقم الجوال مطلوب (10 أرقام)';}

    else if(!ctnVal){firstInvalid=get('cartonSize');errorMsg='حجم الكرتون مطلوب';}
    if(firstInvalid){firstInvalid.classList.add('field-error');firstInvalid.focus();toast(errorMsg,'error');return;}
    if(errorMsg&&!firstInvalid){toast(errorMsg,'error');return;}
    const dupExists=state.orders.some(ord=>ord.receiptNo===receiptNoVal&&(!isEdit||ord.id!==o.id));
    if(dupExists){ get('receiptNo').classList.add('field-error'); toast('رقم السند موجود بالفعل','error'); return; }
    const dateTypeOtherVal=(formEl.querySelector('#dateTypeOther-input')?.value||'').trim();
    const selectedCartonTypes=CARTON_TYPES.filter((ct,cti)=>formEl.querySelector(`#ctype-${cti}`)?.checked);
    /* خدمات الفاكيوم المختارة فعليًا من صناديق الاختيار (تشمل سحب هواء — قابلة للإزالة الآن) */
    const vacuumServices=processingTypeVal==='فاكيوم'?VACUUM_SERVICES.filter(s=>formEl.querySelector(`[name="vs-${s}"]`)?.checked):[];
    const payload={
      date:dateVal,receiptNo:receiptNoVal,customerName:customerNameVal,
      mobile:mobileRaw,
      dateTypes:selectedDateTypes,
      dateType:(()=>{ const disp=selectedDateTypes.map(d=>d==='أخرى'?(dateTypeOtherVal||'أخرى'):d); return disp.length===1?disp[0]:disp.join('،'); })(),
      dateTypeOther:dateTypeOtherVal,
      qtyCartons:qtyVal,processingType:processingTypeVal,
      cartonTypes:selectedCartonTypes,
      status:isEdit?o.status||'جديد':'جديد',
      packageSize:pkgVal,cartonSize:ctnVal,urgent:get('urgent').checked,
      processingNotes:get('processingNotes').value.trim(),
      vacuumServices,
      dateCondition:{good:byId('cond-good').checked,hasNotes:byId('cond-hasnotes').checked,detail:byId('cond-detail').value.trim()},
    };
    if(isEdit){
      const ok=await updateOrder(o.id,payload,'تم حفظ التعديلات');
      if(ok&&processingTypeVal==='فاكيوم')await syncExtraServiceRecords(payload,vacuumServices);
    }else{
      const ok=await addOrder(payload);
      if(ok&&processingTypeVal==='فاكيوم')await syncExtraServiceRecords(payload,vacuumServices);
    }
    close();
  });
}

/* خدمات "تقعيم تمور" و"حشو لوز" — إذا اختيرت مع الفاكيوم (عند التسجيل أو التعديل) تُنشئ نسخة في صفحة الخدمات الإضافية أيضاً، بدون تكرار سجل موجود لنفس رقم السند ونفس الخدمة */
async function syncExtraServiceRecords(payload,extraVacSvcs){
  const extraForServices=extraVacSvcs.filter(s=>VACUUM_SERVICES_EXTRA.includes(s));
  if(!extraForServices.length)return;
  const existingTypes=state.serviceOrders.filter(so=>so.receiptNo===payload.receiptNo).map(so=>so.serviceType);
  const toCreate=extraForServices.filter(s=>!existingTypes.includes(s));
  const created=[],failed=[];
  for(const svc of toCreate){
    const ok=await addServiceOrder({
      date:payload.date,receiptNo:payload.receiptNo,customerName:payload.customerName,
      dateTypes:payload.dateTypes||[],dateType:payload.dateType,serviceType:svc,
      qtyReceived:payload.qtyCartons||'',qtyMfg:'',mfgDate:'',notes:'',serviceSource:'auto',urgent:!!payload.urgent,
    },true);
    if(ok)created.push(svc); else failed.push(svc);
  }
  if(created.length>0)toast(`✅ نُسخ سند ${payload.receiptNo||''} إلى الخدمات الإضافية (${created.join('، ')})`,'ok',5000);
  if(failed.length>0)toast(`⚠️ تعذّر نسخ (${failed.join('، ')}) إلى الخدمات الإضافية — جرّب الحفظ مرة أخرى`,'error',6000);
  if(created.length===0&&failed.length===0)toast(`ℹ️ سند ${payload.receiptNo||''} موجود بالفعل في الخدمات الإضافية`,'ok',3500);
}

/* رقم الأسبوع بمعيار ISO — يُستخدم لمعرفة هل بدأ أسبوع جديد أم لا */
function isoWeekKey(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=(date.getUTCDay()+6)%7;
  date.setUTCDate(date.getUTCDate()-dayNum+3);
  const firstThursday=new Date(Date.UTC(date.getUTCFullYear(),0,4));
  const week=1+Math.round(((date-firstThursday)/86400000-3+((firstThursday.getUTCDay()+6)%7))/7);
  return `${date.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
}
/* تصدير تلقائي (يومي وأسبوعي) بدون أي ضغطة زر — يعمل مرة واحدة فقط لكل يوم/أسبوع أول ما المسؤول يفتح التطبيق.

   لكنه بيشتغل وقت ما تفتح التطبيق فعليًا (مش وانت مقفل الصفحة). */

async function importOrdersFromExcel(file){
  if(!window.XLSX){ toast('تعذّر تحميل مكتبة Excel — تأكد من الاتصال بالإنترنت','error'); return; }
  toast('جارٍ قراءة الملف…');
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const sheetName=wb.SheetNames[0];
    const ws=wb.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!rows.length){ toast('الملف فارغ أو بدون بيانات صالحة','error'); return; }
    await fullRefresh();

    const norm=s=>String(s||'').replace(/\(.*?\)/g,'').trim();
    const getVal=(row,...names)=>{
      for(const key of Object.keys(row)){
        const nk=norm(key);
        if(names.some(n=>nk.includes(n)))return row[key];
      }
      return '';
    };

    const valid=[],errors=[];
    const seqCounters={};
    rows.forEach((row,i)=>{
      const rowNum=i+2;
      const dateRaw=getVal(row,'التاريخ');
      let dateVal='';
      if(dateRaw instanceof Date&&!isNaN(dateRaw)){
        dateVal=`${dateRaw.getFullYear()}-${String(dateRaw.getMonth()+1).padStart(2,'0')}-${String(dateRaw.getDate()).padStart(2,'0')}`;
      }else if(typeof dateRaw==='number'&&window.XLSX&&XLSX.SSF){
        const d=XLSX.SSF.parse_date_code(dateRaw);
        if(d)dateVal=`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
      }else if(typeof dateRaw==='string'&&dateRaw.trim()){
        const s=dateRaw.trim();
        const m1=/^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(s);
        const m2=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
        if(m1)dateVal=`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
        else if(m2)dateVal=`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
      }
      const processingType=String(getVal(row,'نوع التصنيع')||'').trim();
      let receiptNo=String(getVal(row,'رقم السند')||'').trim();
      const customerName=String(getVal(row,'اسم العميل')||'').trim();
      let mobile=String(getVal(row,'رقم الجوال','الجوال')||'').trim().replace(/\D/g,'');
      if(mobile&&mobile.length<10)mobile=mobile.padStart(10,'0');
      const qtyCartons=String(getVal(row,'الكمية المستلمة','كراتين')||'').trim();
      const dateTypeRaw=String(getVal(row,'نوع التمر')||'').trim();
      const dateTypes=dateTypeRaw?dateTypeRaw.split(/[,،]/).map(s=>s.trim()).filter(Boolean):[];
      const packageSize=String(getVal(row,'حجم العبوة')||'').trim();
      const cartonSize=String(getVal(row,'حجم الكرتون')||'').trim();
      const urgentRaw=String(getVal(row,'مستعجل')||'').trim();
      const urgent=/^(نعم|yes|true|1)$/i.test(urgentRaw);
      const processingNotes=String(getVal(row,'ملاحظات')||'').trim();

      if(!dateVal&&!processingType&&!customerName&&!mobile&&!qtyCartons&&!dateTypes.length&&!packageSize&&!cartonSize)return;

      const rowErrors=[];
      if(!dateVal)rowErrors.push('تاريخ غير صالح');
      if(!PROCESSING_TYPES.includes(processingType))rowErrors.push('نوع التصنيع غير صحيح');
      if(!customerName)rowErrors.push('اسم العميل مطلوب');
      if(!mobile||!/^\d{10}$/.test(mobile))rowErrors.push('رقم الجوال يجب أن يكون 10 أرقام');
      if(!qtyCartons)rowErrors.push('الكمية المستلمة مطلوبة');
      if(!dateTypes.length)rowErrors.push('نوع التمر مطلوب');
      if(!packageSize)rowErrors.push('حجم العبوة مطلوب');
      if(!cartonSize)rowErrors.push('حجم الكرتون مطلوب');
      if(rowErrors.length){ errors.push(`صف ${rowNum}: ${rowErrors.join('، ')}`); return; }

      if(!receiptNo){
        const prefix=RECEIPT_PREFIX[processingType]||'';
        if(seqCounters[prefix]===undefined){
          const nums=state.orders.filter(o=>!prefix||(o.receiptNo||'').startsWith(prefix))
            .map(o=>{ const m=(o.receiptNo||'').match(/(\d+)\s*$/); return m?parseInt(m[1],10):0; });
          seqCounters[prefix]=nums.length?Math.max(...nums):0;
        }
        seqCounters[prefix]+=1;
        receiptNo=prefix+String(seqCounters[prefix]).padStart(4,'0');
      }else{
        const dup=state.orders.some(o=>o.receiptNo===receiptNo)||valid.some(v=>v.receiptNo===receiptNo);
        if(dup){ errors.push(`صف ${rowNum}: رقم السند "${receiptNo}" مستخدم بالفعل`); return; }
      }

      valid.push({
        date:dateVal,receiptNo,customerName,mobile,
        dateTypes,dateType:dateTypes.length===1?dateTypes[0]:dateTypes.join('،'),
        qtyCartons,processingType,status:'جديد',
        packageSize,cartonSize,urgent,processingNotes,vacuumServices:[],
        dateCondition:{good:false,hasNotes:false,detail:''},
      });
    });

    if(!valid.length){
      toast('لم يتم استيراد أي صف — راجع الملاحظات','error',5000);
      if(errors.length)showImportErrorsModal(errors);
      return;
    }

    const now=Date.now();
    const byMonth={};
    valid.forEach((payload,idx2)=>{
      const monthKey=(payload.date||todayIso()).slice(0,7);
      const newOrder={id:genId(),createdAt:now+idx2,monthKey,lastEditedBy:currentUserName(),lastEditedAt:nowIso(),...payload};
      (byMonth[monthKey]=byMonth[monthKey]||[]).push(newOrder);
    });
    let idx=state.monthIndex.length?state.monthIndex:await loadIndex();
    const newMonths=Object.keys(byMonth).filter(m=>!idx.includes(m));
    if(newMonths.length){ idx=[...idx,...newMonths].sort(); await saveIndex(idx); state.monthIndex=idx; }
    let savedOrders=[];
    for(const monthKey of Object.keys(byMonth)){
      const fresh=await loadMonth(monthKey);
      const merged=[...fresh,...byMonth[monthKey]];
      const ok=await saveMonth(monthKey,merged);
      if(ok)savedOrders=savedOrders.concat(byMonth[monthKey]);
      else errors.push(`تعذّر حفظ بيانات شهر ${monthKey}`);
    }
    if(savedOrders.length){
      state.orders=[...state.orders,...savedOrders];
      addAudit(`استيراد ${savedOrders.length} طلب من ملف Excel`);
      render();
    }
    if(savedOrders.length&&!errors.length){
      toast(`✅ تم استيراد ${savedOrders.length} طلب بنجاح`,'ok',4000);
    }else if(savedOrders.length&&errors.length){
      toast(`تم استيراد ${savedOrders.length} طلب، وتعذّر استيراد ${errors.length} صف`,'error',5000);
      showImportErrorsModal(errors);
    }else{
      toast('تعذّر استيراد أي بيانات','error');
      showImportErrorsModal(errors);
    }
  }catch(e){
    console.error(e);
    toast('تعذّر قراءة ملف Excel — تأكد من صيغة الملف','error');
  }
}

/* ============== excel export (customers directory) ============== */
async function exportCustomersExcel(){
  if(!window.XLSX){ toast('تعذّر تحميل مكتبة Excel — تأكد من الاتصال بالإنترنت','error'); return; }
  const dir=buildCustomerDirectory();
  const headers=['اسم العميل','اسم العميل على السيستم','رقم الجوال','عدد الطلبات','إجمالي الكمية (كراتين)','آخر طلب',
    'سعر التمر - 1 كيلو','سعر التمر - 1/2 كيلو','سعر التمر - افطار صائم',
    'سعر الدبس - 25 كيلو','سعر الدبس - 2.75 كيلو','سعر الدبس - 1.5 كيلو','سعر الدبس - 700 جرام','سعر الدبس - 400 جرام','سعر الدبس - 390 جرام',
    'سعر العجينة - مبيعات 1 كيلو','سعر العجينة - مبيعات 5 كيلو','سعر العجينة - تصنيع 1 كيلو','سعر العجينة - تصنيع 5 كيلو',
    'ملاحظة'];
  const rows=dir.map(c=>{
    const pr=state.customerPricing[c.key]||{};
    const p=f=>pr[f]!=null?pr[f]:'';
    return[c.name||'',pr.sysName||'',c.mobile||'',c.orderCount,c.totalQty,c.lastDate?formatDate(c.lastDate):'',
      p('dates1kg'),p('datesHalfKg'),p('datesIftarSaem'),
      p('dibs25'),p('dibs275'),p('dibs15'),p('dibs700'),p('dibs400'),p('dibs390'),
      p('doughSales1kg'),p('doughSales5kg'),p('doughMfg1kg'),p('doughMfg5kg'),
      state.customerNotes[c.key]||''];
  });
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map(()=>({wch:20}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'بيانات العملاء');
  XLSX.writeFile(wb,`بيانات-العملاء-${todayIso()}.xlsx`);
  toast('تم تصدير بيانات العملاء');
}

  document.querySelectorAll('.calc-customer-name-link').forEach(el=>el.addEventListener('click',()=>openOrderDetailModal(el.dataset.id)));
  const recalc=()=>{
    const priceNoTax=Number(byId('calc-price-notax')?.value||0);
    const qtyMfg=Number(byId('calc-qtymfg')?.value||0);
    const isPerKilo=!!byId('calc-cartonweight');
    const cartonWeight=Number(byId('calc-cartonweight')?.value||0);
    const totalWeightKg=qtyMfg*cartonWeight;
    const priceWithTax=priceNoTax*1.15;
    const total=isPerKilo?(totalWeightKg*priceWithTax):(qtyMfg*priceWithTax);
    if(byId('calc-price-withtax'))byId('calc-price-withtax').value=priceWithTax?priceWithTax.toFixed(2):'';

  };

      state.calcForm[field]=el.value;
      recalc();
    });
  });
  const btnSaveCalc=byId('btn-save-calc');
  if(btnSaveCalc)btnSaveCalc.addEventListener('click',async()=>{
    const rn=(byId('calc-receipt-input')?.value||'').trim();
    if(!rn){ toast('اكتب رقم السند أولاً','error'); return; }
    const order=findOrderByReceiptNo(rn);
    const isDibs=!!byId('calc-is-dibs').checked;
    const isDough=(order?order.processingType==='عجينة':false)||/^p/i.test(rn);
    const isPerKilo=isDibs;
    const priceNoTax=byId('calc-price-notax').value===''?'':Number(byId('calc-price-notax').value);

    const newPin=byId('pin-reset-new-input').value.trim();
    if(!enteredCode||enteredCode!==state.pinResetCode){ toast('رمز التحقق غير صحيح','error'); return; }
    if(!newPin){ toast('يرجى إدخال رمز دخول جديد','error'); return; }
    await mutateConfig(cfg=>({...cfg,adminPin:newPin}),'تم تعيين رمز الدخول الجديد بنجاح');
    state.pinResetStage=null; state.pinResetCode=null;
    renderLoginGate();
  });

  const empBtn=byId('btn-emp-login');
  const empInput=byId('emp-pin-input');
  if(empBtn)empBtn.addEventListener('click',async()=>{
    const empId=byId('emp-select').value;
    const pinVal=empInput.value.trim();
    const fresh=(await loadConfig())||defaultConfig(); state.config=fresh;
    const emp=(fresh.employees||[]).find(e=>e.id===empId);
    if(emp&&pinVal&&pinVal===emp.pin)enterApp({role:'employee',id:emp.id,name:emp.name,allowedViews:emp.allowedViews,perms:emp.perms});
    else toast('الاسم أو الرمز غير صحيح','error');
  });
  if(empInput)empInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();byId('btn-emp-login').click();} });
}

async function enterApp(user){
  state.currentUser=user;
  state.previousLogin=await getLastLogin();
  await setLastLogin();
  const visible=visibleNavItems();
  state.view=visible.length?visible[0].key:null;
  byId('login-root').innerHTML='';
  byId('login-root').style.display='none';
  byId('app').style.display='';
  render();
  state.sessionId=ensureSessionId();
  startPresenceHeartbeat();
  startOnlineCountPolling();
  setTimeout(maybeRunAutoExport,1500);
}

/* ============== boot ============== */
async function boot(){
  byId('login-root').innerHTML=`<div class="login-wrap">${palmLoaderHtml()}</div>`;
  state.config=(await loadConfig())||defaultConfig();
  state.orders=await loadAllOrders();
  state.serviceOrders=await loadServiceOrders();
  state.auditLog=await loadAuditLog();
  state.customerNotes=await loadCustomerNotes();
  state.customerPricing=await loadCustomerPricing();
  state.productPricing=await loadProductPricing();
  state.receiptPricing=await loadReceiptPricing();
  state.dibsPriceOverrides=await loadDibsPriceOverrides();
  state.doughPriceOverrides=await loadDoughPriceOverrides();
  state.vacuumPriceOverrides=await loadVacuumPriceOverrides();
  state.loaded=true; state.lastSync=nowTimeStr();
  renderLoginGate();
  setInterval(async()=>{
    if(!state.currentUser)return;
    await pollRefresh();
    state.serviceOrders=await loadServiceOrders();
    if(!state.modalOpen){ const fc=await loadConfig(); if(fc)state.config=fc; }
  },90000);
}
/* زر الصعود لأعلى — يظهر عند النزول لأسفل، وبيرجّع فوق بسلاسة */
(function(){
  const btn=document.getElementById('btn-scroll-top');
  if(!btn)return;
  window.addEventListener('scroll',()=>{
    if(window.scrollY>300)btn.classList.add('show'); else btn.classList.remove('show');
  },{passive:true});
  btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
})();
/* تسجيل Service Worker — لتفعيل التثبيت كتطبيق (PWA) */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
boot();
</script>
