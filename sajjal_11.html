  if(!state.currentUser)return;
  const savedFocus=captureFocus();
  /* body tinting */
  document.body.className='';
  if(PAGE_BODY_CLASS[state.view])document.body.classList.add(PAGE_BODY_CLASS[state.view]);
  if(typeof updateOnlineStatus==='function')updateOnlineStatus();
  renderSidebar();
  const main=byId('main');
  if(!state.loaded){ main.innerHTML=skeletonHtml(); return; }
  if(state.view==='audit'&&!isAdmin())state.view='dashboard';
  if(state.view==='customers'&&!isAdmin())state.view='dashboard';
  if(state.view==='presence'&&!isAdmin())state.view='dashboard';
  if(state.view==='reports'&&!isAdmin())state.view='dashboard';
  if(state.view==='pricing'&&!employeeCanAccess('pricing'))state.view='dashboard';
  if(state.view){ try{ localStorage.setItem('sajjal-last-view',state.view); }catch(e){} }
  let pageHtml='';
  if(state.view==='dashboard')   pageHtml=renderDashboard();
  else if(state.view==='registry')  pageHtml=renderRegistry();
  else if(state.view==='services')  pageHtml=renderServices();
  else if(state.view==='search')    pageHtml=renderSearch();
  else if(state.view==='settings')  pageHtml=renderSettings();
  else if(state.view==='audit')     pageHtml=renderAudit();
  else if(state.view==='customers') pageHtml=renderCustomers();
  else if(state.view==='warehouse') pageHtml=renderWarehouse();
  else if(state.view==='presence')  pageHtml=renderPresence();
  else if(state.view==='pricing')   pageHtml=renderPricingPage();
  else if(state.view==='reports')   pageHtml=renderReports();
  else if(state.view==='about')     pageHtml=renderAbout();
  else pageHtml=renderProduction(state.view);
  if(state.view==='presence'){
    if(!state._presencePageInterval){
      loadPresenceList();
      state._presencePageInterval=setInterval(loadPresenceList,8000);
    }
  } else if(state._presencePageInterval){
    clearInterval(state._presencePageInterval);
    state._presencePageInterval=null;
  }
  main.innerHTML=updateBannerHtml()+historyLoadingBannerHtml()+renderTopbar()+pageHtml;
  attachViewEvents();
  restoreFocus(savedFocus);
  if(state._lastPresenceView!==state.view){
    state._lastPresenceView=state.view;

}

function findOrderByReceiptNo(receiptNo){
  const rn=(receiptNo||'').toString().trim();
  if(!rn)return null;

function renderPricingPage(){
  const rn=state.calcReceiptNo||'';
  const order=findOrderByReceiptNo(rn);
  const saved=(state.receiptPricing||{})[rn.trim()]||null;
  const f=state.calcForm||{};
  const val=(field,fallbackFromOrder)=>{
    if(f[field]!=null)return f[field];
    if(saved&&saved[field]!=null)return saved[field];
    if(fallbackFromOrder!=null)return fallbackFromOrder;
    return '';
  };
  const pieceSizeVal=val('pieceSize',order?order.packageSize:'');
  const cartonSizeVal=val('cartonSize',order?order.cartonSize:'');
  const qtyMfgVal=val('qtyMfg',order?order.qtyMfg:'');
  const isDibs=(order?order.processingType==='دبس':false)||/^[jm]/i.test(rn.trim());
  const isDough=(order?order.processingType==='عجينة':false)||/^p/i.test(rn.trim());
  const isVacuum=(order?order.processingType==='فاكيوم':false)||/^v/i.test(rn.trim());
  const dibsTable=getDibsWeightTable();
  const doughTable=getDoughWeightTable();
  const vacuumTable=getVacuumWeightTable();
  /* مطابقة صف من الجدول: لازم حجم العبوة وحجم الكرتون (وزن الكرتون) يطابقوا مع بعض نفس الصف بالظبط.
     حجم/وزن الكرتون بييجي أحيانًا بصيغة فيها حروف زي "K 8" بدل "8"، فبنستخرج الرقم منها بس قبل المقارنة.
     لو صف في الجدول مالوش اسم حجم عبوة (زي بعض صفوف العجينة)، بيتطابق بوزن الكرتون بس */
  const numOnly=(s)=>{ const m=String(s||'').match(/[\d.]+/); return m?m[0]:''; };
  /* بنقارن حجم العبوة بمجموعة كلماته مش بترتيبها الحرفي، عشان "1/2 كجم - مسطح" و"كجم - مسطح 1/2"
     يتحسبوا نفس الحجم حتى لو ترتيب الكلمات مختلف بين الجدول واختيارات الطلب */
  const tokenizeSize=(s)=>String(s||'').split(/[\s\-–—]+/).filter(Boolean).sort().join('|');
  const matchWeightRow=(table)=>{
    const psTok=tokenizeSize(pieceSizeVal);
    const csNum=numOnly(cartonSizeVal);
    let match=table.find(r=>tokenizeSize(r.size)===psTok&&String(r.weight)===csNum);
    if(match)return match;
    if(csNum){
      match=table.find(r=>!tokenizeSize(r.size)&&String(r.weight)===csNum);
      if(match)return match;
    }
    /* لو حجم الكرتون اتكتب "عدد الحبات" بدل وزن الكرتون (مثلاً "12 حبة" بدل "4.68 كجم")، نحسب الوزن الضمني
       من (وزن العبوة الواحدة × العدد) ونطابقه مع الجدول */
    const pkgWeightKg=parsePackageWeightKg(pieceSizeVal);
    if(pkgWeightKg&&csNum){
      const impliedWeight=Math.round(pkgWeightKg*Number(csNum)*100)/100;
      match=table.find(r=>tokenizeSize(r.size)===psTok&&Math.abs(Number(r.weight)-impliedWeight)<0.01);
      if(match)return match;
    }
    return null;
  };
  const dibsTableMatch=isDibs?matchWeightRow(dibsTable):null;
  const doughTableMatch=isDough?matchWeightRow(doughTable):null;
  const vacuumTableMatch=isVacuum?matchWeightRow(vacuumTable):null;
  const isPerKiloType=isDibs;

    (dibsTableMatch?dibsTableMatch.weight:''))));
  const totalWeightKgNum=(Number(qtyMfgVal)||0)*(Number(cartonWeightVal)||0);
  const priceWithTaxNum=(Number(priceNoTaxVal)||0)*1.15;

        <td><button type="button" class="icon-btn danger btn-delete-calc" data-receipt="${escapeHtml(r.receiptNo)}" title="حذف">🗑</button></td>
      </tr>`).join('')}
    </tbody></table></div>`}
  </div>
  `;
}
function renderPresence(){
  const list=state.presenceList||[];
  const now=Date.now();
  const online=list.filter(p=>now-p.ts<45000);
  const recent=list.filter(p=>now-p.ts>=45000&&now-p.ts<30*60000);
  const cardFor=(p,i,isOnline)=>`
    <div class="card card-pad presence-card" data-idx="${i}" data-group="${isOnline?'online':'recent'}" style="cursor:pointer;margin-bottom:10px;">
      <div style="display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="presence-dot ${isOnline?'on':'off'}"></span>
          <div>
            <div style="font-weight:800;">${escapeHtml(p.name||'—')}</div>
            <div style="font-size:11.5px;color:var(--ink-soft);">${p.role==='admin'?'مسؤول النظام':'موظف'} · ${secondsAgoLabel(p.ts)}</div>
          </div>
        </div>
        <div style="font-size:12px;color:var(--ink-soft);">اضغط للتفاصيل ›</div>
      </div>
    </div>`;
  return `
  <div class="page-head">
    <div><h1 class="page-title">👀 من متصل الآن</h1><div class="page-desc">قائمة بمن فاتح النظام حاليًا، وآخر صفحة كانوا عليها — تتحدث تلقائيًا كل ٨ ثوانٍ</div></div>
    <div class="toolbar"><button class="btn btn-ghost btn-sm" id="btn-refresh-presence">↻ تحديث الآن</button></div>
  </div>
  <div class="stats">
    <div class="stat-chip" style="border-color:#2F7A4D;"><span class="stat-num">${online.length}</span><span class="stat-label">متصل الآن</span></div>
    <div class="stat-chip"><span class="stat-num">${recent.length}</span><span class="stat-label">شوهدوا مؤخرًا (آخر ٣٠ دقيقة)</span></div>
  </div>
  <div style="margin-top:18px;">
    <h3 style="font-size:14px;margin-bottom:10px;">🟢 متصلون الآن</h3>
    ${online.length===0?`<div class="card card-pad" style="text-align:center;color:var(--ink-soft);">لا يوجد أحد متصل حاليًا</div>`:online.map((p,i)=>cardFor(p,i,true)).join('')}
  </div>
  ${recent.length?`<div style="margin-top:22px;">
    <h3 style="font-size:14px;margin-bottom:10px;color:var(--ink-soft);">⚪ شوهدوا مؤخرًا</h3>
    ${recent.map((p,i)=>cardFor(p,i,false)).join('')}
  </div>`:''}
  `;
}
function renderDashboard(){
  const orders=state.orders||[];
  const total     = orders.length;
  const ready     = orders.filter(o=>(o.qtyMfg||'').toString().trim()&&o.status!=='تم التسليم').length;
  const delivered = orders.filter(o=>o.status==='تم التسليم').length;
  const urgent    = orders.filter(isUrgentPending).length;
  const overdueCount = orders.filter(isOverdue).length;
  const warehouseCount = orders.filter(o=>(o.placementLocation||'').trim()&&o.status!=='تم التسليم').length;
  const stagnantWarehouseCount = orders.filter(isStagnantInWarehouse).length;

  /* متوسط مدة التصنيع: من تاريخ التسجيل لحد آخر تعديل وقت التسليم */
  const deliveredWithDates=orders.filter(o=>o.status==='تم التسليم'&&o.date&&o.lastEditedAt);
  let avgDays=null;
  if(deliveredWithDates.length>0){
    const totalDays=deliveredWithDates.reduce((s,o)=>{
      const d=(new Date(o.lastEditedAt).getTime()-new Date(o.date).getTime())/(1000*60*60*24);
      return s+Math.max(0,d);
    },0);
    avgDays=(totalDays/deliveredWithDates.length).toFixed(1);
  }
  /* تنبيه مبكر: طلبات قاربت على التأخير (بين 18 و25 يوم) ولم تُسلَّم بعد */
  const nearingDelay=orders.filter(o=>{
    if(!o.date||o.status==='تم التسليم')return false;
    const diff=(Date.now()-new Date(o.date).getTime())/(1000*60*60*24);
    return diff>=18&&diff<=25;
  }).length;

  /* charts data */
  const typeCounts={};
  PROCESSING_TYPES.forEach(t=>{ typeCounts[t]=orders.filter(o=>o.processingType===t).length; });
  const maxType=Math.max(1,...Object.values(typeCounts));
  const typeTotal=Object.values(typeCounts).reduce((a,b)=>a+b,0);

  const dateCounts={};
  orders.forEach(o=>{ if(o.dateType){ dateCounts[o.dateType]=(dateCounts[o.dateType]||0)+1; } });
  const topDates=Object.entries(dateCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxDate=Math.max(1,...topDates.map(x=>x[1]));
  const dateTotal=Object.values(dateCounts).reduce((a,b)=>a+b,0);

  const barColors=['#2F7A4D','#2C7DA0','#E67E22','#C0392B','#8E6E53','#B8862E'];

  /* الخط الأكثر ازدحامًا الآن — حسب عدد الطلبات المتبقية (غير المسلَّمة) لكل خط إنتاج */
  const pendingByType={};
  PROCESSING_TYPES.forEach(t=>{ pendingByType[t]=orders.filter(o=>o.processingType===t&&o.status!=='تم التسليم').length; });
  const maxPending=Math.max(1,...Object.values(pendingByType));
  const busiestType=Object.entries(pendingByType).sort((a,b)=>b[1]-a[1])[0];

  /* توزيع الطلبات شهريًا لكل خط إنتاج — لآخر 6 أشهر فيها بيانات */
  const monthlyByType={};
  orders.forEach(o=>{ if(o.date&&o.processingType){ const mk=o.date.slice(0,7); monthlyByType[mk]=monthlyByType[mk]||{}; monthlyByType[mk][o.processingType]=(monthlyByType[mk][o.processingType]||0)+1; } });
  const typeColor={};
  PROCESSING_TYPES.forEach((t,i)=>{ typeColor[t]=barColors[i%barColors.length]; });

  /* إحصائيات إضافية خاصة بالمسؤول فقط */
  const bananaBoxQty=orders.reduce((s,o)=>((o.cartonTypes||[]).includes('كرتون موز')?s+(Number(o.qtyCartons)||0):s),0);
  const vacuumMfgBySize={};
  let vacuumMfgTotal=0;
  orders.forEach(o=>{
    if(o.processingType==='فاكيوم'&&(o.qtyMfg||'').toString().trim()){
      const qty=Number(o.qtyMfg)||0;
      vacuumMfgTotal+=qty;
      const size=(o.cartonSize||'غير محدد').trim()||'غير محدد';
      vacuumMfgBySize[size]=(vacuumMfgBySize[size]||0)+qty;
    }
  });
  const vacuumMfgSizeEntries=Object.entries(vacuumMfgBySize).sort((a,b)=>b[1]-a[1]);
  const uniqueCustomersCount=buildCustomerDirectory().length;
  /* مقارنة عدد الطلبات شهريًا — آخر 6 أشهر فيها بيانات */
  const monthlyCounts={};
  orders.forEach(o=>{ if(o.date){ const mk=o.date.slice(0,7); monthlyCounts[mk]=(monthlyCounts[mk]||0)+1; } });
  const monthlyEntries=Object.entries(monthlyCounts).sort((a,b)=>a[0].localeCompare(b[0])).slice(-6);
  const maxMonthly=Math.max(1,...monthlyEntries.map(x=>x[1]));
  const monthLabel=(mk)=>{
    const [y,m]=mk.split('-');
    const names=['','يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
    return `${names[parseInt(m,10)]||mk} ${y}`;
  };
  /* مقارنة يومية بين الأقسام — آخر 14 يوم، حسب تاريخ التصنيع الفعلي لكل طلب */
  const dailyByType={};
  const dayKeys=[];
  for(let i=13;i>=0;i--){
    const d=new Date(); d.setDate(d.getDate()-i);
    const key=d.toISOString().slice(0,10);
    dayKeys.push(key);
    dailyByType[key]={};
  }
  orders.forEach(o=>{
    if(o.mfgDate&&o.processingType&&dailyByType[o.mfgDate]){
      dailyByType[o.mfgDate][o.processingType]=(dailyByType[o.mfgDate][o.processingType]||0)+1;
    }
  });
  const dailyDayCounts=dayKeys.map(k=>Object.values(dailyByType[k]).reduce((a,b)=>a+b,0));
  const maxDaily=Math.max(1,...dailyDayCounts);
  const hasDailyData=dailyDayCounts.some(c=>c>0);
  const dayLabel=(k)=>{ const d=new Date(k+'T00:00:00Z'); const names=['أحد','اثنين','ثلاثاء','أربعاء','خميس','جمعة','سبت']; return `${names[d.getUTCDay()]} ${k.slice(8,10)}/${k.slice(5,7)}`; };

  const latestOrders=sortedOrders(orders).slice(0,10).map(o=>`
    <tr data-id="${o.id}" ${o.status==='تم التسليم'?'class="delivered-row"':''}>
      <td data-label="العميل">${escapeHtml(o.customerName||'-')}</td>
      <td data-label="رقم الجوال"><span class="mono">${escapeHtml(o.mobile||'-')}</span></td>
      <td data-label="رقم السند"><span class="receipt-display" style="font-size:13px;">${formatReceiptNoHtml(o.receiptNo||'-')}</span>${daysWithoutMfgBadge(o)}</td>
      <td data-label="الكمية المستلمة">${qtyReceivedHtml(o)}</td>
      <td data-label="الكمية المصنعة">${qtyMfgDisplayHtml(o)}</td>
      <td data-label="الحالة">${statusBadge(o.status||'جديد')}</td>
      <td data-label="موقع التسكين">${o.placementLocation?`<strong style="color:#C0392B;">${escapeHtml(o.placementLocation)}</strong>`:'<span style="color:var(--ink-soft);">—</span>'}</td>
    </tr>
  `).join('');

  return `
  <div class="page-head">
    <div>
      <h1 class="page-title">لوحة التحكم</h1>
      <div class="page-desc">نظرة عامة على الطلبات والإنتاج</div>
    </div>
    <div class="toolbar">
      <span class="last-sync">آخر تحديث: ${state.lastSync||'—'}</span>
      <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ تحديث</button>
      ${isAdmin()?`<button class="btn btn-primary btn-sm" id="btn-export-excel">📊 تصدير Excel</button>`:''}
    </div>
  </div>

  ${dailyReportReminderBannerHtml()}

  <div id="dashboard-print-area">
  <div class="dashboard-grid">
    <div class="dash-card dash-total">
      <div class="dash-icon"><span class="box-stack"><span class="box b4">📦</span><span class="box b3">📦</span><span class="box b2">📦</span><span class="box b1">📦</span></span></div>
      <div class="dash-number">${total}</div>
      <div class="dash-label">إجمالي الطلبات</div>
    </div>
    <div class="dash-card dash-ready">
      <div class="dash-icon">👍</div>
      <div class="dash-number">${ready}</div>
      <div class="dash-label">تم التصنيع</div>
    </div>
    <div class="dash-card dash-delivered">
      <div class="dash-icon">✅</div>
      <div class="dash-number">${delivered}</div>
      <div class="dash-label">تم التسليم</div>
    </div>
    <div class="dash-card dash-urgent" id="dash-card-urgent" style="cursor:pointer;">
      <div class="dash-icon dash-icon-blink${urgent>0?' is-active':''}">⚠️</div>
      <div class="dash-number">${urgent}</div>
      <div class="dash-label">طلبات مستعجلة</div>
    </div>
    <div class="dash-card dash-overdue" id="dash-card-overdue" style="cursor:pointer;">
      <div class="dash-icon dash-icon-alarm${overdueCount>0?' is-ringing':''}">⏰</div>
      <div class="dash-number">${overdueCount}</div>
      <div class="dash-label">طلبات متأخرة</div>
    </div>
    <div class="dash-card dash-warehouse" id="dash-card-warehouse" style="cursor:pointer;">
      <div class="dash-icon">${warehouseIconSvg(26)}</div>
      <div class="dash-number">${warehouseCount}</div>
      <div class="dash-label">طلبات في المستودع</div>
    </div>
    <div class="dash-card dash-overdue" id="dash-card-stagnant" style="cursor:pointer;">
      <div class="dash-icon dash-icon-blink${stagnantWarehouseCount>0?' is-active':''}" style="font-size:34px;">🐌</div>
      <div class="dash-number">${stagnantWarehouseCount}</div>
      <div class="dash-label">طلبات راكدة بالمستودع</div>
    </div>
    <div class="dash-card dash-avg-time">
      <div class="dash-icon">⏱️</div>
      <div class="dash-number">${avgDays!==null?avgDays:'—'}</div>
      <div class="dash-label">متوسط أيام التصنيع حتى التسليم</div>
    </div>
    <div class="dash-card dash-nearing" id="dash-card-nearing" style="cursor:pointer;">
      <div class="dash-icon">🟡</div>
      <div class="dash-number">${nearingDelay}</div>
      <div class="dash-label">قرّبت على التأخير (18-25 يوم)</div>
    </div>
  </div>

  ${isAdmin()?`
  <div class="charts-export-bar">
    <span class="charts-export-label">🔒 الرسومات البيانية — خاصة بالمسؤول</span>
    <button class="btn btn-primary btn-sm" id="btn-dashboard-print">🖨️ طباعة لوحة التحكم</button>
    <button class="btn btn-ghost btn-sm" id="btn-chart-export-png">🖼️ تنزيل صورة</button>
    <button class="btn btn-ghost btn-sm" id="btn-chart-export-pptx">📽️ PowerPoint</button>
    <button class="btn btn-ghost btn-sm" id="btn-chart-export-xlsx">📗 Excel</button>
  </div>

  <div class="dashboard-grid" style="margin-bottom:20px;">
    <div class="dash-card" style="border-color:#B8862E;">
      <div class="dash-icon">📦</div>
      <div class="dash-number">${bananaBoxQty}</div>
      <div class="dash-label">إجمالي عدد كرتون الموز المستلم</div>
    </div>
    <div class="dash-card" style="border-color:#2C7DA0;">
      <div class="dash-icon">👥</div>
      <div class="dash-number">${uniqueCustomersCount}</div>
      <div class="dash-label">عدد العملاء الفعليين</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">📦 إجمالي الكراتين المصنّعة (فاكيوم) <span style="font-size:12px;color:var(--ink-soft);font-weight:700;">— الإجمالي: ${vacuumMfgTotal}</span></div>
      ${vacuumMfgSizeEntries.length===0?`<div style="color:var(--ink-soft);font-size:13px;padding:20px 0;text-align:center;">لا توجد بيانات تصنيع فاكيوم بعد</div>`:
        vacuumMfgSizeEntries.map(([size,qty],i)=>`
          <div class="bar-row">
            <div class="bar-label">كرتون ${escapeHtml(size)}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${Math.round((qty/Math.max(1,vacuumMfgSizeEntries[0][1]))*100)}%;background:${barColors[i%barColors.length]};"></div>
            </div>
            <div class="bar-count">${qty}</div>
          </div>`).join('')}
    </div>
    <div class="chart-card">
      <div class="chart-title">🏭 عدد الطلبات لكل قسم حتى الآن <span style="font-size:12px;color:var(--ink-soft);font-weight:700;">— الإجمالي: ${typeTotal}</span></div>
      ${PROCESSING_TYPES.map((t,i)=>`
        <div class="bar-row">
          <div class="bar-label">${t}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round((typeCounts[t]/maxType)*100)}%;background:${barColors[i%barColors.length]};"></div>
          </div>
          <div class="bar-count">${typeCounts[t]}</div>
        </div>`).join('')}
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card">
      <div class="chart-title">📊 الأقسام الأكثر طلبًا (نوع التصنيع) <span style="font-size:12px;color:var(--ink-soft);font-weight:700;">— الإجمالي: ${typeTotal}</span></div>
      ${PROCESSING_TYPES.map((t,i)=>`
        <div class="bar-row">
          <div class="bar-label">${t}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round((typeCounts[t]/maxType)*100)}%;background:${barColors[i%barColors.length]};"></div>
          </div>
          <div class="bar-count">${typeCounts[t]}</div>
        </div>`).join('')}
    </div>
    <div class="chart-card">
      <div class="chart-title">📊 أنواع التمر الأكثر طلبًا <span style="font-size:12px;color:var(--ink-soft);font-weight:700;">— الإجمالي: ${dateTotal}</span></div>
      ${topDates.length===0?`<div style="color:var(--ink-soft);font-size:13px;padding:20px 0;text-align:center;">لا توجد بيانات بعد</div>`:
        topDates.map(([name,count],i)=>`
          <div class="bar-row">
            <div class="bar-label">${name}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${Math.round((count/maxDate)*100)}%;background:${barColors[i%barColors.length]};"></div>
            </div>
            <div class="bar-count">${count}</div>
          </div>`).join('')}
    </div>
  </div>

  <div class="chart-card" style="margin-top:20px;border-color:#E67E22;">
    <div class="chart-title">🔥 الخط الأكثر ازدحامًا الآن ${busiestType&&busiestType[1]>0?`<span style="font-size:12px;color:#E67E22;font-weight:800;">— ${busiestType[0]} (${busiestType[1]} طلب متبقي)</span>`:''}</div>
    ${PROCESSING_TYPES.map((t,i)=>`
      <div class="bar-row">
        <div class="bar-label">${busiestType&&t===busiestType[0]&&busiestType[1]>0?'🔥 ':''}${t}</div>
        <div class="bar-track">
          <div class="bar-fill" style="width:${Math.round((pendingByType[t]/maxPending)*100)}%;background:${busiestType&&t===busiestType[0]&&busiestType[1]>0?'#E67E22':barColors[i%barColors.length]};"></div>
        </div>
        <div class="bar-count">${pendingByType[t]}</div>
      </div>`).join('')}
  </div>

  <div class="chart-card" style="margin-top:20px;">
    <div class="chart-title">📈 معدل الطلبات شهريًا لكل خط إنتاج</div>
    ${monthlyEntries.length===0?`<div style="color:var(--ink-soft);font-size:13px;padding:20px 0;text-align:center;">لا توجد بيانات كافية بعد</div>`:`
    <div class="vbar-chart">
      ${monthlyEntries.map(([mk,count])=>{
        const seg=PROCESSING_TYPES.map(t=>({t,c:(monthlyByType[mk]&&monthlyByType[mk][t])||0})).filter(x=>x.c>0);
        return`
        <div class="vbar-col">
          <div class="vbar-count">${count}</div>
          <div class="vbar-fill vbar-stacked" style="height:${Math.round((count/maxMonthly)*140)}px;">
            ${seg.map(s=>`<div style="flex:${s.c};background:${typeColor[s.t]};" title="${escapeHtml(s.t)}: ${s.c}"></div>`).join('')}
          </div>
          <div class="vbar-label">${monthLabel(mk)}</div>
        </div>`;}).join('')}
    </div>
    <div class="chart-legend">${PROCESSING_TYPES.map(t=>`<span class="legend-item"><span class="legend-dot" style="background:${typeColor[t]};"></span>${t}</span>`).join('')}</div>`}
  </div>

  <div class="chart-card" style="margin-top:20px;">
    <div class="chart-title">📅 مقارنة يومية بين الأقسام (آخر 14 يوم — حسب تاريخ التصنيع)</div>
    ${!hasDailyData?`<div style="color:var(--ink-soft);font-size:13px;padding:20px 0;text-align:center;">لا توجد بيانات كافية بعد</div>`:`
    <div class="vbar-chart">
      ${dayKeys.map(k=>{
        const seg=PROCESSING_TYPES.map(t=>({t,c:(dailyByType[k]&&dailyByType[k][t])||0})).filter(x=>x.c>0);
        const count=seg.reduce((s,x)=>s+x.c,0);
        return`
        <div class="vbar-col">
          <div class="vbar-count">${count}</div>
          <div class="vbar-fill vbar-stacked" style="height:${Math.round((count/maxDaily)*140)}px;">
            ${seg.map(s=>`<div style="flex:${s.c};background:${typeColor[s.t]};" title="${escapeHtml(s.t)}: ${s.c}"></div>`).join('')}
          </div>
          <div class="vbar-label">${dayLabel(k)}</div>
        </div>`;}).join('')}
    </div>
    <div class="chart-legend">${PROCESSING_TYPES.map(t=>`<span class="legend-item"><span class="legend-dot" style="background:${typeColor[t]};"></span>${t}</span>`).join('')}</div>`}
  </div>
  `:''}
  </div>

  <div class="card" style="margin-top:20px">
    <div class="card-pad" style="padding-bottom:0;">
      <div class="section-title">آخر 10 طلبات</div>
    </div>
    <div class="table-wrap">
      ${latestOrders?`<table><thead><tr><th>العميل</th><th>رقم الجوال</th><th>رقم السند</th><th>الكمية المستلمة</th><th>الكمية المصنعة</th><th>الحالة</th><th>موقع التسكين</th></tr></thead><tbody>${latestOrders}</tbody></table>`
        :`<div class="empty-state"><div class="big">🧺</div><div>لا توجد طلبات مسجلة بعد</div></div>`}
    </div>
  </div>
  `;

function buildCustomerDirectory(){
  const map=new Map();
  sortedOrders(state.orders).slice().reverse().forEach(o=>{
    const mobileNorm=(o.mobile||'').replace(/[^0-9]/g,'');
    const key=mobileNorm?('m:'+mobileNorm):(o.customerName?('n:'+o.customerName.trim().toLowerCase()):null);
    if(!key)return;
    if(!map.has(key))map.set(key,{key,name:o.customerName||'بدون اسم',mobile:o.mobile||'',orderCount:0,totalQty:0,lastDate:'',orders:[]});
    const rec=map.get(key);
    rec.orderCount+=1;
    rec.totalQty+=Number(o.qtyCartons)||0;
    rec.orders.push(o);
    if(!rec.mobile&&o.mobile)rec.mobile=o.mobile;
    if(!rec.lastDate||(o.date||'')>=rec.lastDate){ rec.lastDate=o.date||rec.lastDate; rec.name=o.customerName||rec.name; }
  });
  return Array.from(map.values()).sort((a,b)=>b.totalQty-a.totalQty);
}

/* ============== فلتر الفترة الزمنية الموحّد + الترقيم (Pagination) — تُستخدم في كل صفحات القوائم
   (سجل الطلبات، الفاكيوم، الدبس، العجينة، التعقيم، المستودع، الخدمات الإضافية، البحث)
   عشان محدش يضطر يقلّب في آلاف الطلبات دفعة واحدة، وبنفس الوقت الطلبات المعلّقة تفضل ظاهرة دايمًا مهما كان تاريخها */
const PERIOD_OPTIONS=[
  {value:'month',label:'الشهر الحالي فقط',months:0},
  {value:'1.5',label:'شهر ونص',months:1.5},
  {value:'2',label:'شهرين',months:2},
  {value:'3',label:'آخر 3 أشهر',months:3},
  {value:'6',label:'آخر 6 أشهر',months:6},
  {value:'all',label:'كل الفترات',months:null},
];
const PAGE_SIZE=50;
/* تاريخ القطع (cutoff) المقابل لقيمة الفترة المختارة — null يعني بلا حد (كل الفترات) */
function periodCutoffDate(periodValue){
  const opt=PERIOD_OPTIONS.find(p=>p.value===periodValue);
  const months=opt?opt.months:3;
  if(months===null)return null;
  const cutoff=new Date();
  const wholeMonths=Math.floor(months);
  const fracMonth=months-wholeMonths;
  cutoff.setMonth(cutoff.getMonth()-wholeMonths);
  if(fracMonth)cutoff.setDate(cutoff.getDate()-Math.round(fracMonth*30));
  cutoff.setHours(0,0,0,0);
  return cutoff;
}
function periodSelectHtml(id,selectedValue){
  const val=selectedValue||'3';
  return `<select id="${id}" style="max-width:170px;font-size:12.5px;padding:7px 8px;">
    ${PERIOD_OPTIONS.map(p=>`<option value="${p.value}" ${val===p.value?'selected':''}>${p.label}</option>`).join('')}
  </select>`;
}
function paginationBarHtml(idPrefix,curPage,totalPages,totalCount,itemLabel){
  if(totalPages<=1)return'';
  return `<div class="pagination-bar">
    <button type="button" class="btn btn-ghost btn-sm" id="btn-${idPrefix}-prev-page" ${curPage<=1?'disabled':''}>‹ السابق</button>
    <span class="pagination-info">صفحة ${curPage} من ${totalPages} (${totalCount} ${itemLabel})</span>
    <button type="button" class="btn btn-ghost btn-sm" id="btn-${idPrefix}-next-page" ${curPage>=totalPages?'disabled':''}>التالي ›</button>
  </div>`;
}
/* عداد كبير أعلى كل صفحة يوضح رقم اليوم (طلبات مسجّلة / مصنّعة / مسكّنة اليوم) */

/* عداد "الأوردرات المسلَّمة" بفترة قابلة للاختيار — اليوم / آخر أسبوع / آخر شهر / المدة كلها */
const DELIVERED_PERIOD_OPTIONS=[
  {value:'today',label:'اليوم'},
  {value:'week',label:'آخر أسبوع'},
  {value:'month',label:'آخر شهر'},
  {value:'all',label:'المدة كلها'},
];
function inDeliveredPeriod(dateStr,periodValue){
  if(!dateStr)return false;
  if(periodValue==='all')return true;
  if(periodValue==='today')return isToday(dateStr);
  const days=periodValue==='week'?7:30;
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-days); cutoff.setHours(0,0,0,0);
  return new Date(dateStr)>=cutoff;
}
function deliveredCounterHtml(selectId,count,periodValue){
  return `<div class="delivered-period-box">
    <div class="dpc-icon">✅</div>
    <div>

    </div>
    <select id="${selectId}" class="dpc-select">
      ${DELIVERED_PERIOD_OPTIONS.map(p=>`<option value="${p.value}" ${periodValue===p.value?'selected':''}>${p.label}</option>`).join('')}
    </select>
  </div>`;
}
/* يجمّع منطق فلترة سجل الطلبات (فلتر لوحة التحكم + البحث النصي + الفترة الزمنية + فلاتر الأعمدة/الاقماع)
   في مكان واحد، عشان العرض على الشاشة وتصدير Excel يستخدموا نفس القائمة بالظبط */
function getFilteredRegistryOrders(){
  const showArchived=!!state.registryShowArchived;
  const allOrders=sortedOrders(showArchived?state.orders:state.orders.filter(o=>!o.archived));
  const term=(state.registrySearchTerm||'').trim().toLowerCase();
  const rf=state.registryFilter||'all';
  const period=state.registryPeriod||'3';
  let base=allOrders;
  if(rf==='urgent')base=allOrders.filter(isUrgentPending);
  else if(rf==='nearing')base=allOrders.filter(o=>isNearingDelay(o));
  else if(rf==='overdue')base=allOrders.filter(o=>isOverdue(o));
  else if(rf==='mfg-not-placed')base=allOrders.filter(o=>(o.qtyMfg||'').toString().trim()&&!(o.placementLocation||'').trim()&&o.status!=='تم التسليم');
  else if(rf==='remaining')base=allOrders.filter(o=>!(o.qtyMfg||'').toString().trim()&&o.status!=='تم التسليم');
  else if(rf==='delivered')base=allOrders.filter(o=>o.status==='تم التسليم');
  let orders=term?base.filter(o=>
    (o.receiptNo||'').toLowerCase().includes(term)||
    (o.customerName||'').toLowerCase().includes(term)||
    (o.mobile||'').includes(term)
  ):base;
  /* فلتر الفترة الزمنية — لتخفيف حِمل عرض الجدول مع تراكم آلاف الطلبات بمرور الوقت.
     لا يُطبَّق إلا على الطلبات المُسلَّمة فقط (المكتملة) — أي طلب لسه معلّق أو مستعجل بيفضل ظاهر دايمًا مهما كان تاريخه، عشان محدش ينسى متابعته. */
  const cutoff=periodCutoffDate(period);
  const hiddenByPeriodCount=(cutoff===null||term||rf!=='all')?0:orders.filter(o=>{
    if(o.status!=='تم التسليم')return false;
    if(!o.date)return false;
    return new Date(o.date)<cutoff;
  }).length;
  if(cutoff!==null&&!term&&rf==='all'){
    orders=orders.filter(o=>o.status!=='تم التسليم'||!o.date||new Date(o.date)>=cutoff);
  }
  /* funnelBase = القائمة قبل تطبيق فلاتر الأعمدة (تُستخدم لبناء قوائم القيم في قوائم الاقماع) */
  const funnelBase=orders;
  orders=applyColumnFilters('registry',orders);
  return {orders,funnelBase,hiddenByPeriodCount,term,rf,period,showArchived};
}
function renderRegistry(){
  const allOrders=sortedOrders(state.orders);

  const delivered=allOrders.filter(o=>o.status==='تم التسليم').length;
  const remaining=allOrders.filter(o=>!(o.qtyMfg||'').toString().trim()&&o.status!=='تم التسليم').length;
  const registeredToday=allOrders.filter(o=>isToday(o.createdAt)).length;
  const archivableCount=canManage?state.orders.filter(isArchivable).length:0;
  const archivedCount=state.orders.filter(o=>o.archived).length;
  const {orders:filteredOrders,funnelBase,hiddenByPeriodCount,term,rf,period,showArchived}=getFilteredRegistryOrders();
  state._registryFunnelBase=funnelBase;
  let orders=filteredOrders;
  const activeColFilterCount=Object.values(state.columnFilters.registry||{}).filter(v=>v&&v.length).length;

  const canEditHere=canAdd;
  const canEditQtyHere=canEditHere&&canEditQtyMfg();
  const canEditPlacementHere=canEditHere&&canEditPlacement();
  const regCols=resolveColumns('registry',['date','receiptNo','customer','dateType','qtyReceived','pkgCarton','urgent','qtyMfg','placement','status']);
  /* إعادة الصفحة لأول صفحة تلقائيًا لو الفلتر أو البحث أو الفترة أو فلاتر الأعمدة اتغيّرت */
  const filterSig=rf+'|'+term+'|'+period+'|'+JSON.stringify(state.columnFilters.registry||{});
  if(state._registryFilterSig!==filterSig){ state._registryFilterSig=filterSig; state.registryPage=1; }
  const totalPages=Math.max(1,Math.ceil(orders.length/PAGE_SIZE));
  if(!state.registryPage||state.registryPage<1)state.registryPage=1;
  if(state.registryPage>totalPages)state.registryPage=totalPages;
  const curPage=state.registryPage;
  const pagedOrders=orders.slice((curPage-1)*PAGE_SIZE,curPage*PAGE_SIZE);

/* توليد محتوى خلية جدول "المستودع" حسب مفتاح العمود */
function warehouseCellHtml(o,key){
  switch(key){
    case 'placement': return `<td data-label="موقع التسكين"><span class="wh-loc-badge">${escapeHtml(o.placementLocation)}</span></td>`;
    case 'receiptNo': return `<td data-label="رقم السند"><span class="receipt-display" style="color:#C0392B;font-weight:800;">${formatReceiptNoHtml(o.receiptNo||'—')}</span>${daysWithoutMfgBadge(o)}</td>`;
    case 'customer': return `<td data-label="العميل"><strong class="cell-customer-name" style="color:#C0392B;">${escapeHtml(o.customerName||'—')}</strong></td>`;
    case 'dateType': return `<td data-label="نوع التمر">${escapeHtml(o.dateType||'—')}</td>`;
    case 'qtyReceived': return `<td data-label="الكمية المستلمة">${qtyReceivedHtml(o)}</td>`;
    case 'qtyMfg': return `<td data-label="الكمية المصنعة">${canEditQtyMfg()?qtyMfgEditableHtml(o):qtyMfgDisplayHtml(o)}</td>`;
    case 'storageDays': { const days=daysInWarehouse(o); const dayColor=days>=25?'#C0392B':(days>=15?'#B8860B':'#2F7A4D');
      return `<td data-label="عدد أيام التخزين"><strong style="color:${dayColor};">${days} يوم</strong>${days>=25?' 🔴':(days>=15?' 🟡':'')}</td>`; }
    default: return '<td>—</td>';
  }
}
function renderWarehouse(){
  const wf=state.warehouseFilter||'remaining';
  const remainingBase=state.orders.filter(o=>(o.placementLocation||'').trim()&&o.status!=='تم التسليم');
  const allEverPlaced=state.orders.filter(o=>(o.placementLocation||'').trim());
  const deliveredBase=allEverPlaced.filter(o=>o.status==='تم التسليم');
  const deliveredFromWarehouse=deliveredBase.length;
  let all=wf==='delivered'?deliveredBase:(wf==='all'?allEverPlaced:remainingBase);
  const stagnantOnly=!!state.warehouseStagnantOnly;
  if(stagnantOnly)all=all.filter(isStagnantInWarehouse);
  const term=(state.warehouseSearchTerm||'').trim().toLowerCase();
  /* فلتر الفترة الزمنية — لا يخفي إلا الطلبات المُسلَّمة القديمة؛ الطلبات المتبقية بالمستودع تفضل ظاهرة دايمًا مهما كان تاريخها */
  const period=state.warehousePeriod||'3';
  const cutoff=periodCutoffDate(period);
  const hiddenByPeriodCount=(cutoff===null||term)?0:all.filter(o=>o.status==='تم التسليم'&&o.date&&new Date(o.date)<cutoff).length;
  if(cutoff!==null&&!term){
    all=all.filter(o=>o.status!=='تم التسليم'||!o.date||new Date(o.date)>=cutoff);
  }
  const filtered=term?all.filter(o=>
    (o.receiptNo||'').toLowerCase().includes(term)||
    (o.customerName||'').toLowerCase().includes(term)||
    (o.mobile||'').includes(term)||
    (o.dateType||'').toLowerCase().includes(term)
  ):all;
  /* funnelBase = القائمة قبل تطبيق فلاتر الأعمدة (تُستخدم لبناء قوائم القيم في قوائم الاقماع) */
  state._warehouseFunnelBase=filtered;
  const activeColFilterCount=Object.values(state.columnFilters.warehouse||{}).filter(v=>v&&v.length).length;
  const colFiltered=applyColumnFilters('warehouse',filtered);
  /* الترتيب حسب موقع التسكين: 1-1 ، 1-2 ، 1-3 ، 2-1 ، 2-2 ... */
  const list=sortByPlacement(colFiltered);
  const whCols=resolveColumns('warehouse',['placement','receiptNo','customer','dateType','qtyReceived','qtyMfg','storageDays']);
  /* الترقيم (Pagination) */
  const filterSig=wf+'|'+term+'|'+period+'|'+JSON.stringify(state.columnFilters.warehouse||{});
  if(state._warehouseFilterSig!==filterSig){ state._warehouseFilterSig=filterSig; state.warehousePage=1; }
  const totalPages=Math.max(1,Math.ceil(list.length/PAGE_SIZE));
  if(!state.warehousePage||state.warehousePage<1)state.warehousePage=1;
  if(state.warehousePage>totalPages)state.warehousePage=totalPages;
  const curPage=state.warehousePage;
  const pagedList=list.slice((curPage-1)*PAGE_SIZE,curPage*PAGE_SIZE);
  const paginationHtml=paginationBarHtml('warehouse',curPage,totalPages,list.length,'طلب');

  const totalOrders=remainingBase.length;
  const totalQty=remainingBase.reduce((s,o)=>s+(Number(o.qtyCartons)||0),0);
  const dateTypesSet=new Set(remainingBase.map(o=>o.dateType).filter(Boolean));
  const dateTypesArr=[...dateTypesSet];
  /* طلبات تم تصنيعها لكن لم توضع في المستودع بعد (لا يوجد لها موقع تسكين) */
  const mfgNotPlaced=state.orders.filter(o=>(o.qtyMfg||'').toString().trim()&&!(o.placementLocation||'').trim()&&o.status!=='تم التسليم');
  const stagnantCount=remainingBase.filter(isStagnantInWarehouse).length;
  const placedTodayCount=state.orders.filter(o=>o.placementDate===todayIso()).length;
  const whDeliveredPeriod=state.warehouseDeliveredPeriod||'today';
  const whDeliveredCount=deliveredBase.filter(o=>inDeliveredPeriod(o.lastEditedAt,whDeliveredPeriod)).length;

  return`
  <div class="page-head">
    <div><h1 class="page-title">${warehouseIconSvg(26)} المستودع</h1><div class="page-desc">الطلبات المسكّنة حسب موقع التسكين بالمستودع — مرتبة حسب موقع الرف</div></div>
    <div class="toolbar">
      <span class="last-sync">آخر تحديث: ${state.lastSync||'—'}</span>
      <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ تحديث</button>
      <button class="btn btn-primary btn-sm" id="btn-print-warehouse" style="background:#B5651D;">🖨️ طباعة جرد المستودع</button>
    </div>
  </div>
  ${bigDayCounterHtml('🏭','عدد الأوردرات المسكَّنة اليوم',placedTodayCount)}
  ${deliveredCounterHtml('warehouse-delivered-period',whDeliveredCount,whDeliveredPeriod)}
  ${wf==='delivered'?`<div class="filter-banner filter-nearing">✅ عرض الطلبات المسلَّمة (اللي كانت بالمستودع) فقط — <button class="btn-clear-filter" id="btn-clear-warehouse-filter">× مسح الفلتر</button></div>`:''}
  ${wf==='all'?`<div class="filter-banner filter-nearing">📦 عرض كل الطلبات اللي دخلت المستودع (المتبقي + المسلَّم) — <button class="btn-clear-filter" id="btn-clear-warehouse-filter">× مسح الفلتر</button></div>`:''}
  ${stagnantOnly?`<div class="filter-banner filter-urgent">🐌 عرض الطلبات الراكدة فقط (${STAGNANT_WAREHOUSE_DAYS} يوم أو أكتر بدون خروج) — <button class="btn-clear-filter" id="btn-clear-warehouse-stagnant">× مسح الفلتر</button></div>`:''}
  ${activeColFilterCount>0?`<div class="filter-banner filter-nearing">🔽 مطبّق ${activeColFilterCount} فلتر أعمدة على الجدول — <button class="btn-clear-filter" id="btn-clear-col-filters-warehouse">× مسح فلاتر الأعمدة</button></div>`:''}

  ${progressBarHtml('نسبة ما تم تسليمه',deliveredFromWarehouse,allEverPlaced.length,'#B5651D')}

  <div class="stats">
    <div class="stat-chip" style="cursor:pointer;" id="stat-chip-total-warehouse"><img src="assets/shelf.png" width="26" style="vertical-align:middle;margin-left:6px;" alt="" onerror="this.outerHTML='🏬'"><span class="stat-num">${allEverPlaced.length}</span><span class="stat-label">إجمالي طلبات دخلت المستودع</span></div>
    <div class="stat-chip" style="border-color:#2F7A4D;cursor:pointer;" id="stat-chip-delivered-warehouse"><span class="stat-num">${deliveredFromWarehouse}</span><span class="stat-label">تم التسليم منها</span></div>
    <div class="stat-chip" style="border-color:#B8860B;cursor:pointer;" id="stat-chip-remaining-warehouse"><span class="stat-num">${totalOrders}</span><span class="stat-label">المتبقي بالمستودع</span></div>
  </div>

  <div class="warehouse-stats">
    <div class="wh-stat-card">
      <div class="wh-stat-icon" style="animation:iconBounce 1.6s ease-in-out infinite;"><img src="assets/boxes.png" width="34" alt="" onerror="this.outerHTML='📦'"></div>
      <div class="wh-stat-num">${totalOrders}</div>
      <div class="wh-stat-label">عدد الطلبات بالمستودع</div>
    </div>
    <div class="wh-stat-card">
      <div class="wh-stat-icon" style="animation:iconPulse 1.6s ease-in-out infinite;"><img src="assets/dates-box.png" width="34" alt="" onerror="this.outerHTML='📦'"></div>
      <div class="wh-stat-num">${totalQty} <span style="font-size:13px;font-weight:700;">كرتون</span></div>
      <div class="wh-stat-label">إجمالي الكمية الموجودة</div>
    </div>
    <div class="wh-stat-card">
      <div class="wh-stat-icon" style="animation:iconSwing 1.8s ease-in-out infinite;">🌴</div>
      <div class="wh-stat-num">${dateTypesSet.size}</div>
      <div class="wh-stat-label" title="${escapeHtml(dateTypesArr.join('، '))}">أنواع التمور الموجودة</div>
    </div>
    <div class="wh-stat-card" id="wh-card-mfg-not-placed" style="cursor:pointer;border-color:#C0392B;">
      <div class="wh-stat-icon" style="animation:iconBounce 1.6s ease-in-out infinite;">${forkliftIconSvg(52)}</div>
      <div class="wh-stat-num" style="color:#C0392B;">${mfgNotPlaced.length}</div>
      <div class="wh-stat-label">مصنّعة ولم تدخل المستودع بعد</div>
    </div>
    <div class="wh-stat-card" id="wh-card-stagnant" style="cursor:pointer;border-color:#C0392B;">
      <div class="wh-stat-icon dash-icon-blink${stagnantCount>0?' is-active':''}" style="font-size:34px;">🐌</div>
      <div class="wh-stat-num" style="color:#C0392B;">${stagnantCount}</div>
      <div class="wh-stat-label">طلبات راكدة (${STAGNANT_WAREHOUSE_DAYS}+ يوم بدون خروج)</div>
    </div>
  </div>

  <div class="toolbar search-toolbar-sticky">
    ${searchBoxHtml('warehouse-search-input','رقم السند / الاسم / الجوال / نوع التمر…',state.warehouseSearchTerm)}
    ${periodSelectHtml('warehouse-period-filter',period)}
    ${(term||activeColFilterCount>0)?`<span style="font-size:13px;color:var(--ink-soft);">عدد النتائج: <strong style="color:var(--accent-dark);font-size:15px;">${list.length}</strong></span>`:''}
    ${(!term&&hiddenByPeriodCount>0)?`<span style="font-size:12px;color:var(--ink-soft);">(${hiddenByPeriodCount} طلب مُسلَّم أقدم من الفترة مش ظاهر هنا — اختر "كل الفترات" لعرضه)</span>`:''}
  </div>

  ${list.length===0?`<div class="card"><div class="empty-state"><div class="big">🏭</div><div>${(term||activeColFilterCount>0)?'لا توجد نتائج مطابقة':'لا توجد طلبات في المستودع حاليًا'}</div></div></div>`:`
  <div class="card"><div class="table-wrap">
    <table data-col-table="warehouse"><thead><tr>${colHeaderHtml('warehouse',whCols)}<th></th></tr></thead><tbody>
    ${pagedList.map(o=>{
      return`<tr data-id="${o.id}" class="wh-row" style="cursor:pointer;">

/* ============== production ============== */
/* توليد محتوى خلية جداول التصنيع (فاكيوم/دبس/عجينة/تعقيم) حسب مفتاح العمود */
function productionCellHtml(o,key,ctx){
  switch(key){
    case 'date': return `<td data-label="التاريخ"><span class="mono" style="font-weight:700;">${formatDate(o.date)}</span>${isOverdue(o)?` <span style="color:#C0392B;font-size:10px;font-weight:700;">متأخر</span>`:(isNearingDelay(o)?` <span style="color:#8A6500;font-size:10px;font-weight:700;">🟡 قرّب يتأخر</span>`:'')}</td>`;
    case 'receiptNo': return `<td data-label="رقم السند"><span class="receipt-display">${formatReceiptNoHtml(o.receiptNo)}</span>${daysWithoutMfgBadge(o)}</td>`;
    case 'customer': return `<td data-label="العميل"><strong class="cell-customer-name">${escapeHtml(o.customerName)}</strong><br><span class="mono" style="font-size:11px;color:var(--ink-soft)">${escapeHtml(o.mobile||'')}</span></td>`;
    case 'dateType': return `<td data-label="نوع التمر">${escapeHtml(o.dateType||'—')}</td>`;
    case 'qtyReceived': return `<td data-label="الكمية المستلمة">${qtyReceivedHtml(o)}</td>`;
    case 'pkgCarton': return `<td data-label="حجم العبوة / الكرتون">${escapeHtml(o.packageSize||'—')} <span style="opacity:.5">/</span> ${escapeHtml(o.cartonSize||'—')}</td>`;
    case 'extra': return ctx.showPlacement
        ? ((o.vacuumServices||[]).length>0?`<td data-label="الخدمات الإضافية"><div style="display:flex;flex-wrap:wrap;gap:4px;">${(o.vacuumServices||[]).map(s=>serviceBadge(s)).join('')}</div></td>`:`<td data-label="الخدمات الإضافية">—</td>`)
        : `<td data-label="حالة التمر">${dateConditionBadge(o)}</td>`;
    case 'urgent': return `<td data-label="الأولوية">${urgentBadge(o.urgent)}</td>`;
    case 'qtyMfg': return `<td data-label="الكمية المصنعة">${canEditQtyMfg()?qtyMfgEditableHtml(o):qtyMfgDisplayHtml(o)}</td>`;
    case 'placement': return `<td data-label="موقع التسكين">${ctx.canEdit&&canEditPlacement()?`<input type="text" class="placement-input" data-id="${o.id}" placeholder="مثال: 3-1" value="${escapeHtml((state.placementDraft&&state.placementDraft[o.id]!=null)?state.placementDraft[o.id]:(o.placementLocation||''))}" style="color:#C0392B;font-weight:700;">`:`<strong style="color:#C0392B;">${escapeHtml(o.placementLocation||'—')}</strong>`}</td>`;
    case 'status': return `<td data-label="الحالة">${canManageStatus()?statusEditControlHtml(o):statusBadge(o.status)}</td>`;
    case 'notes': return `<td data-label="ملاحظات" class="cell-notes">${ctx.canEdit?`<textarea class="notes-input" data-id="${o.id}" placeholder="أضف ملاحظة…" style="color:#C0392B;font-weight:700;">${escapeHtml(o.processingNotes||'')}</textarea>`:escapeHtml(o.processingNotes||'—')}</td>`;
    case 'lastEdit': return `<td data-label="آخر تعديل">${auditLine(o)||'<span style="color:var(--ink-soft);font-size:11px;">—</span>'}</td>`;
    default: return '<td>—</td>';
  }
}
/* فلترة موحّدة لصفحات التصنيع (فاكيوم/دبس/عجينة/تعقيم) — نفس منطق سجل الطلبات بالظبط،
   وتُستخدم في العرض وفي التصدير والطباعة معًا عشان تفضل النتيجة واحدة في كل مكان */
function getFilteredProductionOrders(view){
  const type=PROD_VIEW_LABELS[view];
  const allOrders=sortedOrders(state.orders.filter(o=>o.processingType===type));
  const pf=((state.productionFilter||{})[view])||'all';
  let filteredByStatus=allOrders;
  if(pf==='remaining')filteredByStatus=allOrders.filter(o=>!(o.qtyMfg||'').toString().trim()&&o.status!=='تم التسليم');
  else if(pf==='mfg')filteredByStatus=allOrders.filter(o=>(o.qtyMfg||'').toString().trim());
  else if(pf==='urgent')filteredByStatus=allOrders.filter(isUrgentPending);
  else if(pf==='overdue')filteredByStatus=allOrders.filter(o=>isOverdue(o));
  else if(pf==='nearing')filteredByStatus=allOrders.filter(o=>isNearingDelay(o));
  const term=((state.productionSearchTerm||{})[view]||'').trim().toLowerCase();
  let orders=term?filteredByStatus.filter(o=>
    (o.receiptNo||'').toLowerCase().includes(term)||
    (o.customerName||'').toLowerCase().includes(term)||
    (o.mobile||'').includes(term)
  ):filteredByStatus;
  /* فلتر الفترة الزمنية — لا يخفي إلا الطلبات المُسلَّمة القديمة؛ أي طلب لسه معلّق أو مستعجل يفضل ظاهر دايمًا */
  const period=((state.productionPeriod||{})[view])||'3';
  const cutoff=periodCutoffDate(period);
  const hiddenByPeriodCount=(cutoff===null||term||pf!=='all')?0:orders.filter(o=>o.status==='تم التسليم'&&o.date&&new Date(o.date)<cutoff).length;
  if(cutoff!==null&&!term&&pf==='all'){
    orders=orders.filter(o=>o.status!=='تم التسليم'||!o.date||new Date(o.date)>=cutoff);
  }
  /* funnelBase = القائمة قبل تطبيق فلاتر الأعمدة (تُستخدم لبناء قوائم القيم في قوائم الاقماع) */
  const funnelBase=orders;
  const tableKey='production-'+view;
  orders=applyColumnFilters(tableKey,orders);
  return {orders,allOrders,funnelBase,hiddenByPeriodCount,term,pf,period,type,tableKey};
}

const SERVICES_COLS=[

  {key:'source',label:'المصدر'},{key:'qtyMfg',label:'الكمية المصنعة'},{key:'mfgDate',label:'تاريخ التصنيع'},
  {key:'doneStatus',label:'تم تصنيعه؟'},{key:'notes',label:'ملاحظات'},
];
function renderServices(){
  const canManage=isAdmin();
  const allList=[...state.serviceOrders].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  const filterVal=state.servicesFilter||'all';
  const sf=state.servicesStatusFilter||'all';
  /* خدمات الفاكيوم/العملاء = لها رقم سند أو مرجع — خدمات أخرى للشركة = بدون رقم سند */
  const hasReceipt=so=>!!((so.receiptNo||'').trim());
  const isDone=so=>!!((so.qtyMfg||'').toString().trim());
  /* متأخر / قرّب على التأخير — بنفس منطق الطلبات (25 يوم) لكن بالاعتماد على "تم تصنيعه" بدل حالة التسليم */
  const svcDaysSince=so=>so.date?Math.floor((Date.now()-new Date(so.date).getTime())/(1000*60*60*24)):null;
  const svcIsOverdue=so=>{ const d=svcDaysSince(so); return d!==null&&!isDone(so)&&d>25; };
  const svcIsNearing=so=>{ const d=svcDaysSince(so); return d!==null&&!isDone(so)&&d>=18&&d<=25; };
  const byType=filterVal==='all'?allList:(filterVal==='auto'?allList.filter(hasReceipt):allList.filter(so=>!hasReceipt(so)));
  let list=byType;
  if(sf==='done')list=byType.filter(isDone);
  else if(sf==='pending')list=byType.filter(so=>!isDone(so));
  else if(sf==='urgent')list=byType.filter(so=>so.urgent&&!isDone(so));
  else if(sf==='overdue')list=byType.filter(svcIsOverdue);
  else if(sf==='nearing')list=byType.filter(svcIsNearing);
  /* فلتر الفترة الزمنية — لا يخفي إلا الخدمات المُصنَّعة القديمة؛ الخدمات لسه معلّقة تفضل ظاهرة دايمًا */

  if(cutoff!==null&&sf==='all'){
    list=list.filter(so=>!isDone(so)||!so.date||new Date(so.date)>=cutoff);
  }
  /* funnelBase = القائمة قبل تطبيق فلاتر الأعمدة (تُستخدم لبناء قوائم القيم في قوائم الاقماع) */
  state._servicesFunnelBase=list;
  const activeColFilterCount=Object.values(state.columnFilters.services||{}).filter(v=>v&&v.length).length;
  list=applyColumnFilters('services',list);
  /* الترقيم (Pagination) */
  const filterSig=filterVal+'|'+sf+'|'+period+'|'+JSON.stringify(state.columnFilters.services||{});
  if(state._servicesFilterSig!==filterSig){ state._servicesFilterSig=filterSig; state.servicesPage=1; }
  const totalPages=Math.max(1,Math.ceil(list.length/PAGE_SIZE));
  if(!state.servicesPage||state.servicesPage<1)state.servicesPage=1;
  if(state.servicesPage>totalPages)state.servicesPage=totalPages;
  const curPage=state.servicesPage;
  const pagedList=list.slice((curPage-1)*PAGE_SIZE,curPage*PAGE_SIZE);
  const paginationHtml=paginationBarHtml('services',curPage,totalPages,list.length,'خدمة');
  const autoCount=allList.filter(hasReceipt).length;
  const manualCount=allList.length-autoCount;
  const doneCount=allList.filter(isDone).length;
  const pendingCount=allList.length-doneCount;
  const urgentCount=allList.filter(so=>so.urgent&&!isDone(so)).length;
  const overdueCount=allList.filter(svcIsOverdue).length;
  const nearingCount=allList.filter(svcIsNearing).length;
  const mfgTodayCount=allList.filter(so=>so.mfgDate===todayIso()).length;
  const svcDeliveredPeriod=state.servicesDeliveredPeriod||'today';
  const svcDeliveredCount=allList.filter(so=>isDone(so)&&inDeliveredPeriod(so.mfgDate,svcDeliveredPeriod)).length;
  return`

  ${sf==='done'?`<div class="filter-banner filter-nearing">✅ عرض الخدمات التي تم تصنيعها فقط — <button class="btn-clear-filter" id="btn-clear-services-status-filter">× مسح الفلتر</button></div>`:''}
  ${sf==='pending'?`<div class="filter-banner filter-nearing">📋 عرض الخدمات المتبقية (لم تُصنّع بعد) فقط — <button class="btn-clear-filter" id="btn-clear-services-status-filter">× مسح الفلتر</button></div>`:''}

  const term=state.searchTerm.trim().toLowerCase();
  /* orders only ever appear after the user actually types something (receipt code / name / mobile) —
     choosing a status alone is not enough, by design */
  const hasSearch=term.length>0;
  let results=[];
  const period=state.searchPeriod||'all';
  const cutoff=periodCutoffDate(period);
  let hiddenByPeriodCount=0;
  if(hasSearch){
    results=sortedOrders(state.orders).filter(o=>
      (o.receiptNo||'').toLowerCase().includes(term)||
      (o.customerName||'').toLowerCase().includes(term)||
      (o.mobile||'').toLowerCase().includes(term)
    );
    if(state.searchStatus!=='all') results=results.filter(o=>o.status===state.searchStatus);
    /* فلتر الفترة الزمنية — لا يخفي إلا الطلبات المُسلَّمة القديمة؛ نتيجة أي طلب لسه معلّق تفضل ظاهرة دايمًا */
    if(cutoff!==null){

      results=results.filter(o=>o.status!=='تم التسليم'||!o.date||new Date(o.date)>=cutoff);

/* ============== reports ============== */
function addDaysStr(dateStr,days){
  const d=new Date((dateStr||todayIso())+'T00:00:00');
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function addMonthsStr(dateStr,months){
  const d=new Date((dateStr||todayIso())+'T00:00:00');
  d.setMonth(d.getMonth()+months);
  return d.toISOString().slice(0,10);
}
/* يحسب بداية ونهاية الفترة المطلوبة حسب اختيار المسؤول (يومي/أسبوعي/شهري/الموسم كله) */
function reportPeriodRange(){
  const period=state.reportsPeriod||'daily';
  if(period==='weekly'){
    const start=state.reportsStartDate||todayIso();
    const end=addDaysStr(start,6);
    return {start,end,label:'أسبوعي',rangeLabel:`من ${formatDate(start)} إلى ${formatDate(end)}`};
  }
  if(period==='monthly'){
    const start=state.reportsStartDate||todayIso();
    const end=addDaysStr(addMonthsStr(start,1),-1);
    return {start,end,label:'شهري',rangeLabel:`من ${formatDate(start)} إلى ${formatDate(end)}`};
  }
  if(period==='season'){
    const dated=(state.orders||[]).filter(o=>o.date).sort((a,b)=>a.date.localeCompare(b.date));
    const start=dated.length?dated[0].date:todayIso();
    const end=todayIso();
    const year=new Date().getFullYear();
    return {start,end,label:`إجمالي الموسم ${year}`,rangeLabel:`موسم ${year} — من ${formatDate(start)} وحتى اليوم ${formatDate(end)}`};
  }
  const t=todayIso();
  return {start:t,end:t,label:'يومي',rangeLabel:`يوم ${formatDate(t)}`};
}
/* يجمع كل أرقام التقرير للفترة المحددة */
function computeReportData(){
  const {start,end,label,rangeLabel}=reportPeriodRange();
  const orders=(state.orders||[]).filter(o=>o.date&&o.date>=start&&o.date<=end);
  const received=orders.length;
  const mfg=orders.filter(o=>(o.qtyMfg||'').toString().trim());
  const delivered=orders.filter(o=>o.status==='تم التسليم');
  const bananaCartons=orders.reduce((s,o)=>((o.cartonTypes||[]).includes('كرتون موز')?s+(Number(o.qtyCartons)||0):s),0);

  const mfgByCartonSize={};
  mfg.forEach(o=>{
    const key=(o.cartonSize||'غير محدد').trim()||'غير محدد';
    mfgByCartonSize[key]=(mfgByCartonSize[key]||0)+(Number(o.qtyMfg)||0);
  });
  const mfgCartonEntries=Object.entries(mfgByCartonSize).sort((a,b)=>b[1]-a[1]);

  const deliveredByCartonSize={};
  delivered.forEach(o=>{
    const key=(o.cartonSize||'غير محدد').trim()||'غير محدد';
    deliveredByCartonSize[key]=(deliveredByCartonSize[key]||0)+(Number(o.qtyMfg)||Number(o.qtyCartons)||0);
  });
  const deliveredCartonEntries=Object.entries(deliveredByCartonSize).sort((a,b)=>b[1]-a[1]);

  const customersSet=new Set(orders.map(o=>(o.mobile||'').trim()).filter(Boolean));

  const dateTypeCounts={};
  orders.forEach(o=>{ if(o.dateType){ dateTypeCounts[o.dateType]=(dateTypeCounts[o.dateType]||0)+1; } });
  const dateTypeEntries=Object.entries(dateTypeCounts).sort((a,b)=>b[1]-a[1]);

  const custQty={};
  orders.forEach(o=>{
    const key=(o.mobile||o.customerName||'').trim();
    if(!key)return;
    if(!custQty[key])custQty[key]={name:o.customerName||'—',mobile:o.mobile||'—',qty:0};
    custQty[key].qty+=Number(o.qtyCartons)||0;
  });
  const topCustomers=Object.values(custQty).sort((a,b)=>b.qty-a.qty).slice(0,5);

  /* تفصيل التقرير حسب القسم — فاكيوم / دبس / عجينة، كل قسم بأرقامه لوحده */
  const departments=['فاكيوم','دبس','عجينة'].map(deptName=>{
    const deptOrders=orders.filter(o=>o.processingType===deptName);
    const deptMfg=deptOrders.filter(o=>(o.qtyMfg||'').toString().trim());
    const deptDelivered=deptOrders.filter(o=>o.status==='تم التسليم');
    const round2=n=>Math.round((n+Number.EPSILON)*100)/100;
    const receivedQty=round2(deptOrders.reduce((s,o)=>s+(Number(o.qtyCartons)||0),0));
    const mfgQty=round2(deptMfg.reduce((s,o)=>s+(Number(o.qtyMfg)||0),0));
    const deliveredQty=round2(deptDelivered.reduce((s,o)=>s+(Number(o.qtyMfg)||Number(o.qtyCartons)||0),0));
    return {name:deptName,received:deptOrders.length,mfgCount:deptMfg.length,deliveredCount:deptDelivered.length,receivedQty,mfgQty,deliveredQty};
  });

  const deliveredWithDates=delivered.filter(o=>o.date&&o.lastEditedAt);
  let avgDays=null;
  if(deliveredWithDates.length){
    const totalDays=deliveredWithDates.reduce((s,o)=>{
      const d=(new Date(o.lastEditedAt).getTime()-new Date(o.date).getTime())/(1000*60*60*24);
      return s+Math.max(0,d);
    },0);
    avgDays=(totalDays/deliveredWithDates.length).toFixed(1);
  }

  return {start,end,label,rangeLabel,received,mfgCount:mfg.length,deliveredCount:delivered.length,
    bananaCartons,mfgCartonEntries,deliveredCartonEntries,customersCount:customersSet.size,
    dateTypeEntries,topDateType:dateTypeEntries[0]||null,topCustomers,avgDays,departments};
}

    `🍌 عدد كراتين الموز المستلمة: ${data.bananaCartons}`,
    `👥 عدد العملاء: ${data.customersCount}`,
    `⏱️ متوسط مدة التصنيع: ${data.avgDays!==null?data.avgDays+' يوم':'—'}`,
  ];
  if(data.topDateType)lines.push(`🌴 أكثر نوع تمر طلبًا: ${data.topDateType[0]} (${data.topDateType[1]} طلب)`);
  if(data.departments&&data.departments.length){
    lines.push('','🏭 تفصيل حسب القسم:');
    data.departments.forEach(d=>lines.push(`• ${d.name}: مستلم ${d.received} — مصنّع ${d.mfgCount} (${d.mfgQty} كرتون) — مسلَّم ${d.deliveredCount} (${d.deliveredQty} كرتون)`));
  }
  if(data.mfgCartonEntries.length){
    lines.push('','📦 كراتين مصنّعة حسب الحجم:');
    data.mfgCartonEntries.forEach(([size,qty])=>lines.push(`• ${size}: ${qty}`));
  }
  if(data.topCustomers.length){
    lines.push('','🏆 أكثر 5 عملاء من حيث كمية الكراتين:');
    data.topCustomers.slice(0,5).forEach((c,i)=>lines.push(`${i+1}. ${c.name} — ${c.qty} كرتون`));
  }
  lines.push('','مقدم التقرير: مصطفى أمين - قسم المبيعات');
  return lines.join('\n');
}

/* طباعة وتصدير Excel بنفس الفلتر الحالي لصفحات التصنيع (فاكيوم/دبس/عجينة/تعقيم) — بنفس أسلوب سجل الطلبات بالظبط */
async function exportProductionFilteredExcel(view){
  if(!window.XLSX){ toast('تعذّر تحميل مكتبة Excel — تأكد من الاتصال بالإنترنت','error'); return; }
  toast('جارٍ تجهيز ملف Excel…');
  await fullRefresh();
  const {orders,type}=getFilteredProductionOrders(view);
  if(!orders.length){ toast('لا توجد بيانات مطابقة للفلتر الحالي للتصدير','error'); return; }
  const headers=['التاريخ','رقم السند','اسم العميل','رقم الجوال','نوع التمر','الكمية المستلمة','الكمية المصنعة','حجم العبوة','حجم الكرتون','الأولوية','موقع التسكين','الحالة','ملاحظات التصنيع','آخر تعديل بواسطة','تاريخ التعديل'];
  const rows=orders.map(o=>[
    formatDate(o.date),o.receiptNo||'',o.customerName||'',o.mobile||'',o.dateType||'',o.qtyCartons||'',o.qtyMfg||'',
    o.packageSize||'',o.cartonSize||'',o.urgent?'مستعجل':'عادي',o.placementLocation||'',statusLabel(o.status)||'',o.processingNotes||'',
    o.lastEditedBy||'',formatDateTime(o.lastEditedAt||'')]);
  const ws=XLSX.utils.aoa_to_sheet([headers,...rows]);
  ws['!cols']=headers.map(()=>({wch:16}));
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,`خط ${type} مفلتر`.slice(0,31));
  XLSX.writeFile(wb,`خط-${type}-مفلتر-${todayIso()}.xlsx`);
  toast(`تم تصدير ${orders.length} طلب بنفس الفلتر الحالي`);
}

          <div class="field" id="urgent-field-wrap" style="${(o.processingType||PROCESSING_TYPES[0])==='فاكيوم'?'':'display:none;'}"><label class="toggle"><input type="checkbox" name="urgent" ${o.urgent?'checked':''}><span class="track"></span>مستعجل</label></div>

          <div class="field span2" id="vacuum-services-wrap" style="${(o.processingType||PROCESSING_TYPES[0])==='فاكيوم'?'':'display:none;'}">
            <label style="color:#1F6FA8;font-size:13px;">🔵 خدمات الفاكيوم</label>
            <div style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:6px;">
              ${VACUUM_SERVICES.map(s=>`<div class="check-row" style="min-width:140px;"><input type="checkbox" id="vs-${escapeHtml(s)}" name="vs-${escapeHtml(s)}" ${(isEdit?(o.vacuumServices||[]).includes(s):s==='سحب هواء')?'checked':''}><label for="vs-${escapeHtml(s)}">${escapeHtml(s)}</label></div>`).join('')}

            <div class="field" id="cond-detail-wrap" style="margin-top:6px;${dCond.hasNotes?'':'display:none;'}">
              <label>تفاصيل الملاحظة</label>
              <textarea id="cond-detail" rows="2">${escapeHtml(dCond.detail||'')}</textarea>
            </div>
          </div>
          <div class="field span2"><label>ملاحظات التصنيع</label><textarea name="processingNotes" rows="2">${escapeHtml(o.processingNotes||'')}</textarea></div>
        </div>
        <datalist id="date-types">${dateTypesList().map(d=>`<option value="${escapeHtml(d)}">`).join('')}</datalist>
        <datalist id="customer-names-list">${knownCustomerNames.map(n=>`<option value="${escapeHtml(n)}">`).join('')}</datalist>
        <datalist id="package-sizes-list">${(initialSizes.packageSizes||[]).map(d=>`<option value="${escapeHtml(d)}">`).join('')}</datalist>
        <datalist id="carton-sizes-list">${(initialSizes.cartonSizes||[]).map(d=>`<option value="${escapeHtml(d)}">`).join('')}</datalist>
        <div class="modal-foot">
          <button type="button" class="btn btn-ghost" id="modal-cancel">إلغاء</button>
          <button type="button" class="btn btn-primary" id="submit-order-btn">${isEdit?'حفظ التعديلات':'تسجيل الطلب'}</button>
        </div>
      </div>
    </div>
  </div>`;

  const close=()=>{ byId('modal-root').innerHTML=''; state.modalOpen=false; };
  /* إغلاق بتلاشي 200ms بعد حفظ الطلب بنجاح */
  const closeWithFade=()=>{
    const ov=byId('overlay');
    if(!ov){ close(); return; }
    ov.classList.add('closing');
    setTimeout(close,200);
  };
  byId('modal-close').addEventListener('click',close);
  byId('modal-cancel').addEventListener('click',close);
  /* لا نغلق عند الضغط خارج النافذة هنا عمدًا — عشان منع فقدان بيانات الطلب اللي بيتسجل بالغلط */

  const formEl=byId('order-form');
  const flcBtn=byId('btn-fill-last-customer');
  if(flcBtn)flcBtn.addEventListener('click',()=>{
    const last=sortedOrders(state.orders)[0];
    if(!last){ toast('لا يوجد طلبات سابقة','error'); return; }
    formEl.querySelector('[name="customerName"]').value=last.customerName||'';
    formEl.querySelector('[name="mobile"]').value=last.mobile||'';
    toast('تم تعبيه اسم ورقم جوال آخر عميل');
  });
  /* لما يُكتب أو يُختار اسم عميل معروف سبق تسجيله، نعبّي رقم جواله تلقائيًا لو حقل الجوال لسه فاضي */
  const customerNameInput=formEl.querySelector('[name="customerName"]');
  const mobileInput=formEl.querySelector('[name="mobile"]');
  if(customerNameInput&&mobileInput){
    customerNameInput.addEventListener('input',()=>{
      const nm=customerNameInput.value.trim();
      if(nm&&customerMobileMap[nm]&&!mobileInput.value.trim())mobileInput.value=customerMobileMap[nm];
    });
  }
  /* تحديث شارة حرف رقم السند (V/J/P/S) — أكبر حجمًا وبلون يمثل نوع الخدمة */
  const receiptNoInput=byId('receipt-no-input');
  const receiptChip=byId('receipt-letter-chip');
  const updateReceiptChip=()=>{
    const val=(receiptNoInput.value||'').trim();
    const letter=val.charAt(0).toUpperCase();
    const color=receiptLetterColor(letter);
    if(color){ receiptChip.textContent=letter; receiptChip.style.color=color; }
    else{ receiptChip.textContent=''; }
  };
  updateReceiptChip();
  receiptNoInput.addEventListener('input',updateReceiptChip);
  /* تنبيه فوري لو حجم العبوة/الكرتون المختارين لطلب دبس مش موجودين معًا في جدول الأسعار، عشان الموظف يصحّحه وهو بيسجل الطلب مش بعدين في الحاسبة */
  const packageSizeInput=formEl.querySelector('[name="packageSize"]');
  const cartonSizeInput=formEl.querySelector('[name="cartonSize"]');
  const dibsWarnEl=byId('dibs-size-warn');
  const updateDibsSizeWarn=()=>{
    if(!dibsWarnEl)return;
    const isDibsType=formEl.querySelector('[name="processingType"]').value==='دبس';
    const ps=packageSizeInput.value.trim(), cs=cartonSizeInput.value.trim();
    const shouldWarn=isDibsType&&ps&&cs&&!matchWeightRowIn(getDibsWeightTable(),ps,cs);
    dibsWarnEl.style.display=shouldWarn?'':'none';
  };
  if(packageSizeInput&&cartonSizeInput){
    packageSizeInput.addEventListener('input',updateDibsSizeWarn);
    cartonSizeInput.addEventListener('input',updateDibsSizeWarn);
    updateDibsSizeWarn();
  }
  const procSelect=formEl.querySelector('[name="processingType"]');
  procSelect.addEventListener('change',()=>{ 
    const sz=typeSizes(procSelect.value);
    byId('package-sizes-list').innerHTML=(sz.packageSizes||[]).map(s=>`<option value="${escapeHtml(s)}">`).join('');
    byId('carton-sizes-list').innerHTML=(sz.cartonSizes||[]).map(s=>`<option value="${escapeHtml(s)}">`).join('');
    updateDibsSizeWarn();
    const vsw=byId('vacuum-services-wrap');
    if(vsw)vsw.style.display=procSelect.value==='فاكيوم'?'':'none';
    const ufw=byId('urgent-field-wrap');
    if(ufw){
      ufw.style.display=procSelect.value==='فاكيوم'?'':'none';
      if(procSelect.value!=='فاكيوم'){ const cb=ufw.querySelector('input[name="urgent"]'); if(cb)cb.checked=false; }
    }
    const dcw=byId('date-condition-wrap');
    if(dcw)dcw.style.display=procSelect.value==='فاكيوم'?'none':'';
    /* تحديث رقم السند تلقائيًا عند تغيير نوع التصنيع (طلب جديد فقط) */
    if(!isEdit){
      const rnInp=formEl.querySelector('[name="receiptNo"]');
      if(rnInp)rnInp.value=nextReceiptNo(procSelect.value);
    }
    updateReceiptChip();
  });
  const condGood=byId('cond-good'),condNotes=byId('cond-hasnotes'),condWrap=byId('cond-detail-wrap');
  condGood.addEventListener('change',()=>{ if(condGood.checked){condNotes.checked=false;condWrap.style.display='none';} });
  condNotes.addEventListener('change',()=>{ if(condNotes.checked){condGood.checked=false;condWrap.style.display='';}else{condWrap.style.display='none';} });

  /* أخرى toggle */
  const dtOtherCb=formEl.querySelector('#dt-أخرى');
  const dtOtherInput=formEl.querySelector('#dateTypeOther-input');
  if(dtOtherCb&&dtOtherInput){
    dtOtherCb.addEventListener('change',()=>{ dtOtherInput.style.display=dtOtherCb.checked?'':'none'; });
  }

  byId('submit-order-btn').addEventListener('click',async()=>{
    const get=n=>formEl.querySelector(`[name="${n}"]`);
    formEl.querySelectorAll('.field-error').forEach(el=>el.classList.remove('field-error'));
    const dateVal=get('date').value, receiptNoVal=get('receiptNo').value.trim();
    const customerNameVal=get('customerName').value.trim(), processingTypeVal=get('processingType').value;
    const mobileRaw=get('mobile').value.trim();
    const qtyVal=get('qtyCartons').value.trim();
    const pkgVal=get('packageSize').value.trim();
    const ctnVal=get('cartonSize').value.trim();
    const selectedDateTypes=['خلاص','شيشي','رزيز','مشكل','برحي','حاتمي','شهيل','أخرى'].filter(d=>formEl.querySelector(`#dt-${d}`)?.checked);
    let firstInvalid=null,errorMsg='';
    if(!dateVal){firstInvalid=get('date');errorMsg='التاريخ مطلوب';}
    else if(!receiptNoVal){firstInvalid=get('receiptNo');errorMsg='رقم السند مطلوب';}
    else if(!customerNameVal){firstInvalid=get('customerName');errorMsg='اسم العميل مطلوب';}
    else if(!mobileRaw||!/^\d{10}$/.test(mobileRaw)){firstInvalid=get('mobile');errorMsg='رقم الجوال مطلوب (10 أرقام)';}
    else if(!qtyVal){firstInvalid=get('qtyCartons');errorMsg='كمية الكراتين مطلوبة';}
    else if(!selectedDateTypes.length){errorMsg='اختر نوع التمر';const cb=formEl.querySelector('#dt-خلاص');firstInvalid=cb;}
    else if(!processingTypeVal){firstInvalid=get('processingType');errorMsg='نوع التصنيع مطلوب';}
    else if(!pkgVal){firstInvalid=get('packageSize');errorMsg='حجم العبوة مطلوب';}
    else if(!ctnVal){firstInvalid=get('cartonSize');errorMsg='حجم الكرتون مطلوب';}
    if(firstInvalid){firstInvalid.classList.add('field-error');firstInvalid.focus();toast(errorMsg,'error');return;}
    if(errorMsg&&!firstInvalid){toast(errorMsg,'error');return;}
    const dupExists=state.orders.some(ord=>ord.receiptNo===receiptNoVal&&(!isEdit||ord.id!==o.id));
    if(dupExists){ get('receiptNo').classList.add('field-error'); toast('رقم السند موجود بالفعل','error'); return; }
    const dateTypeOtherVal=(formEl.querySelector('#dateTypeOther-input')?.value||'').trim();
    const selectedCartonTypes=CARTON_TYPES.filter((ct,cti)=>formEl.querySelector(`#ctype-${cti}`)?.checked);
    /* خدمات الفاكيوم المختارة فعليًا من صناديق الاختيار (تشمل سحب هواء — قابلة للإزالة الآن) */
    const vacuumServices=processingTypeVal==='فاكيوم'?VACUUM_SERVICES.filter(s=>formEl.querySelector(`[name="vs-${s}"]`)?.checked):[];
    const payload={
      date:dateVal,receiptNo:receiptNoVal,customerName:customerNameVal,
      mobile:mobileRaw,
      dateTypes:selectedDateTypes,
      dateType:(()=>{ const disp=selectedDateTypes.map(d=>d==='أخرى'?(dateTypeOtherVal||'أخرى'):d); return disp.length===1?disp[0]:disp.join('،'); })(),
      dateTypeOther:dateTypeOtherVal,
      qtyCartons:qtyVal,processingType:processingTypeVal,
      cartonTypes:selectedCartonTypes,
      status:isEdit?o.status||'جديد':'جديد',
      packageSize:pkgVal,cartonSize:ctnVal,urgent:get('urgent').checked,
      processingNotes:get('processingNotes').value.trim(),
      vacuumServices,
      dateCondition:{good:byId('cond-good').checked,hasNotes:byId('cond-hasnotes').checked,detail:byId('cond-detail').value.trim()},
    };
    if(isEdit){
      const ok=await updateOrder(o.id,payload,'تم حفظ التعديلات');
      if(ok&&processingTypeVal==='فاكيوم')await syncExtraServiceRecords(payload,vacuumServices);
    }else{
      const ok=await addOrder(payload);
      if(ok&&processingTypeVal==='فاكيوم')await syncExtraServiceRecords(payload,vacuumServices);
    }
    closeWithFade();
  });
}

/* خدمات "تقعيم تمور" و"حشو لوز" — إذا اختيرت مع الفاكيوم (عند التسجيل أو التعديل) تُنشئ نسخة في صفحة الخدمات الإضافية أيضاً، بدون تكرار سجل موجود لنفس رقم السند ونفس الخدمة */
async function syncExtraServiceRecords(payload,extraVacSvcs){
  const extraForServices=extraVacSvcs.filter(s=>VACUUM_SERVICES_EXTRA.includes(s));
  if(!extraForServices.length)return;
  const existingTypes=state.serviceOrders.filter(so=>so.receiptNo===payload.receiptNo).map(so=>so.serviceType);
  const toCreate=extraForServices.filter(s=>!existingTypes.includes(s));
  const created=[],failed=[];
  for(const svc of toCreate){
    const ok=await addServiceOrder({
      date:payload.date,receiptNo:payload.receiptNo,customerName:payload.customerName,
      dateTypes:payload.dateTypes||[],dateType:payload.dateType,serviceType:svc,
      qtyReceived:payload.qtyCartons||'',qtyMfg:'',mfgDate:'',notes:'',serviceSource:'auto',urgent:!!payload.urgent,
    },true);
    if(ok)created.push(svc); else failed.push(svc);
  }
  if(created.length>0)toast(`✅ نُسخ سند ${payload.receiptNo||''} إلى الخدمات الإضافية (${created.join('، ')})`,'ok',5000);
  if(failed.length>0)toast(`⚠️ تعذّر نسخ (${failed.join('، ')}) إلى الخدمات الإضافية — جرّب الحفظ مرة أخرى`,'error',6000);
  if(created.length===0&&failed.length===0)toast(`ℹ️ سند ${payload.receiptNo||''} موجود بالفعل في الخدمات الإضافية`,'ok',3500);
}

async function exportBackupCSV(){
  toast('جارٍ تجهيز النسخة الاحتياطية…');
  await fullRefresh();
  const headers=['التاريخ','رقم السند','اسم العميل','رقم الجوال','نوع التمر','الكمية المستلمة','الكمية المصنعة','تاريخ التصنيع','نوع التصنيع','حجم العبوة','حجم الكرتون','حالة التمر','تفاصيل حالة التمر','موقع التسكين','الأولوية','الحالة','ملاحظات التصنيع','آخر تعديل بواسطة','تاريخ التعديل'];
  const rows=sortedOrders(state.orders).map(o=>{
    const c=o.dateCondition||{};
    return[formatDate(o.date),o.receiptNo,o.customerName,o.mobile,o.dateType,o.qtyCartons,o.qtyMfg||'',o.mfgDate?formatDate(o.mfgDate):'',
      o.processingType,o.packageSize,o.cartonSize,
      c.hasNotes?'به ملاحظات':(c.good?'جيد':''),c.detail||'',o.placementLocation||'',
      o.urgent?'مستعجل':'عادي',statusLabel(o.status),o.processingNotes,
      o.lastEditedBy||'',formatDateTime(o.lastEditedAt||'')];
  });
  const esc=v=>{ const s=String(v??''); return/[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s; };
  const csv='\uFEFF'+[headers,...rows].map(r=>r.map(esc).join(',')).join('\r\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download=`نسخة-احتياطية-${todayIso()}.csv`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  toast('تم تصدير النسخة الاحتياطية');
}

/* ============== طباعة/تصدير لوحة التحكم: PNG / PowerPoint / Excel / طباعة مباشرة (خاص بالمسؤول) ============== */
async function captureChartsCanvas(){
  if(!window.html2canvas){ toast('تعذّر تحميل مكتبة التصوير — تأكد من الاتصال بالإنترنت','error'); return null; }
  const el=byId('dashboard-print-area');
  if(!el){ toast('لا توجد بيانات لتصديرها','error'); return null; }
  toast('جارٍ تجهيز لوحة التحكم…');
  try{
    return await html2canvas(el,{backgroundColor:'#ffffff',scale:2});
  }catch(e){ toast('تعذّر إنشاء صورة لوحة التحكم','error'); return null; }
}
/* تصوير صفحة التقرير كصورة، وإرسالها مباشرة كملف عبر شاشة المشاركة (تظهر فيها واتساب) —
   ده أقرب حاجة ممكنة لإرسال "صورة/ملف" تلقائي، لأن واتساب مفيش له رابط رسمي بيرفق ملفات لوحده.
   لو المتصفح مش بيدعم مشاركة الملفات (غالبًا أجهزة الكمبيوتر)، بننزّل الصورة تلقائيًا
   ونفتح واتساب بالنص جاهز، والمستخدم يرفق الصورة يدويًا بضغطة واحدة. */
async function captureReportCanvas(){
  if(!window.html2canvas){ toast('تعذّر تحميل مكتبة التصوير — تأكد من الاتصال بالإنترنت','error'); return null; }
  const el=byId('report-print-area');
  if(!el){ toast('لا يوجد تقرير لتصديره','error'); return null; }
  /* نخفي مؤقتًا صندوق الإرسال والتذييل عشان الصورة توقف عند آخر اسم في جدول "أكثر 5 عملاء" ومتجيبش حاجة بعده */
  const toHide=[...el.querySelectorAll('.report-send-box,.report-footer')];
  const prevDisplay=toHide.map(x=>x.style.display);
  toHide.forEach(x=>{ x.style.display='none'; });
  try{
    return await html2canvas(el,{backgroundColor:'#ffffff',scale:2});
  }catch(e){ toast('تعذّر إنشاء صورة التقرير','error'); return null; }
  finally{ toHide.forEach((x,i)=>{ x.style.display=prevDisplay[i]; }); }
}
async function shareReportAsImage(waNumber,text){
  toast('جارٍ تجهيز صورة التقرير…');
  const canvas=await captureReportCanvas();
  if(!canvas)return false;
  const blob=await new Promise(res=>canvas.toBlob(res,'image/png'));
  if(!blob){ toast('تعذّر إنشاء صورة التقرير','error'); return false; }
  const fileName=`تقرير-${todayIso()}.png`;
  const file=new File([blob],fileName,{type:'image/png'});
  if(navigator.canShare&&navigator.canShare({files:[file]})){
    try{
      await navigator.share({files:[file],text,title:'تقرير'});
      return true;
    }catch(e){ if(e&&e.name==='AbortError')return true; /* المستخدم لغى المشاركة، مفيش داعي لأي فولباك */ }
  }
  /* فولباك: تنزيل الصورة + فتح واتساب بنص التقرير، والمستخدم يرفق الصورة بنفسه */
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=fileName;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  if(waNumber)window.open(`https://wa.me/${waNumber}?text=${encodeURIComponent(text)}`,'_blank');
  toast('تم تنزيل صورة التقرير — أرفقها يدويًا في واتساب اللي هيتفتح بجانبها');
  return false;
}

async function exportChartsPPTX(){
  if(!window.PptxGenJS){ toast('تعذّر تحميل مكتبة PowerPoint — تأكد من الاتصال بالإنترنت','error'); return; }
  const canvas=await captureChartsCanvas();
  if(!canvas)return;
  try{
    const imgData=canvas.toDataURL('image/png');
    const ratio=canvas.height/canvas.width;
    const pptx=new window.PptxGenJS();
    const slide=pptx.addSlide();
    slide.addText('الرسومات البيانية — لوحة التحكم',{x:0.3,y:0.2,fontSize:18,bold:true,color:'1F3325',align:'right',w:9.4});
    let w=9.2,h=w*ratio;
    if(h>4.7){ h=4.7; w=h/ratio; }
    slide.addImage({data:imgData,x:(10-w)/2,y:0.95,w,h});
    await pptx.writeFile({fileName:`رسومات-بيانية-${todayIso()}.pptx`});
    toast('تم تنزيل ملف PowerPoint');
  }catch(e){ toast('تعذّر إنشاء ملف PowerPoint','error'); }
}
async function exportChartsXLSX(){
  if(!window.ExcelJS){ toast('تعذّر تحميل مكتبة Excel المتقدمة — تأكد من الاتصال بالإنترنت','error'); return; }
  const canvas=await captureChartsCanvas();
  if(!canvas)return;
  try{
    const imgData=canvas.toDataURL('image/png');
    const wb=new window.ExcelJS.Workbook();
    const ws=wb.addWorksheet('الرسومات البيانية');
    const imgId=wb.addImage({base64:imgData,extension:'png'});
    ws.addImage(imgId,{tl:{col:0,row:0},ext:{width:canvas.width/2,height:canvas.height/2}});
    const buf=await wb.xlsx.writeBuffer();
    const blob=new Blob([buf],{type:'application/octet-stream'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download=`رسومات-بيانية-${todayIso()}.xlsx`; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);
    toast('تم تنزيل ملف Excel');
  }catch(e){ toast('تعذّر إنشاء ملف Excel','error'); }
}

/* رقم الأسبوع بمعيار ISO — يُستخدم لمعرفة هل بدأ أسبوع جديد أم لا */
function isoWeekKey(d){
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=(date.getUTCDay()+6)%7;
  date.setUTCDate(date.getUTCDate()-dayNum+3);
  const firstThursday=new Date(Date.UTC(date.getUTCFullYear(),0,4));
  const week=1+Math.round(((date-firstThursday)/86400000-3+((firstThursday.getUTCDay()+6)%7))/7);
  return `${date.getUTCFullYear()}-W${String(week).padStart(2,'0')}`;
}
/* تصدير تلقائي (يومي وأسبوعي) بدون أي ضغطة زر — يعمل مرة واحدة فقط لكل يوم/أسبوع أول ما المسؤول يفتح التطبيق.
   ملاحظة: بما إن التطبيق يعمل من المتصفح فقط بدون سيرفر، فهو "تلقائي" بمعنى إنه ميحتاجش ضغطة زر،
   لكنه بيشتغل وقت ما تفتح التطبيق فعليًا (مش وانت مقفل الصفحة). */
async function maybeRunAutoExport(){
  try{
    if(!isAdmin())return;
    const cfg=currentConfig();
    if(cfg.autoExportEnabled===false)return;
    if(!window.XLSX)return;
    if(!state.orders.length)return;
    const todayKey=todayIso();
