<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طلبات - مصنع تمور مزرعة الرفايع</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#2F7A4D">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="سجل الطلبات">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  --bg:#F2F8EF; --surface:#FFFFFF; --surface-2:#EAF3E4;
  --ink:#1F3325; --ink-soft:#5E7868; --border:#D6E8CC;
  --accent:#2F7A4D; --accent-soft:#DCEFDF; --accent-dark:#225C3A;
  --gold:#B8862E; --gold-soft:#F2E7C9;
  --ready:#2C7DA0; --ready-soft:#D9EAF1;
  --danger:#A23B33; --danger-soft:#F3DCDA;
  --shadow:0 8px 24px rgba(31,51,37,0.08); --radius:14px;
}
html[data-theme="dark"]{
  --bg:#12181A; --surface:#1B2325; --surface-2:#212B2D;
  --ink:#E7F0E4; --ink-soft:#93A79A; --border:#2C3A38;
  --accent:#42A96A; --accent-soft:#1E3A2A; --accent-dark:#5FC988;
  --gold:#D9A94A; --gold-soft:#3A3220;
  --ready:#4FA8D8; --ready-soft:#173544;
  --danger:#E06B60; --danger-soft:#3B2222;
  --shadow:0 8px 24px rgba(0,0,0,0.35);
}
html[data-theme="dark"] body{background:var(--bg);}
html[data-theme="dark"] .toast-action-btn{color:#12181A;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;font-weight:700;min-height:100vh;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4,.brand-title,.nav-item,.btn,.stat-label{font-family:'Cairo',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;direction:ltr;unicode-bidi:isolate;display:inline-block;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

/* ---------- offline banner ---------- */
:root{ --offline-banner-h:58px; }
.offline-banner{
  display:none;align-items:center;justify-content:center;gap:12px;
  position:fixed;top:0;left:0;right:0;height:var(--offline-banner-h);
  background:linear-gradient(90deg,#A23B33,#C0392B,#A23B33);background-size:200% 100%;
  color:#fff;font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;
  box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:99999;padding:0 16px;text-align:center;
  animation:offlineBannerSlide .35s ease-out,offlineBannerGradient 2.4s linear infinite;
}
body.offline-active .offline-banner{display:flex;}
body.offline-active{padding-top:var(--offline-banner-h);}
body.offline-active .sidebar{top:var(--offline-banner-h);height:calc(100vh - var(--offline-banner-h));}
body.offline-active .search-toolbar-sticky{top:var(--offline-banner-h);}
@media (max-width:900px){ body.offline-active{padding-top:0;padding-bottom:var(--offline-banner-h);} body.offline-active .offline-banner{top:auto;bottom:0;} body.offline-active .sidebar{top:auto;} }
.offline-banner-icon{font-size:26px;flex-shrink:0;animation:offlineIconPulse 1.1s ease-in-out infinite;}
.offline-banner-text strong{font-size:15.5px;}
@keyframes offlineBannerSlide{from{transform:translateY(-100%);}to{transform:translateY(0);}}
@keyframes offlineBannerGradient{0%{background-position:0% 50%;}100%{background-position:200% 50%;}}
@keyframes offlineIconPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.28);opacity:.65;}}
@media(prefers-reduced-motion:reduce){.offline-banner{animation:none;}.offline-banner-icon{animation:none;}}

/* ---------- layout ---------- */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex-shrink:0;background:var(--surface);
  border-left:1px solid var(--border);padding:26px 16px;
  display:flex;flex-direction:column;gap:4px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:0 8px 14px;}
.today-dates{padding:0 8px 14px;margin-bottom:14px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:4px;}
.today-date-row{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11.5px;}
.today-date-label{color:var(--ink-soft);font-weight:700;}
.today-date-val{color:var(--accent-dark);font-weight:700;font-size:12px;}
.brand-mark{width:34px;height:34px;flex-shrink:0;border-radius:9px;object-fit:cover;display:block;}
.brand-title{font-size:15.5px;font-weight:800;color:var(--accent-dark);line-height:1.25;}
.brand-sub{font-size:11px;color:var(--ink-soft);margin-top:2px;}

.nav-item{
  display:flex;align-items:center;gap:10px;text-align:right;width:100%;
  background:transparent;border:none;cursor:pointer;
  padding:11px 12px;border-radius:10px;
  font-size:14px;font-weight:700;color:var(--ink-soft);
  transition:background .15s,color .15s;
}
.nav-item .nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.nav-item:hover{background:var(--surface-2);color:var(--ink);}
.nav-item.active{background:var(--accent);color:#fff;}

/* مؤشر المسؤول — لون أورانج مميز */
body.user-admin .nav-item.active{background:#E67E22;color:#fff;}
body.user-admin .sidebar{border-left:3px solid #E67E22;}
.admin-indicator{display:none;}
body.user-admin .admin-indicator{display:flex;align-items:center;gap:6px;background:#FFF3E0;border:1px solid #E67E22;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#E67E22;margin-bottom:8px;}
@keyframes adminPulse{0%,100%{opacity:1;}50%{opacity:.55;}}
body.user-admin .admin-indicator .dot{width:8px;height:8px;border-radius:50%;background:#E67E22;animation:adminPulse 1.4s infinite;}

/* page-level colour tinting for production pages — each line gets its own accent
   so buttons / status dots / badges / focus rings inherit the line's colour.
   Dashboard, registry, search and settings keep the default green theme. */
body.page-vacuum .main{ --page-tint:#EAF4FB; --accent:#1F6FA8; --accent-soft:#D7E9F5; --accent-dark:#154D74; }
body.page-dibs   .main{ --page-tint:#FEFAE6; --accent:#B8860B; --accent-soft:#F7ECC6; --accent-dark:#7A5907; }
body.page-dough  .main{ --page-tint:#F5EDE3; --accent:#A9745B; --accent-soft:#EFE0D3; --accent-dark:#74503D; }
body.page-sterilize .main{ --page-tint:#F0F0F2; --accent:#7F8C8D; --accent-soft:#E3E6E6; --accent-dark:#54605F; }
body.page-services .main{ --page-tint:#F5F0FF; --accent:#7B2FBE; --accent-soft:#EDE3FF; --accent-dark:#52108A; }
body.page-customers .main{ --page-tint:#FDF1F6; --accent:#C2185B; --accent-soft:#FCE4EC; --accent-dark:#880E4F; }
body.page-warehouse .main{ --page-tint:#FBF2E9; --accent:#B5651D; --accent-soft:#F3E0C8; --accent-dark:#7A3E0F; }
.main{background:var(--page-tint,var(--bg));transition:background .3s;}
.btn-scroll-top{position:fixed;left:22px;bottom:26px;height:44px;padding:0 18px;border-radius:24px;background:#2F7A4D;color:#fff;border:none;font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.25);display:flex;align-items:center;gap:6px;opacity:0;visibility:hidden;transform:translateY(12px);transition:opacity .2s,transform .2s,visibility .2s;z-index:80;}
.btn-scroll-top.show{opacity:1;visibility:visible;transform:translateY(0);}
.btn-scroll-top:hover{filter:brightness(1.1);background:#276A42;}
@media (max-width:900px){.btn-scroll-top{left:14px;bottom:80px;height:40px;padding:0 14px;font-size:13px;}}

.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--ink-soft);}
.user-chip{background:var(--surface-2);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.user-chip .greeting{font-size:13px;font-weight:800;color:var(--accent-dark);margin-bottom:2px;}
.user-chip .role{font-size:10.5px;color:var(--ink-soft);}
.user-chip .last-login{font-size:10px;color:var(--ink-soft);margin-top:4px;}
.logout-btn{margin-top:6px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 9px;font-size:11px;cursor:pointer;color:var(--danger);width:100%;}
.logout-btn:hover{background:var(--danger-soft);}

.main{flex:1;padding:30px 36px 60px;max-width:1560px;min-width:0;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.page-title{font-size:22px;font-weight:800;margin:0;}
.page-desc{font-size:13px;color:var(--ink-soft);margin-top:4px;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.theme-toggle-btn{width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);}
.theme-toggle-btn:hover{filter:brightness(1.05);}
.topbar-user{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 8px 6px 16px;box-shadow:var(--shadow);}
.topbar-avatar{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1E7A46,#2F7A4D);color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px;flex-shrink:0;box-shadow:0 2px 6px rgba(30,122,70,.35);}
.topbar-user-text{display:flex;flex-direction:column;line-height:1.25;}
.topbar-name{font-weight:800;font-size:13px;color:var(--ink);white-space:nowrap;}
.topbar-role{font-size:10.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap;}
.topbar-user .logout-btn-top{background:var(--danger-soft);color:var(--danger);border:none;border-radius:999px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer;transition:background .15s;}
.topbar-user .logout-btn-top:hover{background:var(--danger);color:#fff;}
.search-toolbar-sticky{position:sticky;top:0;z-index:30;background:var(--page-tint,var(--bg));padding:10px 0;margin:0 0 16px;box-shadow:0 6px 14px -10px rgba(0,0,0,.25);}

/* ---------- buttons & inputs ---------- */
.btn{appearance:none;border:none;cursor:pointer;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:transform .1s,filter .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--border);}
.btn-ghost:hover{background:#DEF0D6;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
.icon-btn{background:transparent;border:1px solid var(--border);cursor:pointer;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:14px;}
.icon-btn:hover{background:var(--surface-2);color:var(--ink);}
.icon-btn.danger:hover{background:var(--danger-soft);color:var(--danger);}

input,select,textarea{width:100%;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--border);border-radius:9px;padding:9px 11px;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
.field-error{border-color:var(--danger)!important;outline:2px solid var(--danger)!important;}
label{font-size:12.5px;font-weight:700;color:var(--ink-soft);display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}
.hint{font-size:11px;color:var(--ink-soft);margin-top:4px;}

/* receipt no: big red mono — auto-generated codes (0001, 0002…) get extra emphasis everywhere */
.receipt-input{color:#C0392B!important;font-size:19px!important;font-weight:800!important;font-family:'JetBrains Mono',monospace!important;letter-spacing:.5px;}
.receipt-display{color:#C0392B;font-size:18.5px;font-weight:800;font-family:'JetBrains Mono',monospace;direction:ltr;display:inline-block;letter-spacing:.5px;}
.days-counter{font-size:10.5px;font-weight:700;margin-top:3px;white-space:nowrap;}
.days-counter-ok{color:var(--ink-soft);}
.days-counter-warn{color:#B8860B;}
.days-counter-danger{color:#C0392B;}
.days-counter-done{color:#2F7A4D;}
.qty-received{display:inline-block;background:#FEF6D9;color:#8A6500;font-weight:800;border-radius:7px;padding:1px 7px;font-size:12px;}
.qty-mfg-input{font-weight:800!important;font-size:16px!important;width:140px;color:#1F6FA8;}
.qty-mfg-display{font-weight:800;font-size:16px;color:#1F6FA8;}
.qty-mfg-empty{color:var(--ink-soft);font-weight:600;font-size:12px;}
.qty-mfg-date{font-size:10px;color:var(--ink-soft);font-weight:600;margin-top:2px;}

.search-box{position:relative;min-width:230px;flex:1;}
.search-box input{padding-right:34px;padding-left:30px;}
.search-box .ic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:14px;}
.search-clear-btn{position:absolute;left:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:13px;font-weight:800;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.search-clear-btn:hover{background:var(--surface-2);color:#C0392B;}

.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.toggle input{display:none;width:auto;}
.toggle .track{width:40px;height:22px;background:var(--border);border-radius:20px;position:relative;transition:background .15s;flex-shrink:0;}
.toggle .track::after{content:'';position:absolute;top:2px;right:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .15s;}
.toggle input:checked + .track{background:var(--accent);}
.toggle input:checked + .track::after{transform:translateX(-18px);}

.check-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
.check-row input{width:16px;height:16px;flex-shrink:0;}
.check-row label{margin:0;font-weight:600;color:var(--ink);font-size:13.5px;}

/* ---------- stat chips ---------- */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;min-width:120px;position:relative;}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;direction:ltr;display:block;}
.stat-label{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.stat-chip.urgent .stat-num{color:var(--danger);}
.stat-chip.progress .stat-num{color:var(--gold);}
.stat-chip.ready .stat-num{color:var(--ready);}

.chip-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;}
.chip-alert-icon{position:absolute;top:2px;right:6px;font-size:30px;line-height:1;animation:chipAlertBlink 1s infinite;filter:drop-shadow(0 0 3px rgba(0,0,0,.15));z-index:2;}
.chip-alert-icon.yellow{color:#F2C230;}
.chip-alert-icon.red{color:#E0483E;}
.chip-hint-label{font-size:10.5px;font-weight:800;color:var(--accent-dark);background:var(--accent-soft);border-radius:6px;padding:2px 8px;white-space:nowrap;}
@keyframes chipAlertBlink{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(1.2);}}
/* مثلث التحذير في لوحة التحكم (بطاقة "طلبات مستعجلة") — ساكن تمامًا لو العدد صفر، ويومض فقط لو فيه رقم */
.dash-icon-blink{display:inline-block;font-size:30px;}
.dash-icon-blink.is-active{animation:chipAlertBlink 1s infinite;}
/* المنبه الهزّاز في لوحة التحكم (بطاقة "طلبات متأخرة") — ساكن لو العدد صفر، وبيكبر شويه ويهتز ببطء أكتر لو فيه رقم */
.dash-icon-alarm{display:inline-block;font-size:38px;transform-origin:50% 15%;}
.dash-icon-alarm.is-ringing{font-size:42px;animation:alarmShake 2s ease-in-out infinite;}
@keyframes alarmShake{
  0%,100%{transform:rotate(0deg);}
  10%{transform:rotate(-18deg);}
  20%{transform:rotate(16deg);}
  30%{transform:rotate(-16deg);}
  40%{transform:rotate(14deg);}
  50%{transform:rotate(-12deg);}
  60%{transform:rotate(10deg);}
  70%{transform:rotate(-8deg);}
  80%{transform:rotate(6deg);}
  90%{transform:rotate(-3deg);}
}

/* ---------- badges ---------- */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.badge-new{background:var(--surface-2);color:var(--ink-soft);}
.badge-progress{background:var(--gold-soft);color:#8C6A1E;}
.badge-ready{background:var(--ready-soft);color:var(--ready);}
.badge-done{background:var(--accent-soft);color:var(--accent-dark);}
.badge-urgent{background:var(--danger-soft);color:var(--danger);}
.badge-normal{background:var(--surface-2);color:var(--ink-soft);}

/* ---------- card / table ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:20px 22px;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;min-width:760px;}
thead th{position:sticky;top:0;background:var(--surface-2);text-align:right;font-size:11.5px;color:var(--ink-soft);padding:9px 8px;border-bottom:2px solid var(--border);white-space:normal;line-height:1.3;}
tbody td{padding:9px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
/* عرض مضغوط للجداول — يقلل ارتفاع الصفوف والخط عشان تظهر بيانات أكتر من غير سكرول، بيتفعّل من زرار ☰ في الشريط العلوي */
html.compact-tables thead th{padding:5px 8px;font-size:10.5px;}
html.compact-tables tbody td{padding:4px 10px;font-size:12px;}
tbody tr:hover{background:var(--surface-2);}
.cell-notes textarea{min-height:38px;font-size:12.5px;resize:vertical;}
.empty-state{padding:50px 20px;text-align:center;color:var(--ink-soft);}
.empty-state .big{font-size:34px;margin-bottom:8px;}
.readonly-text{font-size:13px;color:var(--ink);}

/* edit audit row */
.audit-row{font-size:10.5px;color:var(--ink-soft);margin-top:3px;}

/* ---------- overdue orders: > 25 days ---------- */
@keyframes overdueFlash{0%,100%{background:transparent;}50%{background:#FEF0F0;}}
tr.overdue-row{background:#FEF8F8;}
tr.overdue-row:hover{background:#FDEDED!important;}
tr.overdue-row td:first-child::after{content:' 🔴';font-size:11px;}
tr.delivered-row,.result-card.delivered-row{opacity:.32;filter:saturate(.5);transition:opacity .15s,filter .15s;text-decoration:line-through;text-decoration-color:var(--ink-soft);}
tr.delivered-row select,tr.delivered-row input,tr.delivered-row textarea,tr.delivered-row button,
.result-card.delivered-row select,.result-card.delivered-row input,.result-card.delivered-row textarea,.result-card.delivered-row button,
tr.delivered-row .delivered-date,.result-card.delivered-row .delivered-date,
tr.delivered-row .delivered-check-label,.result-card.delivered-row .delivered-check-label{text-decoration:none;}
tr.delivered-row:hover,.result-card.delivered-row:hover{opacity:.85;filter:saturate(1);}
tr.archived-row{background:#FBF7EE;opacity:.55;filter:saturate(.6);}
tr.archived-row:hover{opacity:.85;filter:saturate(1);background:#F5EDD8!important;}
tr.archived-row td:first-child::after{content:' 🗄️';font-size:11px;}
.overdue-badge{display:inline-flex;align-items:center;gap:4px;background:#FDECEC;color:#C0392B;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;border:1px solid #F5C6C2;white-space:nowrap;}
.nearing-badge{display:inline-flex;align-items:center;gap:4px;background:#FEF6E0;color:#8A6500;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;border:1px solid #F2DB9A;white-space:nowrap;}
.filter-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13.5px;margin-bottom:12px;}
.filter-urgent{background:#FDECEC;color:#C0392B;border:1px solid #F5C6C2;}
.filter-nearing{background:#FEF6E0;color:#8A6500;border:1px solid #F2DB9A;}
/* عداد كبير أعلى الصفحة — يظهر رقم اليوم البارز في كل صفحة (طلبات مسجّلة/مصنّعة/مسكّنة اليوم) */
.big-day-counter{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-radius:14px;padding:16px 24px;margin-bottom:16px;box-shadow:0 4px 14px rgba(0,0,0,.14);}
.big-day-counter .bdc-icon{font-size:36px;line-height:1;}
.big-day-counter .bdc-num{font-size:34px;font-weight:900;line-height:1;}
.big-day-counter .bdc-label{font-size:13px;font-weight:700;opacity:.92;margin-top:3px;}
.delivered-period-box{display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 20px;margin-bottom:16px;box-shadow:var(--shadow);}
.delivered-period-box .dpc-icon{font-size:28px;line-height:1;}
.delivered-period-box .dpc-num{font-size:24px;font-weight:900;color:var(--accent-dark);line-height:1;}
.delivered-period-box .dpc-label{font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:2px;}
.delivered-period-box .dpc-select{margin-inline-start:auto;font-size:12.5px;padding:7px 8px;border-radius:8px;border:1.5px solid var(--border);}
.app-update-banner{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px;font-weight:800;font-size:13.5px;background:#1E7A46;color:#fff;position:sticky;top:0;z-index:50;}
.app-update-banner button{background:#fff;color:#1E7A46;border:none;border-radius:8px;padding:6px 14px;font-weight:800;font-size:13px;cursor:pointer;}
.app-update-banner button:hover{background:#EAF6EF;}
.btn-clear-filter{background:none;border:none;cursor:pointer;font-weight:800;font-size:13px;opacity:.7;padding:0;color:inherit;}
.btn-clear-filter:hover{opacity:1;text-decoration:underline;}
@keyframes overdueWarn{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.overdue-badge .warn-icon{animation:overdueWarn 0.8s ease-in-out infinite;display:inline-block;}
/* ---------- smaller status badge in table rows ---------- */
.badge-sm{font-size:10.5px!important;padding:2px 7px!important;border-radius:14px!important;}

/* ---------- search results ---------- */
.result-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.result-name{font-weight:700;font-size:18px;}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:14px;}
.result-grid .k{font-size:13px;color:var(--ink-soft);}
.result-grid .v{font-size:16px;font-weight:700;margin-top:3px;}
.search-hint{text-align:center;padding:40px 20px;color:var(--ink-soft);}
.search-hint .big{font-size:40px;margin-bottom:10px;}

/* ---------- settings ---------- */
.settings-section{margin-bottom:22px;}
.settings-section h3{font-size:15px;margin:0 0 4px;}
.settings-section .sec-desc{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.emp-table th,.emp-table td{font-size:13px;}
.pin-mono{font-family:'JetBrains Mono',monospace;direction:ltr;display:inline-block;}
.type-block{margin-bottom:18px;padding-bottom:16px;border-bottom:1px dashed var(--border);}
.type-block:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.type-block .type-name{font-weight:800;margin-bottom:8px;font-size:14.5px;color:var(--accent-dark);}
.logo-preview{width:60px;height:60px;border-radius:14px;object-fit:cover;border:1px solid var(--border);margin-bottom:10px;display:block;}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(31,51,37,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;animation:fadeIn .15s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
/* تلاشي 200ms عند إغلاق نافذة الطلب بعد الحفظ */
.overlay.closing{animation:overlayFadeOut .2s ease-in forwards;}
@keyframes overlayFadeOut{to{opacity:0;}}
.overlay.closing .modal{animation:modalFadeOut .2s ease-in forwards;}
@keyframes modalFadeOut{to{opacity:0;transform:scale(.97);}}
/* تكبير اسم العميل في جداول الطلبات */
.cell-customer-name{font-size:15.5px;}
/* مقابض سحب الأعمدة — تظهر للأدمن فقط لإعادة ترتيب الأعمدة */
th.col-draggable{cursor:grab;user-select:none;position:relative;}
th.col-draggable:hover{background:var(--accent-soft);}
th.col-draggable::after{content:'⋮⋮';position:absolute;left:4px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--ink-soft);letter-spacing:-2px;}
th.col-draggable.col-dragging{opacity:.4;}
/* أعمدة قابلة للفلترة — زر القمع بجانب اسم العمود + قائمة الفلترة المنسدلة */
.col-th-inner{display:inline-flex;align-items:center;gap:4px;}
.col-filter-btn{background:none;border:none;cursor:pointer;font-size:10px;color:var(--ink-soft);padding:1px 2px;line-height:1;border-radius:4px;}
.col-filter-btn:hover{background:var(--accent-soft);}
.col-filter-btn.active{color:#C0392B;font-weight:900;}
.col-filter-dropdown{position:absolute;z-index:400;width:230px;max-height:320px;display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 30px rgba(0,0,0,.22);overflow:hidden;font-size:12.5px;}
.col-filter-search{padding:8px;border-bottom:1px solid var(--border);}
.col-filter-search input{width:100%;padding:6px 8px;border:1px solid var(--border);border-radius:7px;font-size:12px;background:var(--surface-2);color:inherit;}
.col-filter-actions{display:flex;gap:6px;padding:6px 8px;border-bottom:1px solid var(--border);}
.col-filter-actions button{flex:1;font-size:11px;padding:4px 6px;border:1px solid var(--border);border-radius:6px;background:var(--surface-2);cursor:pointer;color:inherit;}
.col-filter-actions button:hover{background:var(--accent-soft);}
.col-filter-list{overflow-y:auto;padding:4px 4px;flex:1;}
.col-filter-item{display:flex;align-items:center;gap:6px;padding:5px 6px;border-radius:6px;cursor:pointer;}
.col-filter-item:hover{background:var(--accent-soft);}
.col-filter-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.col-filter-empty{padding:10px;text-align:center;color:var(--ink-soft);font-size:12px;}
.col-filter-foot{display:flex;gap:8px;padding:8px;border-top:1px solid var(--border);}
.col-filter-foot .btn{flex:1;}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding:26px 26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.25);animation:slideUp .18s ease-out;}
@keyframes slideUp{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-head h3{margin:0;font-size:18px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;}
.form-grid .span2{grid-column:1/-1;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.confirm-box{max-width:380px;text-align:center;}
.confirm-box p{font-size:14px;color:var(--ink-soft);margin:8px 0 18px;}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:34px 30px;width:100%;max-width:400px;box-shadow:var(--shadow);text-align:center;}
.login-card .brand-mark-lg{width:54px;height:54px;border-radius:14px;object-fit:cover;margin:0 auto;display:block;}
.login-tabs{display:flex;gap:6px;background:var(--surface-2);border-radius:10px;padding:4px;margin:18px 0 20px;}
.login-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'Cairo';font-weight:700;font-size:13.5px;color:var(--ink-soft);}
.login-tab.active{background:var(--accent);color:#fff;}
.login-card .field{text-align:right;}
.login-note{font-size:11.5px;color:var(--ink-soft);margin-top:14px;}
.login-credit{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;font-size:11.5px;color:var(--ink-soft);}
.login-version{text-align:center;margin-top:10px;font-size:10.5px;color:var(--ink-soft);opacity:.6;font-weight:700;letter-spacing:.5px;}
.login-build{text-align:center;margin-top:2px;font-size:9.5px;color:var(--ink-soft);opacity:.5;font-weight:600;letter-spacing:.3px;}
.login-credit-wa{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#EAFBF1;transition:transform .15s;}
.login-credit-wa:hover{transform:scale(1.12);}

/* ---------- صفحة تتبّع الطلب العامة ---------- */
.track-card{max-width:440px;}
.login-logo{width:60px;height:60px;object-fit:contain;margin:0 auto 10px;display:block;}
.login-title{font-size:19px;font-weight:900;color:var(--ink);margin:4px 0 2px;}
.login-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;}
.track-form{display:flex;flex-direction:column;gap:4px;text-align:right;}
.track-form label{font-size:12px;font-weight:700;color:var(--ink-soft);margin-top:10px;}
.track-form input{width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid var(--border);font-family:'Cairo';font-size:14px;background:var(--surface-2);}
.track-form input:focus{outline:none;border-color:var(--accent);}
.track-field-hint{font-size:11.5px;font-weight:700;color:var(--danger);min-height:15px;margin-top:3px;}
.track-refresh-note{font-size:11px;color:var(--ink-soft);background:var(--surface-2);border-radius:9px;padding:9px 11px;margin-top:14px;text-align:center;line-height:1.6;}
.track-error{background:var(--danger-soft);color:var(--danger);border-radius:10px;padding:9px 12px;font-size:12.5px;font-weight:700;margin-top:12px;text-align:center;}
.track-result{margin-top:22px;padding-top:20px;border-top:1px dashed var(--border);text-align:center;}
.track-receipt{font-size:20px;font-weight:900;}
.track-receipt-prefix{color:#1B2A4A;}
.track-receipt-num{color:#D93025;}
.track-customer{font-size:16px;font-weight:800;color:var(--ink-soft);margin-top:4px;margin-bottom:18px;}
.track-steps{display:flex;align-items:flex-start;justify-content:center;margin-bottom:20px;}
.track-step{display:flex;flex-direction:column;align-items:center;gap:6px;width:64px;}
.track-step-dot{width:26px;height:26px;border-radius:50%;background:var(--surface-2);border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff;flex-shrink:0;}
.track-step.state-done .track-step-dot{background:var(--accent);border-color:var(--accent);}
.track-step.state-progress .track-step-dot{background:#F2C230;border-color:#F2C230;}
.track-step.state-bad .track-step-dot{background:#E0483E;border-color:#E0483E;}
.track-step-label{font-size:10.5px;font-weight:700;color:var(--ink-soft);text-align:center;line-height:1.3;}
.track-step.state-done .track-step-label{color:var(--accent-dark);}
.track-step.state-progress .track-step-label{color:#8A6500;font-weight:900;}
.track-step.state-bad .track-step-label{color:#C0392B;font-weight:900;}
.track-step-line{flex:1;height:2px;background:var(--border);margin-top:13px;min-width:8px;}
.track-step-line.done{background:var(--accent);}
.track-details{display:flex;flex-direction:column;gap:9px;text-align:right;background:var(--surface-2);border-radius:12px;padding:14px 16px;}
.track-details div{display:flex;justify-content:space-between;font-size:13px;}
.track-details span{color:var(--ink-soft);}
.track-details strong{color:var(--ink);}
[dir="ltr"] .track-details{text-align:left;}
.track-ready-note{font-size:13.5px;font-weight:800;color:var(--accent-dark);margin-top:14px;text-align:center;}
.track-price-box{margin-top:14px;background:linear-gradient(135deg,var(--accent),var(--accent-dark));color:#fff;border-radius:12px;padding:16px;text-align:center;}
.track-price-label{font-size:12px;font-weight:700;opacity:.9;}
.track-price-white{background:#fff;border-radius:10px;padding:12px 14px;margin-top:10px;}
.track-price-total{font-size:28px;font-weight:900;color:#16213E;}
.track-price-sub{font-size:11px;opacity:.9;margin-top:8px;}
.track-lang-btn{position:absolute;top:14px;inset-inline-start:14px;background:var(--surface-2);border:1.5px solid var(--border);border-radius:50%;width:36px;height:36px;font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.track-lang-btn:hover{background:var(--accent-soft);}
.track-lang-menu{position:absolute;top:56px;inset-inline-start:14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);flex-direction:column;overflow:hidden;z-index:10;min-width:120px;}
.track-lang-opt{background:none;border:none;padding:10px 14px;font-size:13px;text-align:start;cursor:pointer;color:var(--ink);}
.track-lang-opt:hover{background:var(--accent-soft);}
.track-lang-opt.active{font-weight:900;color:var(--accent-dark);}
.track-refresh-icon{background:none;border:none;cursor:pointer;font-size:14px;padding:0;margin-inline-start:4px;vertical-align:middle;}
.track-refresh-icon:hover{transform:scale(1.15);display:inline-block;}

/* ---------- toast ---------- */
#toast-root{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:200;align-items:center;}
.toast{background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.2);animation:toastIn .18s ease-out;}
.toast-action{display:flex;align-items:center;gap:12px;border-radius:12px;}
.toast-action-btn{background:#F2B705;color:#1F3325;border:none;border-radius:20px;padding:6px 14px;font-size:12.5px;font-weight:800;cursor:pointer;font-family:'Cairo',sans-serif;white-space:nowrap;}
.toast-action-btn:hover{filter:brightness(1.08);}
.toast.error{background:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.loading-row{padding:40px;text-align:center;color:var(--ink-soft);font-size:13px;}
/* ---------- palm tree loading icon (شاشة التحميل الأولى) ---------- */
.palm-loader{padding:40px 20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.palm-loader-svg{width:112px;height:132px;animation:palmFloat 3s ease-in-out infinite;transform-origin:50% 50%;}
@keyframes palmFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
.palm-loading-text{font-weight:800;font-size:14px;color:var(--ink-soft);letter-spacing:.3px;}
.palm-loading-text .loading-dots span{animation:loadingDotBlink 1.4s infinite;opacity:.25;}
.palm-loading-text .loading-dots span:nth-child(2){animation-delay:.2s;}
.palm-loading-text .loading-dots span:nth-child(3){animation-delay:.4s;}
@keyframes loadingDotBlink{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
.pagination-bar{display:flex;align-items:center;justify-content:center;gap:16px;padding:16px;border-top:1px solid var(--border);}
.pagination-info{font-size:12.5px;color:var(--ink-soft);font-weight:700;}
.presence-card{transition:transform .15s,box-shadow .15s;}
.presence-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);}
.presence-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.presence-dot.on{background:#2F7A4D;box-shadow:0 0 0 3px rgba(47,122,77,.18);animation:presencePulse 1.8s ease-in-out infinite;}
.presence-dot.off{background:#B0B0B0;}
@keyframes presencePulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.nav-badge{margin-right:auto;background:#2F7A4D;color:#fff;font-size:11px;font-weight:800;min-width:20px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;}
.online-badge{display:flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--border);border-radius:20px;padding:5px 11px;font-size:13px;font-weight:800;color:var(--accent-dark);cursor:pointer;}
.online-badge:hover{filter:brightness(1.05);}
.online-badge-num{color:var(--accent-dark);}
@keyframes skelShine{0%{background-position:-200px 0;}100%{background-position:calc(200px + 100%) 0;}}
.skel{background:linear-gradient(90deg,var(--surface-2) 25%,var(--border) 37%,var(--surface-2) 63%);background-size:400px 100%;animation:skelShine 1.4s ease-in-out infinite;border-radius:10px;}
.skel-title{width:220px;height:26px;}
.skel-chip{flex:1;min-width:140px;height:64px;border-radius:var(--radius);}
.skel-row{height:46px;margin-bottom:10px;}
.last-sync{font-size:11px;color:var(--ink-soft);}

/* ---------- dashboard ---------- */
.page-dashboard .main{background:#eef7f0;}
.page-dashboard .page-title{color:#1E7A46;}
.page-dashboard .dash-card{transition:.25s;}
.page-dashboard .dash-card:hover{transform:translateY(-4px);}
.section-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;margin:0 0 14px;color:var(--ink);}

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
  margin-bottom:28px;
}
.dash-card{
  background:#fff;border-radius:18px;padding:20px 22px;
  box-shadow:var(--shadow);border-right:6px solid;
  display:flex;flex-direction:column;gap:6px;
  transition:transform .15s,box-shadow .15s;
  cursor:default;
}
.dash-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(31,51,37,.13);}
.dash-icon{font-size:30px;line-height:1;margin-bottom:4px;}
.dash-number{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:800;direction:ltr;}
.dash-label{font-size:13.5px;color:var(--ink-soft);font-weight:600;}

/* animated icon: a carton box settling onto a moving conveyor belt */
.conveyor-icon{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:54px;height:38px;}
.conveyor-box{font-size:25px;line-height:1;animation:boxDrop 1.1s ease-in-out infinite;}
.conveyor-belt{width:46px;height:6px;border-radius:3px;margin-top:3px;background-image:repeating-linear-gradient(90deg,#E67E22 0 8px,#F7C68B 8px 16px);background-size:16px 100%;animation:beltMove .55s linear infinite;}
@keyframes beltMove{from{background-position:0 0;}to{background-position:-16px 0;}}
@keyframes boxDrop{0%,100%{transform:translateY(0) rotate(0deg);}50%{transform:translateY(-5px) rotate(-4deg);}}

/* stacked-cartons icon: several boxes cascading, to read as "lots of orders" */
.box-stack{position:relative;width:50px;height:36px;display:inline-block;}
.box-stack .box{position:absolute;font-size:19px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.12));}
.box-stack .b1{right:0;bottom:0;}
.box-stack .b2{right:15px;bottom:7px;}
.box-stack .b3{right:8px;bottom:15px;}
.box-stack .b4{right:23px;bottom:14px;}

.dash-total    {border-color:#1E7A46;}
.dash-ready    {border-color:#2980B9;}
.dash-delivered{border-color:#145A32;}
.dash-urgent   {border-color:#C0392B;}
.dash-warehouse{border-color:#B5651D;}
.dash-avg-time{border-color:#2C7DA0;}
.dash-nearing{border-color:#B8860B;}
.dash-overdue{border-color:#8B0000;}

/* chart section */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px;}
.vbar-chart{display:flex;align-items:flex-end;gap:16px;height:190px;padding:14px 10px 0;justify-content:center;}
.vbar-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;min-width:56px;}
.vbar-fill{width:32px;border-radius:6px 6px 0 0;transition:height .3s;}
.vbar-stacked{display:flex;flex-direction:column-reverse;overflow:hidden;}
.chart-legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;padding-top:10px;margin-top:6px;border-top:1px solid var(--border);}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--ink-soft);font-weight:700;}
.legend-dot{width:9px;height:9px;border-radius:50%;display:inline-block;}
.vbar-count{font-size:12.5px;font-weight:800;margin-bottom:4px;color:var(--ink);}
.vbar-label{font-size:11px;color:var(--ink-soft);margin-top:8px;text-align:center;white-space:nowrap;}
.charts-export-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:18px 0 10px;}
.charts-export-label{font-size:12px;color:var(--ink-soft);font-weight:700;margin-left:6px;}

/* ---------- customers database page ---------- */
.customers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.cust-card{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 18px 18px;box-shadow:var(--shadow);text-align:center;transition:transform .2s,box-shadow .2s;animation:slideUp .35s ease both;}
.cust-card:hover{transform:translateY(-5px) scale(1.02);box-shadow:0 14px 32px rgba(0,0,0,.14);}
.cust-avatar{width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:21px;font-weight:800;margin:0 auto 10px;box-shadow:0 4px 10px rgba(0,0,0,.18);transition:transform .2s;}
.cust-card:hover .cust-avatar{transform:scale(1.1) rotate(-4deg);}
.cust-name{font-weight:800;font-size:14.5px;color:var(--ink);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cust-mobile{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
.cust-stats{display:flex;justify-content:center;gap:10px;}
.cust-stat{display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--surface-2);border-radius:10px;padding:8px 9px;min-width:70px;}
.cust-stat-num{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:16px;color:var(--accent-dark);}
.cust-stat-label{font-size:9.5px;color:var(--ink-soft);}
.cust-crown{position:absolute;top:-12px;left:50%;transform:translateX(-50%);font-size:22px;animation:crownBounce 1.4s ease-in-out infinite;filter:drop-shadow(0 2px 3px rgba(0,0,0,.25));}
.cust-note-flag{position:absolute;top:8px;right:10px;font-size:15px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25));}
@keyframes crownBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-4px);}}
@keyframes iconBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
@keyframes iconPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
@keyframes iconSwing{0%,100%{transform:rotate(-10deg);}50%{transform:rotate(10deg);}}
.warehouse-stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:18px;}
.wh-stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px 16px;text-align:center;box-shadow:var(--shadow);}
.wh-stat-icon{font-size:30px;display:inline-block;margin-bottom:6px;}
.wh-stat-num{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:26px;color:#7A3E0F;}
.wh-stat-label{font-size:12px;color:var(--ink-soft);font-weight:700;margin-top:2px;}
.wh-loc-badge{display:inline-block;background:#7A3E0F;color:#fff;font-family:'JetBrains Mono',monospace;font-weight:800;font-size:13px;border-radius:8px;padding:3px 10px;letter-spacing:.5px;}
.chart-card{background:#fff;border-radius:16px;padding:20px 22px;box-shadow:var(--shadow);}
.chart-title{font-weight:800;font-size:14px;margin-bottom:14px;color:var(--ink);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.bar-label{font-size:12px;color:var(--ink-soft);width:80px;text-align:right;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-track{flex:1;background:var(--surface-2);border-radius:6px;height:18px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;transition:width .6s ease;}
.bar-count{font-size:12px;font-weight:700;color:var(--ink);width:28px;text-align:left;flex-shrink:0;}
.mfg-progress{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 18px;box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
.mfg-progress-label{font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;flex-shrink:0;}
.mfg-progress-track{flex:1;min-width:120px;background:var(--surface-2);border-radius:8px;height:22px;overflow:hidden;}
.mfg-progress-fill{height:100%;border-radius:8px;transition:width .6s ease;}
.mfg-progress-pct{font-family:'JetBrains Mono',monospace;font-weight:800;font-size:15px;color:var(--accent-dark);flex-shrink:0;min-width:70px;text-align:left;}
.mfg-progress-pct span{font-size:11px;font-weight:700;color:var(--ink-soft);}

/* ============== صفحة التقارير — طابع أخضر سعودي احترافي ============== */
body.page-reports .main{ --page-tint:#F1F8F3; }
.report-doc{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 22px rgba(11,79,45,.12);border:1px solid #CFE8D8;}
.report-band{height:6px;background:linear-gradient(90deg,#0B4F2D 0%,#1E7A46 35%,#C9A227 70%,#0B4F2D 100%);}
.report-header{background:linear-gradient(135deg,#0B4F2D 0%,#155C36 60%,#1E7A46 100%);color:#fff;padding:26px 28px;position:relative;overflow:hidden;}
.report-header::after{content:'';position:absolute;inset:0;background-image:radial-gradient(circle at 90% 10%,rgba(201,162,39,.18) 0%,transparent 45%),radial-gradient(circle at 8% 90%,rgba(255,255,255,.08) 0%,transparent 40%);pointer-events:none;}
.report-header-row{display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;position:relative;z-index:1;}
.report-header-brand{display:flex;align-items:center;gap:14px;}
.report-logo{width:56px;height:56px;border-radius:12px;object-fit:cover;background:#fff;border:2px solid rgba(255,255,255,.6);}
.report-logo-fallback{width:56px;height:56px;border-radius:12px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-size:26px;}
.report-factory-name{font-size:16px;font-weight:800;margin:0;}
.report-title{font-size:22px;font-weight:900;margin:2px 0 0;}
.report-meta{font-size:12px;opacity:.92;margin-top:4px;font-weight:600;}
.report-saudi-mark{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;opacity:.95;}
.report-body{padding:22px 26px 26px;}
.report-section-title{font-size:14.5px;font-weight:800;color:#0B4F2D;margin:22px 0 12px;display:flex;align-items:center;gap:8px;}
.report-section-title::before{content:'';width:5px;height:16px;background:#C9A227;border-radius:3px;display:inline-block;}
.report-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;}
.report-card{background:#F6FBF7;border:1px solid #DCEFE2;border-radius:14px;padding:16px 14px;text-align:center;}
.report-card .rc-num{font-family:'JetBrains Mono',monospace;font-weight:900;font-size:24px;color:#0B4F2D;}
.report-card .rc-label{font-size:11.5px;color:#4B6B58;font-weight:700;margin-top:4px;}
.report-card.gold .rc-num{color:#8A6D0B;}
.report-card.gold{background:#FBF6E7;border-color:#EFE0AE;}
.report-table{width:100%;border-collapse:collapse;font-size:12.5px;}
.report-table th{background:#F0F7F1;color:#0B4F2D;text-align:right;padding:8px 10px;font-weight:800;border-bottom:2px solid #DCEFE2;}
.report-table td{padding:7px 10px;border-bottom:1px solid #EEF4EF;}
.report-send-box{background:#F6FBF7;border:1px dashed #9FCBAE;border-radius:14px;padding:16px;margin-top:20px;}
.report-footer{border-top:1px solid #E3EFE6;padding:14px 26px;text-align:center;font-size:11.5px;color:#7C8F82;font-weight:700;}
@media print{
  body.print-mode-report .sidebar,body.print-mode-report .topbar,body.print-mode-report .report-controls,body.print-mode-report .report-send-box,body.print-mode-report .btn{display:none!important;}
  body.print-mode-report .main{padding:0!important;}
}

/* ---------- responsive ---------- */
@media(max-width:880px){
  .sidebar{position:fixed;bottom:0;top:auto;right:0;left:0;width:100%;height:64px;flex-direction:row;align-items:center;gap:2px;padding:6px 8px;overflow-x:auto;border-left:none;border-top:1px solid var(--border);z-index:50;}
  .brand,.sidebar-foot{display:none;}
  .nav-item{flex-direction:column;gap:2px;font-size:10px;padding:6px 8px;white-space:nowrap;}
  .nav-icon{font-size:18px!important;}
  .main{padding:18px 14px 90px;}
  .form-grid{grid-template-columns:1fr;}
  .opt-grid{grid-template-columns:1fr;}
  .charts-row{grid-template-columns:1fr;}
}
@media(max-width:720px){
  table thead{display:none;}
  table,tbody,tr,td{display:block;width:100%;}
  tbody tr{margin-bottom:12px;border:1px solid var(--border);border-radius:12px;padding:6px 4px;background:#fff;}
  tbody td{display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px dashed var(--border);padding:9px 10px;text-align:left;}
  tbody tr:last-child td:last-child,tbody td:last-child{border-bottom:none;}
  tbody td::before{content:attr(data-label);font-weight:700;color:var(--ink-soft);font-size:11.5px;}
  table{min-width:0;}
}

/* ---------- clickable rows -> order details ---------- */
tbody tr[data-id]{cursor:pointer;}
tbody tr[data-id]:hover td{background:var(--surface-2);}
.result-card[data-id]{cursor:pointer;}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:22px 24px;margin-bottom:16px;}
.result-card:last-child{margin-bottom:0;}

/* ---------- order details modal ---------- */
.audit-history{margin-top:10px;}
.audit-history tr td{font-size:12.5px;}

/* ---------- print: A4 production order sheet ---------- */
#print-area{display:none;}
.print-sheet{width:100%;max-width:720px;margin:0 auto;font-family:'Tajawal',sans-serif;color:#1F3325;padding:24px;}
.print-head{display:flex;align-items:center;gap:14px;border-bottom:3px solid #2F7A4D;padding-bottom:14px;margin-bottom:18px;}
.print-head img{width:56px;height:56px;border-radius:10px;object-fit:cover;}
.print-head h2{margin:0;font-size:19px;}
.print-head .sub{font-size:12px;color:#5E7868;margin-top:2px;}
.print-title{text-align:center;font-size:15px;font-weight:800;background:#EAF3E4;border-radius:8px;padding:8px;margin-bottom:18px;}
.print-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 22px;margin-bottom:18px;}
.print-grid .pk{font-size:11px;color:#5E7868;}
.print-grid .pv{font-size:15px;font-weight:700;margin-top:2px;}
.print-notes{border:1px dashed #D6E8CC;border-radius:10px;padding:12px;font-size:13px;min-height:40px;margin-bottom:18px;}
.print-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px solid #D6E8CC;padding-top:14px;}
.print-qr{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:11px;color:#5E7868;}
.print-sign{font-size:12px;color:#5E7868;}
.print-sign .line{width:140px;border-bottom:1px solid #999;margin-top:30px;}
@media print{
  /* وضع طباعة أمر التصنيع / جرد المستودع */
  body.print-mode-order *{visibility:hidden;}
  body.print-mode-order .app, body.print-mode-order #login-root, body.print-mode-order #modal-root, body.print-mode-order #toast-root{display:none!important;}
  body.print-mode-order #print-area, body.print-mode-order #print-area *{visibility:visible;}
  body.print-mode-order #print-area{display:block!important;position:absolute;top:0;left:0;width:100%;}

  /* وضع طباعة صفحة التقارير — يظهر التقرير فقط ويتوسّط محتواه على الورقة */
  body.print-mode-report *{visibility:hidden;}
  body.print-mode-report #report-print-area, body.print-mode-report #report-print-area *{visibility:visible;}
  body.print-mode-report #report-print-area{position:absolute;top:0;left:0;width:100%;text-align:center;}
  body.print-mode-report .report-send-box{display:none!important;}
  body.print-mode-report .report-cards{justify-content:center;}
  body.print-mode-report .report-table{margin:0 auto;}
  body.print-mode-report .report-table th{text-align:center;}
  body.print-mode-report .report-section-title{justify-content:center;}
  body.print-mode-report .bar-row{justify-content:center;}
  body.print-mode-report .bar-label{text-align:center;}
}

/* حرف بادئة رقم السند — لون مميز لكل نوع تصنيع: V أزرق (فاكيوم), M أصفر (دبس), P بني (عجينة), S رصاصي غامق (تعقيم)
   ملحوظة: حرف الدبس كان J قديمًا وتم تغييره إلى M — الألوان بتاعة J اتسابت عشان الأرقام القديمة تفضل ملوّنة صح */
const RECEIPT_LETTER_COLORS={V:'#1F6FA8',J:'#B8860B',M:'#B8860B',P:'#8A5A3B',S:'#3C464A'};
function receiptLetterColor(letter){ return RECEIPT_LETTER_COLORS[letter]||null; }
/* يعرض رقم السند مع تكبير وتلوين الحرف الأول (V/J/P/S) مقارنة ببقية الرقم */
function formatReceiptNoHtml(receiptNo,baseSize){
  const rn=String(receiptNo||'');
  const m=/^([VJMPS])(\d+)$/.exec(rn);
  if(!m) return escapeHtml(rn);
  const [,letter,rest]=m;
  const color=receiptLetterColor(letter);
  const size=baseSize||'1em';
  return `<span style="font-size:${size};font-weight:900;color:${color};">${letter}</span><span>${escapeHtml(rest)}</span>`;
}

function columnOrderFor(tableKey){
  const cfg=currentConfig();
  return (cfg.columnPrefs&&cfg.columnPrefs[tableKey]&&cfg.columnPrefs[tableKey].order)||[];
}
/* يرجّع تعريفات الأعمدة المفعّلة لهذا الجدول (activeKeys) مرتّبة حسب ترتيب الأدمن المحفوظ (إن وُجد)،
   ثم مفلترة حسب أعمدة مخفية عن المستخدم الحالي (لا تُطبَّق على الأدمن). */
function resolveColumns(tableKey,activeKeys){
  const savedOrder=columnOrderFor(tableKey).filter(k=>activeKeys.includes(k));
  const rest=activeKeys.filter(k=>!savedOrder.includes(k));
  const fullOrder=[...savedOrder,...rest];
  const defs=COLUMN_DEFS[tableKey]||[];
  let cols=fullOrder.map(k=>defs.find(d=>d.key===k)).filter(Boolean);
  const u=state.currentUser;
  if(u&&u.role!=='admin'){
    const hidden=(u.hiddenColumns&&u.hiddenColumns[tableKey])||[];
    cols=cols.filter(c=>!hidden.includes(c.key));
  }
  return cols;
}
function colHeaderHtml(tableKey,cols){
  const draggable=isAdmin()&&!!COLUMN_DEFS[baseFilterTableKey(tableKey)];
  return cols.map(c=>{
    const filterable=isColumnFilterable(tableKey,c.key);
    const active=filterable&&columnFilterActive(tableKey,c.key);
    const funnel=filterable?`<button type="button" class="col-filter-btn${active?' active':''}" data-filter-table="${tableKey}" data-filter-key="${c.key}" title="فلترة حسب ${escapeHtml(c.label)}">⏷</button>`:'';

  }).join('');
}
/* ============== فلاتر الأعمدة (الاقماع) — سجل الطلبات ============== */
const COLUMN_FILTER_KEYS={
  registry:['date','receiptNo','customer','dateType','qtyReceived','pkgCarton','urgent','qtyMfg','placement','status'],
  production:['date','receiptNo','customer','dateType','qtyReceived','pkgCarton','urgent','qtyMfg','placement','status'],
  warehouse:['placement','receiptNo','customer','dateType','qtyReceived','qtyMfg','storageDays'],
  services:['date','receiptNo','customer','dateType','qtyReceived','serviceType','source','qtyMfg','mfgDate','doneStatus'],
};
/* صفحات التصنيع (فاكيوم/دبس/عجينة/تعقيم) لكل واحدة فلاتر أعمدة مستقلة عن التانية،
   فبنستخدم مفتاح tableKey بصيغة "production-<view>" ونرجّعه لمجموعة "production" المشتركة في التعريفات */
function baseFilterTableKey(tableKey){
  return tableKey.startsWith('production-')?'production':tableKey;
}
function isColumnFilterable(tableKey,key){
  return (COLUMN_FILTER_KEYS[baseFilterTableKey(tableKey)]||[]).includes(key);
}
/* القيمة النصية المستخدمة للفلترة والعرض في قائمة القمع — لكل عمود قابل للفلترة */
function columnFilterValue(tableKey,o,key){
  const base=baseFilterTableKey(tableKey);
  if(base==='registry'||base==='production'){
    switch(key){
      case 'date': return formatDate(o.date)||'—';
      case 'receiptNo': return o.receiptNo||'—';
      case 'customer': return o.customerName||'—';
      case 'dateType': return o.dateType||'—';
      case 'qtyReceived': return (o.qtyCartons||'').toString().trim()||'—';
      case 'pkgCarton': return `${o.packageSize||'—'} / ${o.cartonSize||'—'}`;
      case 'urgent': return o.urgent?'مستعجل':'عادي';
      case 'qtyMfg': return (o.qtyMfg||'').toString().trim()||'لم تُكتب بعد';
      case 'placement': return o.placementLocation||'—';
      case 'status': return statusLabel(o.status)||o.status||'—';
    }
  }else if(base==='warehouse'){
    switch(key){
      case 'placement': return o.placementLocation||'—';
      case 'receiptNo': return o.receiptNo||'—';
      case 'customer': return o.customerName||'—';
      case 'dateType': return o.dateType||'—';
      case 'qtyReceived': return (o.qtyCartons||'').toString().trim()||'—';
      case 'qtyMfg': return (o.qtyMfg||'').toString().trim()||'لم تُكتب بعد';
      case 'storageDays': return daysInWarehouse(o)+' يوم';
    }
  }else if(base==='services'){
    switch(key){
      case 'date': return formatDate(o.date)||'—';
      case 'receiptNo': return o.receiptNo||'—';
      case 'customer': return o.customerName||'—';
      case 'dateType': return (o.dateTypes||[]).join('،')||o.dateType||'—';
      case 'qtyReceived': return (o.qtyReceived||'').toString().trim()||'—';
      case 'serviceType': return o.serviceType||'—';
      case 'source': return ((o.receiptNo||'').trim())?'عميل (له سند)':'شركة أخرى';
      case 'qtyMfg': return (o.qtyMfg||'').toString().trim()||'لم تُكتب بعد';
      case 'mfgDate': return o.mfgDate?formatDate(o.mfgDate):'—';
      case 'doneStatus': return (o.qtyMfg||'').toString().trim()?'تم تصنيعه':'لم يُصنّع بعد';
    }
  }
  return '';
}
function columnFilterActive(tableKey,key){
  const f=(state.columnFilters&&state.columnFilters[tableKey])||{};
  return !!(f[key]&&f[key].length);
}
/* يطبّق كل فلاتر الأعمدة النشطة لجدول معيّن على قائمة عناصر */
function applyColumnFilters(tableKey,list){
  const filters=(state.columnFilters&&state.columnFilters[tableKey])||{};
  const keys=Object.keys(filters).filter(k=>filters[k]&&filters[k].length);
  if(!keys.length)return list;
  return list.filter(o=>keys.every(k=>filters[k].includes(columnFilterValue(tableKey,o,k))));
}
function closeColumnFilterDropdown(){
  const ex=document.getElementById('col-filter-dropdown');
  if(ex)ex.remove();
}
/* يفتح/يقفل قائمة فلتر القمع لعمود معيّن، ويبني القيم الفريدة من قاعدة البيانات الحالية (بعد البحث والفترة، قبل فلاتر الأعمدة) */
function toggleColumnFilterDropdown(btn){
  const tableKey=btn.dataset.filterTable, key=btn.dataset.filterKey;
  const existing=document.getElementById('col-filter-dropdown');
  if(existing){
    const wasSame=existing.dataset.forBtn===(key+':'+tableKey);
    existing.remove();
    if(wasSame)return;
  }
  const base=(tableKey==='registry'?state._registryFunnelBase:(tableKey.startsWith('production-')?((state._productionFunnelBase||{})[tableKey.replace('production-','')]):(tableKey==='warehouse'?state._warehouseFunnelBase:(tableKey==='services'?state._servicesFunnelBase:null))))||[];
  const allValues=Array.from(new Set(base.map(o=>columnFilterValue(tableKey,o,key)))).sort((a,b)=>a.localeCompare(b,'ar'));
  const current=(state.columnFilters[tableKey]&&state.columnFilters[tableKey][key])||null;
  const selectedSet=current?new Set(current):new Set(allValues);
  const dd=document.createElement('div');
  dd.id='col-filter-dropdown';
  dd.className='col-filter-dropdown';
  dd.dataset.forBtn=key+':'+tableKey;
  dd.innerHTML=`
    <div class="col-filter-search"><input type="text" placeholder="بحث في القيم…" id="col-filter-search-input" autocomplete="off"></div>
    <div class="col-filter-actions">
      <button type="button" data-act="all">تحديد الكل</button>
      <button type="button" data-act="none">إلغاء الكل</button>
    </div>
    <div class="col-filter-list">
      ${allValues.map(v=>`<label class="col-filter-item"><input type="checkbox" value="${escapeHtml(v)}" ${selectedSet.has(v)?'checked':''}><span>${escapeHtml(v)}</span></label>`).join('')||'<div class="col-filter-empty">لا توجد قيم لعرضها</div>'}
    </div>
    <div class="col-filter-foot">
      <button type="button" class="btn btn-ghost btn-sm" data-act="cancel">إلغاء</button>
      <button type="button" class="btn btn-primary btn-sm" data-act="apply">تطبيق</button>
    </div>`;
  document.body.appendChild(dd);
  const r=btn.getBoundingClientRect();
  const ddWidth=230;
  let left=r.left+window.scrollX;
  if(left+ddWidth>window.innerWidth-8)left=Math.max(8,window.innerWidth-ddWidth-8);
  dd.style.top=(r.bottom+window.scrollY+4)+'px';
  dd.style.left=left+'px';
  const searchInput=dd.querySelector('#col-filter-search-input');
  searchInput.addEventListener('input',()=>{
    const term=searchInput.value.trim().toLowerCase();
    dd.querySelectorAll('.col-filter-item').forEach(lbl=>{
      lbl.style.display=lbl.textContent.toLowerCase().includes(term)?'':'none';
    });
  });
  dd.querySelector('[data-act="all"]').addEventListener('click',()=>{
    dd.querySelectorAll('.col-filter-item input[type=checkbox]').forEach(cb=>cb.checked=true);
  });
  dd.querySelector('[data-act="none"]').addEventListener('click',()=>{
    dd.querySelectorAll('.col-filter-item input[type=checkbox]').forEach(cb=>cb.checked=false);
  });
  dd.querySelector('[data-act="cancel"]').addEventListener('click',closeColumnFilterDropdown);
  dd.querySelector('[data-act="apply"]').addEventListener('click',()=>{
    const checked=[...dd.querySelectorAll('.col-filter-item input[type=checkbox]:checked')].map(cb=>cb.value);
    if(!state.columnFilters[tableKey])state.columnFilters[tableKey]={};
    if(!allValues.length||checked.length===allValues.length){
      delete state.columnFilters[tableKey][key];
    }else{
      state.columnFilters[tableKey][key]=checked;
    }
    closeColumnFilterDropdown();
    render();
  });
  dd.addEventListener('click',e=>e.stopPropagation());
  dd.addEventListener('mousedown',e=>e.stopPropagation());
}
/* سحب وإفلات لإعادة ترتيب الأعمدة — للأدمن فقط، والترتيب الجديد يُحفظ في الإعدادات العامة ويظهر لكل المستخدمين */
function attachColumnDrag(tableKey){
  if(!isAdmin())return;
  const table=document.querySelector(`table[data-col-table="${tableKey}"]`);
  if(!table)return;
  let dragKey=null;
  table.querySelectorAll('th[data-colkey]').forEach(th=>{
    th.addEventListener('dragstart',e=>{ dragKey=th.dataset.colkey; if(e.dataTransfer)e.dataTransfer.effectAllowed='move'; th.classList.add('col-dragging'); });
    th.addEventListener('dragend',()=>{ th.classList.remove('col-dragging'); });
    th.addEventListener('dragover',e=>{ e.preventDefault(); });
    th.addEventListener('drop',async e=>{
      e.preventDefault();
      const targetKey=th.dataset.colkey;
      if(!dragKey||dragKey===targetKey)return;
      const allKeys=[...table.querySelectorAll('th[data-colkey]')].map(x=>x.dataset.colkey);
      const from=allKeys.indexOf(dragKey), to=allKeys.indexOf(targetKey);
      if(from<0||to<0)return;
      allKeys.splice(from,1); allKeys.splice(to,0,dragKey);
      dragKey=null;
      await mutateConfig(cfg=>({...cfg,columnPrefs:{...(cfg.columnPrefs||{}),[tableKey]:{...((cfg.columnPrefs||{})[tableKey]),order:allKeys}}}),'تم حفظ ترتيب الأعمدة');
    });
  });
}

/* صلاحيات إضافية لكل موظف (كتابة/تغيير الكمية المصنعة — كتابة مكان التسكين — إرسال واتساب)

}

/* auto receipt number — prefix by processing type: V0001 فاكيوم، J0001 دبس، P0001 عجينة، S0001 تعقيم */
const RECEIPT_PREFIX={'فاكيوم':'V','دبس':'M','عجينة':'P','تعقيم':'S'};
/* بدائل الحرف القديم — عشان لما نغيّر حرف نوع تصنيع، الترقيم يكمل تسلسليًا من غير ما يرجع لـ0001 */
const RECEIPT_PREFIX_ALIASES={'دبس':['J','M']};
function nextReceiptNo(processingType){
  const prefix=RECEIPT_PREFIX[processingType]||'';
  const aliases=RECEIPT_PREFIX_ALIASES[processingType]||[prefix];
  const nums=state.orders
    .filter(o=>aliases.some(p=>p&&(o.receiptNo||'').startsWith(p)))
    .map(o=>{ const m=(o.receiptNo||'').match(/(\d+)\s*$/); return m?parseInt(m[1],10):0; });
  const next=(nums.length?Math.max(...nums):0)+1;
  return prefix+String(next).padStart(4,'0');
}

function toast(msg,type='ok',duration=2600){
  const root=byId('toast-root');
  const el=document.createElement('div');
  el.className='toast'+(type==='error'?' error':'');
  el.textContent=msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),200); },duration);
}
/* رسالة فشل الحفظ — توضّح بشكل صريح إن السبب هو انقطاع النت لو الجهاز أوفلاين فعلًا،
   وإلا بترجع رسالة الخطأ الأصلية (لأسباب تانية غير انقطاع الاتصال) */
function saveFailMsg(fallback){ return navigator.onLine?fallback:'لا يمكن الحفظ بدون الاتصال بالإنترنت'; }
/* توست فيه زرار إجراء (تُستخدم في "تراجع" بعد الحذف) */
function toastWithAction(msg,actionLabel,onAction,duration=8000){
  const root=byId('toast-root');
  const el=document.createElement('div');
  el.className='toast toast-action';
  el.innerHTML=`<span>${escapeHtml(msg)}</span><button type="button" class="toast-action-btn">↩️ ${escapeHtml(actionLabel)}</button>`;
  root.appendChild(el);
  let done=false;
  el.querySelector('.toast-action-btn').addEventListener('click',()=>{
    if(done)return; done=true; el.style.opacity='0'; setTimeout(()=>el.remove(),200); onAction();
  });
  setTimeout(()=>{ if(done)return; el.style.opacity='0'; setTimeout(()=>el.remove(),200); },duration);
}

const FIELD_LABELS={

  dateTypes:'أنواع التمر',qtyCartons:'الكمية المستلمة',processingType:'نوع التصنيع',

};
function describeChanges(oldObj,newPatch){
  const parts=[];
  for(const [k,nv] of Object.entries(newPatch)){
    if(['lastEditedBy','lastEditedAt','createdAt','id','monthKey'].includes(k))continue;
    const label=FIELD_LABELS[k]||k;
    const ov=oldObj?oldObj[k]:undefined;
    const ovStr=Array.isArray(ov)?ov.join('،'):(ov!=null?String(ov):'—');
    const nvStr=Array.isArray(nv)?nv.join('،'):(nv!=null?String(nv):'—');
    if(ovStr!==nvStr&&nvStr&&nvStr!=='—')parts.push(`${label}: ${ovStr!=='—'?`"${ovStr}" → `:''}"${nvStr}"`);
  }
  return parts.length?parts.join(' | '):'';
}

/* ============== storage: خدمات إضافية — مقسّمة بالشهر زي الطلبات بالظبط (بعد ترقية من ملف واحد كبير)
   كل خدمة بييتحدد شهرها وقت التسجيل (serviceMonthKey) ويفضل ثابت مهما اتعدّل تاريخها بعد كده،
   تمامًا زي منطق monthKey في الطلبات العادية ============== */
async function loadServiceIndex(){

async function saveServiceMonth(m,list){
  return await storageSetRetry('service-orders:'+m,JSON.stringify(list),true);
}
function serviceMonthKeyOf(so){
  return (so.date||'').slice(0,7)||new Date(so.createdAt||Date.now()).toISOString().slice(0,7);
}
/* ترقية آمنة تلقائية لمرة واحدة: لو لقى الفهرس الشهري فاضي والنسخة القديمة (ملف واحد) فيها بيانات،
   يقسمها على شهور ويحفظها بالنظام الجديد. النسخة القديمة بتفضل موجودة زي ما هي (مش بتتمسح) كنسخة أمان احتياطية،
   وبكده مفيش أي احتمال ضياع بيانات حتى لو حصل أي خطأ أثناء الترقية. */
async function migrateServiceOrdersIfNeeded(){
  try{
    const idx=await loadServiceIndex();
    if(idx.length)return;
    const legacy=await sbGet('service-orders');
    if(!legacy||!legacy.value)return;
    const list=JSON.parse(legacy.value);
    if(!Array.isArray(list)||!list.length)return;
    const byMonth={};
    list.forEach(so=>{
      const mk=so.monthKey||serviceMonthKeyOf(so);
      (byMonth[mk]=byMonth[mk]||[]).push({...so,monthKey:mk});
    });
    const months=Object.keys(byMonth).sort();
    for(const m of months){ await saveServiceMonth(m,byMonth[m]); }
    await saveServiceIndex(months);
  }catch(e){ console.error('service orders migration failed',e); }
}
async function loadAllServiceOrders(){
  await migrateServiceOrdersIfNeeded();
  const idx=await loadServiceIndex(); state.serviceMonthIndex=idx;
  if(!idx.length)return [];
  const lists=await Promise.all(idx.map(m=>loadServiceMonth(m)));
  return lists.flat();
}
const FAST_BOOT_SERVICE_MONTHS=1;
async function loadRecentServiceOrders(){
  await migrateServiceOrdersIfNeeded();
  const idx=await loadServiceIndex(); state.serviceMonthIndex=idx;
  if(!idx.length){ state._loadedServiceMonths=new Set(); return []; }
  const recent=[...idx].sort().slice(-FAST_BOOT_SERVICE_MONTHS);
  const lists=await Promise.all(recent.map(m=>loadServiceMonth(m)));
  state._loadedServiceMonths=new Set(recent);
  return lists.flat();
}
async function loadRemainingServiceOrdersInBackground(){
  const idx=state.serviceMonthIndex||[];
  const loaded=state._loadedServiceMonths||new Set();
  const remaining=idx.filter(m=>!loaded.has(m));
  if(!remaining.length){ state.allServiceHistoryLoaded=true; return; }
  state.allServiceHistoryLoaded=false;
  try{
    const lists=await Promise.all(remaining.map(m=>loadServiceMonth(m)));
    const extra=lists.flat();
    state.serviceOrders=[...state.serviceOrders,...extra];
    remaining.forEach(m=>loaded.add(m));
    state._loadedServiceMonths=loaded;
  }catch(e){}
  state.allServiceHistoryLoaded=true;
  render();
}
async function ensureServiceMonthIndexed(monthKey){
  let idx=state.serviceMonthIndex&&state.serviceMonthIndex.length?state.serviceMonthIndex:await loadServiceIndex();
  if(!idx.includes(monthKey)){ idx=[...idx,monthKey].sort(); await saveServiceIndex(idx); state.serviceMonthIndex=idx; }
}
async function addServiceOrder(payload,silent){
  const now=Date.now();
  const monthKey=serviceMonthKeyOf({date:payload.date,createdAt:now});
  const newSO={id:genId(),createdAt:now,monthKey,lastEditedBy:currentUserName(),lastEditedAt:nowIso(),...payload};
  await ensureServiceMonthIndexed(monthKey);
  const fresh=await loadServiceMonth(monthKey);

/* ============== تحميل خفيف عند فتح البرنامج — بيجيب بس آخر 3 شهور فورًا (سريع)، وبعدين يكمّل تحميل باقي
   الأرشيف القديم في الخلفية من غير ما يعطّل الشغل. النتيجة: فتح البرنامج بيبقى سريع من أول لحظة حتى لو
   تراكمت سنين من البيانات، وبرضو البحث/التقارير بتفضل شغالة على كل التاريخ بمجرد ما يخلص التحميل الخلفي ============== */
const FAST_BOOT_MONTHS=1;
async function loadRecentOrders(){
  const idx=await loadIndex(); state.monthIndex=idx;
  if(!idx.length){ state._loadedMonths=new Set(); return []; }
  const recent=[...idx].sort().slice(-FAST_BOOT_MONTHS);
  const lists=await Promise.all(recent.map(m=>loadMonth(m)));
  state._loadedMonths=new Set(recent);
  return lists.flat();
}
/* بيتنادى من أي مربع بحث (رقم السند/الاسم/الجوال) في أي صفحة — أول مرة حد يكتب حاجة، يشغّل تحميل باقي
   الأرشيف القديم في الخلفية (مرة واحدة بس لكل جلسة)، عشان البحث يقدر يوصل لأي طلب قديم مهما كان تاريخه */
let _fullHistoryLoadTriggered=false;
function triggerFullHistoryLoadIfNeeded(){
  if(_fullHistoryLoadTriggered||state.allHistoryLoaded===true)return;
  _fullHistoryLoadTriggered=true;
  loadRemainingOrdersInBackground();
  loadRemainingServiceOrdersInBackground();
}
async function loadRemainingOrdersInBackground(){
  const idx=state.monthIndex||[];
  const loaded=state._loadedMonths||new Set();
  const remaining=idx.filter(m=>!loaded.has(m));
  if(!remaining.length){ state.allHistoryLoaded=true; return; }
  state.allHistoryLoaded=false;
  render();
  try{
    const lists=await Promise.all(remaining.map(m=>loadMonth(m)));
    const extra=lists.flat();
    state.orders=[...state.orders,...extra];
    remaining.forEach(m=>loaded.add(m));
    state._loadedMonths=loaded;
  }catch(e){}
  state.allHistoryLoaded=true;
  render();
}

async function archiveOldDeliveredOrders(){
  const toArchive=state.orders.filter(isArchivable);
  if(!toArchive.length){ toast('لا توجد طلبات قابلة للأرشفة حاليًا'); return; }
  toast('جارٍ الأرشفة…');
  const byMonth={};
  toArchive.forEach(o=>{ (byMonth[o.monthKey]=byMonth[o.monthKey]||[]).push(o.id); });
  const idSet=new Set(toArchive.map(o=>o.id));
  let allOk=true;
  for(const mk of Object.keys(byMonth)){
    const fresh=await loadMonth(mk);
    const updated=fresh.map(o=>idSet.has(o.id)?{...o,archived:true,archivedAt:nowIso()}:o);

    if(!ok)allOk=false;
  }
  state.orders=state.orders.map(o=>idSet.has(o.id)?{...o,archived:true,archivedAt:nowIso()}:o);
  addAudit(`أرشفة تلقائية لـ ${toArchive.length} طلب مُسلَّم أقدم من ${ARCHIVE_AFTER_DAYS} يوم`);
  render();
  toast(allOk?`تمت أرشفة ${toArchive.length} طلب بنجاح`:'تمت الأرشفة جزئيًا — حدث خطأ في بعض الأشهر','ok',4000);

  let n=(mobile||'').replace(/[^0-9]/g,'');
  if(n.startsWith('00966'))n=n.slice(2);
  if(n.startsWith('966'))return n;
  if(n.startsWith('0'))n=n.slice(1);
  return '966'+n;
}

    .replace(/\{رقم_السند\}/g,o.receiptNo||'—')

/* التحديث اليدوي (زر ↻ تحديث) — بيحدّث بس الشهر الحالي والي قبله (فين بيحصل 95% من التغييرات الحقيقية:
   طلبات جديدة، تغيير حالة، تصنيع...)، مش كل تاريخ المصنع من الأول؛ ده بيخلي الزر سريع دايمًا
   حتى لو تراكمت سنين من البيانات، بدل ما يرجع لأداء بطيء زي التحميل الأول قبل تحسين الإقلاع السريع */
async function fullRefresh(){
  const idx=await loadIndex(); state.monthIndex=idx;
  const now=new Date();
  const months=[now.toISOString().slice(0,7),new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7)];
  const toRefresh=idx.filter(m=>months.includes(m));
  if(toRefresh.length){
    const lists=await Promise.all(toRefresh.map(m=>loadMonth(m)));
    const merged=state.orders.filter(o=>!toRefresh.includes(o.monthKey));
    lists.forEach(l=>l.forEach(o=>merged.push(o)));
    state.orders=merged;
    const loaded=state._loadedMonths||new Set();
    toRefresh.forEach(m=>loaded.add(m));
    state._loadedMonths=loaded;
  }
  const svcIdx=await loadServiceIndex(); state.serviceMonthIndex=svcIdx;
  const svcToRefresh=svcIdx.filter(m=>months.includes(m));
  if(svcToRefresh.length){
    const svcLists=await Promise.all(svcToRefresh.map(m=>loadServiceMonth(m)));
    const svcMerged=state.serviceOrders.filter(so=>!svcToRefresh.includes(so.monthKey));
    svcLists.forEach(l=>l.forEach(so=>svcMerged.push(so)));
    state.serviceOrders=svcMerged;
    const svcLoaded=state._loadedServiceMonths||new Set();
    svcToRefresh.forEach(m=>svcLoaded.add(m));
    state._loadedServiceMonths=svcLoaded;
  }
  state.lastSync=nowTimeStr();
}

/* الطلب "متأخر" يُحتسب في التحذيرات والإحصائيات طالما لم تُسجَّل له كمية مصنعة بعد ولم يُسلَّم —
   بمجرد ما يتسجل رقم في الكمية المصنعة، الطلب يخرج من عداد المتأخرة تلقائيًا حتى لو لسه ما اتسلمش (نفس منطق المستعجلة) */
function isOverdue(o){
  if(!o.date||o.status==='تم التسليم'||(o.qtyMfg||'').toString().trim())return false;
  const created=new Date(o.date);
  const diff=(Date.now()-created.getTime())/(1000*60*60*24);
  return diff>25;
}
/* الطلب "مستعجل" يُحتسب في التحذيرات والإحصائيات طالما لم تُسجَّل له كمية مصنعة بعد ولم يُسلَّم —
   بمجرد ما يتسجل رقم في الكمية المصنعة، الطلب يخرج من عداد المستعجلة تلقائيًا حتى لو لسه ما اتسلمش */
function isUrgentPending(o){
  return !!o.urgent&&o.status!=='تم التسليم'&&!(o.qtyMfg||'').toString().trim();
}
function arabicDaysLabel(n){
  if(n<=0)return'أقل من يوم';
  if(n===1)return'يوم واحد';
  if(n===2)return'يومين';
  if(n<=10)return`${n} أيام`;
  return`${n} يوم`;
}
function overdueBadge(o){
  if(!isOverdue(o))return'';
  const daysSince=Math.floor((Date.now()-new Date(o.date).getTime())/(1000*60*60*24));
  return`<span class="overdue-badge"><span class="warn-icon">⚠️</span>متأخر منذ ${arabicDaysLabel(daysSince-25)}</span>`;
}
/* تنبيه مبكر — الطلب قارب على التأخير (بين 18 و25 يوم) ولم يُسلَّم ولم تُسجَّل له كمية مصنعة بعد */
function isNearingDelay(o){
  if(!o.date||o.status==='تم التسليم'||(o.qtyMfg||'').toString().trim())return false;
  const diff=(Date.now()-new Date(o.date).getTime())/(1000*60*60*24);
  return diff>=18&&diff<=25;
}
function nearingDelayBadge(o){
  if(!isNearingDelay(o))return'';
  const daysSince=Math.floor((Date.now()-new Date(o.date).getTime())/(1000*60*60*24));
  const remaining=Math.max(0,25-daysSince);
  return`<span class="nearing-badge"><span class="warn-icon">🟡</span>متبقي ${arabicDaysLabel(remaining)} على التأخير</span>`;
}

/* ترتيب مواقع التسكين: الصف الأول ثم العمود — 1-1, 1-2, 1-3, 2-1, 2-2... */
function parsePlacement(loc){
  const m=(loc||'').trim().match(/^(\d+)\s*-\s*(\d+)$/);
  if(!m)return{row:9999,col:9999};
  return{row:parseInt(m[1],10),col:parseInt(m[2],10)};
}
function sortByPlacement(list){
  return [...list].sort((a,b)=>{
    const pa=parsePlacement(a.placementLocation),pb=parsePlacement(b.placementLocation);
    if(pa.row!==pb.row)return pa.row-pb.row;
    return pa.col-pb.col;
  });
}
/* عدد الأيام منذ تاريخ التصنيع إن وُجد، وإلا منذ تاريخ استلام الطلب */
function daysInWarehouse(o){
  const refDate=o.mfgDate||o.date;
  if(!refDate)return 0;
  const created=new Date(refDate);
  return Math.max(0,Math.floor((Date.now()-created.getTime())/(1000*60*60*24)));
}
/* طلب "راكد" في المستودع — موجود بالمستودع (له موقع تسكين) ولسه ما اتسلّمش، وعدّى عليه 25 يوم أو أكتر بدون خروج */
const STAGNANT_WAREHOUSE_DAYS=25;
function isStagnantInWarehouse(o){
  if(!(o.placementLocation||'').trim()||o.status==='تم التسليم')return false;
  return daysInWarehouse(o)>=STAGNANT_WAREHOUSE_DAYS;
}
/* أرشفة تلقائية — طلب "قابل للأرشفة" لو اتسلّم فعلاً وعدّى على تاريخه أكتر من 6 شهور، ولسه مش مؤرشف */
const ARCHIVE_AFTER_DAYS=180;
function isArchivable(o){
  if(o.archived||o.status!=='تم التسليم'||!o.date)return false;
  const diff=(Date.now()-new Date(o.date).getTime())/(1000*60*60*24);
  return diff>ARCHIVE_AFTER_DAYS;
}
/* نجمة حمراء صغيرة تظهر أعلى يسار رقم السند لو فيه ملاحظة و/أو تسعير محفوظ من "حاسبة الأسعار" لهذا السند */
function receiptPricingNoteBadge(o){

  return `<span title="${tip}" style="position:absolute;top:-7px;left:-8px;color:#C0392B;font-size:13px;line-height:1;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2));">★</span>`;
}
/* عداد صغير: عدد الأيام بدون تصنيع (من تاريخ الطلب لحد الآن)، ولو تم التصنيع يتجمّد على عدد الأيام التي استغرقها */
function daysWithoutMfgBadge(o){
  if(!o||!o.date)return'';
  const start=new Date(o.date);
  if(isNaN(start))return'';
  if((o.qtyMfg||'').toString().trim()){
    const end=o.mfgDate?new Date(o.mfgDate):new Date();
    const days=Math.max(0,Math.floor((end.getTime()-start.getTime())/(1000*60*60*24)));
    return `<div class="days-counter days-counter-done">✓ استغرق ${days} يوم للتصنيع</div>`;
  }
  const days=Math.max(0,Math.floor((Date.now()-start.getTime())/(1000*60*60*24)));
  const cls=days>25?'days-counter-danger':(days>=18?'days-counter-warn':'days-counter-ok');
  return `<div class="days-counter ${cls}">${days} يوم بدون تصنيع</div>`;
}

/* التاريخ الميلادي والهجري لليوم — يُستخدم أعلى الشريط الجانبي تحت اسم المصنع */
function todayGregorianStr(){
  const d=new Date();
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}
function todayHijriStr(){
  const d=new Date();
  try{ return d.toLocaleDateString('ar-SA-u-ca-islamic-umalqura',{day:'numeric',month:'numeric',year:'numeric'}); }
  catch(e){ try{ return d.toLocaleDateString('ar-SA-u-ca-islamic',{day:'numeric',month:'numeric',year:'numeric'}); }catch(e2){ return '—'; } }
}
/* عدد المتصلين الآن — يتحدث في الخلفية ويظهر كرقم بجانب "من متصل الآن" حتى بدون فتح الصفحة */
async function refreshOnlineCount(){
  if(!isAdmin())return;
  const rows=await sbListByPrefix('presence:');
  const now=Date.now();
  let count=0;
  rows.forEach(r=>{ try{ const p=JSON.parse(r.value); if(now-p.ts<45000)count++; }catch(e){} });
  state.onlineCount=count;
  if(state.currentUser)renderSidebar();
}
function startOnlineCountPolling(){
  if(!isAdmin())return;
  refreshOnlineCount();
  if(state._onlineCountInterval)clearInterval(state._onlineCountInterval);
  state._onlineCountInterval=setInterval(refreshOnlineCount,20000);
}

/* ============== render dispatcher ============== */
function captureFocus(){
  const el=document.activeElement;
  if(!el||!['INPUT','TEXTAREA','SELECT'].includes(el.tagName))return null;
  return {
    id:el.id||null,
    cls:el.className||'',
    dataId:el.dataset?el.dataset.id:null,
    selStart:(typeof el.selectionStart==='number')?el.selectionStart:null,
    selEnd:(typeof el.selectionEnd==='number')?el.selectionEnd:null
  };
}
function restoreFocus(saved){
  if(!saved)return;
  let el=null;
  if(saved.id)el=byId(saved.id);
  if(!el&&saved.dataId&&saved.cls){
    const firstCls=saved.cls.split(' ').filter(Boolean)[0];
    if(firstCls)el=document.querySelector(`.${firstCls}[data-id="${saved.dataId}"]`);
  }
  if(!el)return;
  try{
    el.focus();
    if(saved.selStart!==null&&el.setSelectionRange)el.setSelectionRange(saved.selStart,saved.selEnd);
  }catch(e){}
}
/* شاشة تحميل هيكلية (Skeleton) بدل رسالة نصية بسيطة */
function skeletonHtml(){
  const chip=`<div class="skel skel-chip"></div>`;

}
