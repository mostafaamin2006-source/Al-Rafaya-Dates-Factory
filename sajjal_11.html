<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سجّل — مصنع تمور مزرعة الرفايع</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌴</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;600&display=swap');

:root{
  --bg:#F2F8EF; --surface:#FFFFFF; --surface-2:#EAF3E4;
  --ink:#1F3325; --ink-soft:#5E7868; --border:#D6E8CC;
  --accent:#2F7A4D; --accent-soft:#DCEFDF; --accent-dark:#225C3A;
  --gold:#B8862E; --gold-soft:#F2E7C9;
  --ready:#2C7DA0; --ready-soft:#D9EAF1;
  --danger:#A23B33; --danger-soft:#F3DCDA;
  --shadow:0 8px 24px rgba(31,51,37,0.08); --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Tajawal',sans-serif;font-weight:700;min-height:100vh;-webkit-font-smoothing:antialiased;}
h1,h2,h3,h4,.brand-title,.nav-item,.btn,.stat-label{font-family:'Cairo',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;direction:ltr;unicode-bidi:isolate;display:inline-block;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

/* ---------- layout ---------- */
.app{display:flex;min-height:100vh;}
.sidebar{
  width:230px;flex-shrink:0;background:var(--surface);
  border-left:1px solid var(--border);padding:26px 16px;
  display:flex;flex-direction:column;gap:4px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.brand{display:flex;align-items:center;gap:10px;padding:0 8px 22px;border-bottom:1px solid var(--border);margin-bottom:14px;}
.brand-mark{width:34px;height:34px;flex-shrink:0;border-radius:9px;object-fit:cover;display:block;}
.brand-title{font-size:15.5px;font-weight:800;color:var(--accent-dark);line-height:1.25;}
.brand-sub{font-size:11px;color:var(--ink-soft);margin-top:2px;}

.nav-item{
  display:flex;align-items:center;gap:10px;text-align:right;width:100%;
  background:transparent;border:none;cursor:pointer;
  padding:11px 12px;border-radius:10px;
  font-size:14px;font-weight:700;color:var(--ink-soft);
  transition:background .15s,color .15s;
}
.nav-item .nav-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.nav-item:hover{background:var(--surface-2);color:var(--ink);}
.nav-item.active{background:var(--accent);color:#fff;}

/* مؤشر المسؤول — لون أورانج مميز */
body.user-admin .nav-item.active{background:#E67E22;color:#fff;}
body.user-admin .sidebar{border-left:3px solid #E67E22;}
.admin-indicator{display:none;}
body.user-admin .admin-indicator{display:flex;align-items:center;gap:6px;background:#FFF3E0;border:1px solid #E67E22;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;color:#E67E22;margin-bottom:8px;}
@keyframes adminPulse{0%,100%{opacity:1;}50%{opacity:.55;}}
body.user-admin .admin-indicator .dot{width:8px;height:8px;border-radius:50%;background:#E67E22;animation:adminPulse 1.4s infinite;}

/* page-level colour tinting for production pages — each line gets its own accent
   so buttons / status dots / badges / focus rings inherit the line's colour.
   Dashboard, registry, search and settings keep the default green theme. */
body.page-vacuum .main{ --page-tint:#EAF4FB; --accent:#1F6FA8; --accent-soft:#D7E9F5; --accent-dark:#154D74; }
body.page-dibs   .main{ --page-tint:#FEFAE6; --accent:#B8860B; --accent-soft:#F7ECC6; --accent-dark:#7A5907; }
body.page-dough  .main{ --page-tint:#F5EDE3; --accent:#A9745B; --accent-soft:#EFE0D3; --accent-dark:#74503D; }
body.page-sterilize .main{ --page-tint:#F0F0F2; --accent:#7F8C8D; --accent-soft:#E3E6E6; --accent-dark:#54605F; }
body.page-services .main{ --page-tint:#F5F0FF; --accent:#7B2FBE; --accent-soft:#EDE3FF; --accent-dark:#52108A; }
body.page-customers .main{ --page-tint:#FDF1F6; --accent:#C2185B; --accent-soft:#FCE4EC; --accent-dark:#880E4F; }
body.page-warehouse .main{ --page-tint:#FBF2E9; --accent:#B5651D; --accent-soft:#F3E0C8; --accent-dark:#7A3E0F; }
.main{background:var(--page-tint,var(--bg));transition:background .3s;}

.sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--ink-soft);}
.user-chip{background:var(--surface-2);border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.user-chip .greeting{font-size:13px;font-weight:800;color:var(--accent-dark);margin-bottom:2px;}
.user-chip .role{font-size:10.5px;color:var(--ink-soft);}
.user-chip .last-login{font-size:10px;color:var(--ink-soft);margin-top:4px;}
.logout-btn{margin-top:6px;background:transparent;border:1px solid var(--border);border-radius:8px;padding:4px 9px;font-size:11px;cursor:pointer;color:var(--danger);width:100%;}
.logout-btn:hover{background:var(--danger-soft);}

.main{flex:1;padding:30px 36px 60px;max-width:1320px;min-width:0;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:20px;}
.page-title{font-size:22px;font-weight:800;margin:0;}
.page-desc{font-size:13px;color:var(--ink-soft);margin-top:4px;}
.toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.topbar{display:flex;justify-content:flex-end;margin-bottom:16px;}
.topbar-user{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 8px 6px 16px;box-shadow:var(--shadow);}
.topbar-avatar{display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#1E7A46,#2F7A4D);color:#fff;font-weight:800;font-size:13px;letter-spacing:.5px;flex-shrink:0;box-shadow:0 2px 6px rgba(30,122,70,.35);}
.topbar-user-text{display:flex;flex-direction:column;line-height:1.25;}
.topbar-name{font-weight:800;font-size:13px;color:var(--ink);white-space:nowrap;}
.topbar-role{font-size:10.5px;font-weight:700;color:var(--ink-soft);white-space:nowrap;}
.topbar-user .logout-btn-top{background:var(--danger-soft);color:var(--danger);border:none;border-radius:999px;padding:6px 14px;font-size:12px;font-weight:800;cursor:pointer;transition:background .15s;}
.topbar-user .logout-btn-top:hover{background:var(--danger);color:#fff;}
.search-toolbar-sticky{position:sticky;top:0;z-index:30;background:var(--page-tint,var(--bg));padding:10px 0;margin:0 0 16px;box-shadow:0 6px 14px -10px rgba(0,0,0,.25);}

/* ---------- buttons & inputs ---------- */
.btn{appearance:none;border:none;cursor:pointer;border-radius:10px;padding:10px 18px;font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:8px;transition:transform .1s,filter .15s;}
.btn:active{transform:scale(.97);}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.08);}
.btn-ghost{background:var(--surface-2);color:var(--ink);border:1px solid var(--border);}
.btn-ghost:hover{background:#DEF0D6;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}
.icon-btn{background:transparent;border:1px solid var(--border);cursor:pointer;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;color:var(--ink-soft);font-size:14px;}
.icon-btn:hover{background:var(--surface-2);color:var(--ink);}
.icon-btn.danger:hover{background:var(--danger-soft);color:var(--danger);}

input,select,textarea{width:100%;font-family:'Tajawal',sans-serif;font-size:14px;color:var(--ink);background:#fff;border:1px solid var(--border);border-radius:9px;padding:9px 11px;}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent);outline-offset:1px;}
.field-error{border-color:var(--danger)!important;outline:2px solid var(--danger)!important;}
label{font-size:12.5px;font-weight:700;color:var(--ink-soft);display:block;margin-bottom:5px;}
.field{margin-bottom:14px;}
.hint{font-size:11px;color:var(--ink-soft);margin-top:4px;}

/* receipt no: big red mono — auto-generated codes (0001, 0002…) get extra emphasis everywhere */
.receipt-input{color:#C0392B!important;font-size:19px!important;font-weight:800!important;font-family:'JetBrains Mono',monospace!important;letter-spacing:.5px;}
.receipt-display{color:#C0392B;font-size:17px;font-weight:800;font-family:'JetBrains Mono',monospace;direction:ltr;display:inline-block;letter-spacing:.5px;}
.days-counter{font-size:10.5px;font-weight:700;margin-top:3px;white-space:nowrap;}
.days-counter-ok{color:var(--ink-soft);}
.days-counter-warn{color:#B8860B;}
.days-counter-danger{color:#C0392B;}
.days-counter-done{color:#2F7A4D;}
.qty-received{display:inline-block;background:#FEF6D9;color:#8A6500;font-weight:800;border-radius:8px;padding:2px 9px;font-size:13px;}
.qty-mfg-input{font-weight:800!important;font-size:16px!important;width:140px;color:#1F6FA8;}
.qty-mfg-display{font-weight:800;font-size:16px;color:#1F6FA8;}
.qty-mfg-empty{color:var(--ink-soft);font-weight:600;font-size:12px;}
.qty-mfg-date{font-size:10px;color:var(--ink-soft);font-weight:600;margin-top:2px;}

.search-box{position:relative;min-width:230px;flex:1;}
.search-box input{padding-right:34px;padding-left:30px;}
.search-box .ic{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--ink-soft);font-size:14px;}
.search-clear-btn{position:absolute;left:6px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--ink-soft);font-size:13px;font-weight:800;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;}
.search-clear-btn:hover{background:var(--surface-2);color:#C0392B;}

.toggle{display:inline-flex;align-items:center;gap:8px;cursor:pointer;user-select:none;}
.toggle input{display:none;width:auto;}
.toggle .track{width:40px;height:22px;background:var(--border);border-radius:20px;position:relative;transition:background .15s;flex-shrink:0;}
.toggle .track::after{content:'';position:absolute;top:2px;right:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .15s;}
.toggle input:checked + .track{background:var(--accent);}
.toggle input:checked + .track::after{transform:translateX(-18px);}

.check-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
.check-row input{width:16px;height:16px;flex-shrink:0;}
.check-row label{margin:0;font-weight:600;color:var(--ink);font-size:13.5px;}

/* ---------- stat chips ---------- */
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;min-width:120px;}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;direction:ltr;display:block;}
.stat-label{font-size:11.5px;color:var(--ink-soft);margin-top:2px;}
.stat-chip.urgent .stat-num{color:var(--danger);}
.stat-chip.progress .stat-num{color:var(--gold);}
.stat-chip.ready .stat-num{color:var(--ready);}

/* ---------- badges ---------- */
.badge{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11.5px;font-weight:700;white-space:nowrap;}
.badge-new{background:var(--surface-2);color:var(--ink-soft);}
.badge-progress{background:var(--gold-soft);color:#8C6A1E;}
.badge-ready{background:var(--ready-soft);color:var(--ready);}
.badge-done{background:var(--accent-soft);color:var(--accent-dark);}
.badge-urgent{background:var(--danger-soft);color:var(--danger);}
.badge-normal{background:var(--surface-2);color:var(--ink-soft);}

/* ---------- card / table ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);}
.card-pad{padding:20px 22px;}
.table-wrap{overflow-x:auto;border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;min-width:840px;}
thead th{position:sticky;top:0;background:var(--surface-2);text-align:right;font-size:12px;color:var(--ink-soft);padding:11px 14px;border-bottom:2px solid var(--border);white-space:nowrap;}
tbody td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:13.5px;vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--surface-2);}
.cell-notes textarea{min-height:38px;font-size:12.5px;resize:vertical;}
.empty-state{padding:50px 20px;text-align:center;color:var(--ink-soft);}
.empty-state .big{font-size:34px;margin-bottom:8px;}
.readonly-text{font-size:13px;color:var(--ink);}

/* edit audit row */
.audit-row{font-size:10.5px;color:var(--ink-soft);margin-top:3px;}

/* ---------- overdue orders: > 25 days ---------- */
@keyframes overdueFlash{0%,100%{background:transparent;}50%{background:#FEF0F0;}}
tr.overdue-row{background:#FEF8F8;}
tr.overdue-row:hover{background:#FDEDED!important;}
tr.overdue-row td:first-child::after{content:' 🔴';font-size:11px;}
tr.delivered-row,.result-card.delivered-row{opacity:.32;filter:saturate(.5);transition:opacity .15s,filter .15s;text-decoration:line-through;text-decoration-color:var(--ink-soft);}
tr.delivered-row select,tr.delivered-row input,tr.delivered-row textarea,tr.delivered-row button,
.result-card.delivered-row select,.result-card.delivered-row input,.result-card.delivered-row textarea,.result-card.delivered-row button,
tr.delivered-row .delivered-date,.result-card.delivered-row .delivered-date,
tr.delivered-row .delivered-check-label,.result-card.delivered-row .delivered-check-label{text-decoration:none;}
tr.delivered-row:hover,.result-card.delivered-row:hover{opacity:.85;filter:saturate(1);}
.overdue-badge{display:inline-flex;align-items:center;gap:4px;background:#FDECEC;color:#C0392B;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;border:1px solid #F5C6C2;white-space:nowrap;}
.nearing-badge{display:inline-flex;align-items:center;gap:4px;background:#FEF6E0;color:#8A6500;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:700;border:1px solid #F2DB9A;white-space:nowrap;}
.filter-banner{display:flex;align-items:center;gap:10px;padding:10px 16px;border-radius:10px;font-weight:700;font-size:13.5px;margin-bottom:12px;}
.filter-urgent{background:#FDECEC;color:#C0392B;border:1px solid #F5C6C2;}
.filter-nearing{background:#FEF6E0;color:#8A6500;border:1px solid #F2DB9A;}
.btn-clear-filter{background:none;border:none;cursor:pointer;font-weight:800;font-size:13px;opacity:.7;padding:0;color:inherit;}
.btn-clear-filter:hover{opacity:1;text-decoration:underline;}
@keyframes overdueWarn{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
.overdue-badge .warn-icon{animation:overdueWarn 0.8s ease-in-out infinite;display:inline-block;}
/* ---------- smaller status badge in table rows ---------- */
.badge-sm{font-size:10.5px!important;padding:2px 7px!important;border-radius:14px!important;}

/* ---------- search results ---------- */
.result-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
.result-name{font-weight:700;font-size:18px;}
.result-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:14px;}
.result-grid .k{font-size:13px;color:var(--ink-soft);}
.result-grid .v{font-size:16px;font-weight:700;margin-top:3px;}
.search-hint{text-align:center;padding:40px 20px;color:var(--ink-soft);}
.search-hint .big{font-size:40px;margin-bottom:10px;}

/* ---------- settings ---------- */
.settings-section{margin-bottom:22px;}
.settings-section h3{font-size:15px;margin:0 0 4px;}
.settings-section .sec-desc{font-size:12.5px;color:var(--ink-soft);margin-bottom:14px;}
.opt-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;}
.emp-table th,.emp-table td{font-size:13px;}
.pin-mono{font-family:'JetBrains Mono',monospace;direction:ltr;display:inline-block;}
.type-block{margin-bottom:18px;padding-bottom:16px;border-bottom:1px dashed var(--border);}
.type-block:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.type-block .type-name{font-weight:800;margin-bottom:8px;font-size:14.5px;color:var(--accent-dark);}
.logo-preview{width:60px;height:60px;border-radius:14px;object-fit:cover;border:1px solid var(--border);margin-bottom:10px;display:block;}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(31,51,37,.45);backdrop-filter:blur(2px);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;animation:fadeIn .15s ease-out;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
.modal{background:var(--surface);border-radius:16px;width:100%;max-width:660px;max-height:90vh;overflow-y:auto;padding:26px 26px 22px;box-shadow:0 20px 50px rgba(0,0,0,.25);animation:slideUp .18s ease-out;}
@keyframes slideUp{from{transform:translateY(12px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-head h3{margin:0;font-size:18px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px;}
.form-grid .span2{grid-column:1/-1;}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);}
.confirm-box{max-width:380px;text-align:center;}
.confirm-box p{font-size:14px;color:var(--ink-soft);margin:8px 0 18px;}

/* ---------- login ---------- */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:34px 30px;width:100%;max-width:400px;box-shadow:var(--shadow);text-align:center;}
.login-card .brand-mark-lg{width:54px;height:54px;border-radius:14px;object-fit:cover;margin:0 auto;display:block;}
.login-tabs{display:flex;gap:6px;background:var(--surface-2);border-radius:10px;padding:4px;margin:18px 0 20px;}
.login-tab{flex:1;padding:9px;border-radius:8px;border:none;background:transparent;cursor:pointer;font-family:'Cairo';font-weight:700;font-size:13.5px;color:var(--ink-soft);}
.login-tab.active{background:var(--accent);color:#fff;}
.login-card .field{text-align:right;}
.login-note{font-size:11.5px;color:var(--ink-soft);margin-top:14px;}
.login-credit{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;font-size:11.5px;color:var(--ink-soft);}
.login-credit-wa{display:flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#EAFBF1;transition:transform .15s;}
.login-credit-wa:hover{transform:scale(1.12);}

/* ---------- toast ---------- */
#toast-root{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;gap:8px;z-index:200;align-items:center;}
.toast{background:var(--ink);color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:600;box-shadow:0 8px 20px rgba(0,0,0,.2);animation:toastIn .18s ease-out;}
.toast.error{background:var(--danger);}
@keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

.loading-row{padding:40px;text-align:center;color:var(--ink-soft);font-size:13px;}
.last-sync{font-size:11px;color:var(--ink-soft);}

/* ---------- dashboard ---------- */
.page-dashboard .main{background:#eef7f0;}
.page-dashboard .page-title{color:#1E7A46;}
.page-dashboard .dash-card{transition:.25s;}
.page-dashboard .dash-card:hover{transform:translateY(-4px);}
.section-title{font-family:'Cairo',sans-serif;font-weight:800;font-size:15px;margin:0 0 14px;color:var(--ink);}

.dashboard-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
  margin-bottom:28px;
}
.dash-card{
  background:#fff;border-radius:18px;padding:20px 22px;
  box-shadow:var(--shadow);border-right:6px solid;
  display:flex;flex-direction:column;gap:6px;
  transition:transform .15s,box-shadow .15s;
  cursor:default;
}
.dash-card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(31,51,37,.13);}
.dash-icon{font-size:30px;line-height:1;margin-bottom:4px;}
.dash-number{font-family:'JetBrains Mono',monospace;font-size:32px;font-weight:800;direction:ltr;}
.dash-label{font-size:13.5px;color:var(--ink-soft);font-weight:600;}

/* animated icon: a carton box settling onto a moving conveyor belt */
.conveyor-icon{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;width:54px;height:38px;}
.conveyor-box{font-size:25px;line-height:1;animation:boxDrop 1.1s ease-in-out infinite;}

.box-stack .b1{right:0;bottom:0;}

.box-stack .b3{right:8px;bottom:15px;}

.cust-mobile{font-size:12.5px;color:var(--ink-soft);margin-bottom:12px;}
.cust-stats{display:flex;justify-content:center;gap:10px;}

@keyframes crownBounce{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-4px);}}
@keyframes iconBounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}

/* حرف بادئة رقم السند — لون مميز لكل نوع تصنيع: V أزرق (فاكيوم), J أصفر (دبس), P بني (عجينة), S رصاصي غامق (تعقيم) */
const RECEIPT_LETTER_COLORS={V:'#1F6FA8',J:'#B8860B',P:'#8A5A3B',S:'#3C464A'};
function receiptLetterColor(letter){ return RECEIPT_LETTER_COLORS[letter]||null; }
/* يعرض رقم السند مع تكبير وتلوين الحرف الأول (V/J/P/S) مقارنة ببقية الرقم */
function formatReceiptNoHtml(receiptNo,baseSize){
  const rn=String(receiptNo||'');
  const m=/^([VJPS])(\d+)$/.exec(rn);
  if(!m) return escapeHtml(rn);
  const [,letter,rest]=m;
  const color=receiptLetterColor(letter);
  const size=baseSize||'1em';
  return `<span style="font-size:calc(${size} * 1.35);font-weight:900;color:${color};">${letter}</span><span>${escapeHtml(rest)}</span>`;
}

/* page body class for tinting */

/* ============== helpers ============== */
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function byId(id){ return document.getElementById(id); }
function todayIso(){ return new Date().toISOString().slice(0,10); }
function nowIso(){ return new Date().toISOString(); }
function nowTimeStr(){ return new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}); }
function formatDate(iso){ if(!iso)return'—'; const d=iso.slice(0,10); const p=d.split('-'); return p.length===3?`${p[2]}/${p[1]}/${p[0]}`:iso; }
function formatDateTime(iso){ if(!iso)return'—'; try{ const d=new Date(iso); return d.toLocaleDateString('ar-SA')+' '+d.toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return iso; } }
function isAdmin(){ return !!state.currentUser&&state.currentUser.role==='admin'; }
function currentConfig(){ return state.config||defaultConfig(); }
function employeeCanAccess(v){ const u=state.currentUser; if(!u)return false; if(u.role==='admin')return true; return u.allowedViews.includes(v); }
function canAddOrders(){ return isAdmin()||employeeCanAccess('registry'); }
function canEditProductionView(v){ return isAdmin()||employeeCanAccess(v); }

function dateTypesList(){ const cfg=currentConfig(); return (cfg.fieldOptions&&cfg.fieldOptions.dateTypes)||defaultConfig().fieldOptions.dateTypes; }
function typeSizes(t){ const cfg=currentConfig(); const pt=(cfg.fieldOptions&&cfg.fieldOptions.perType)||defaultConfig().fieldOptions.perType; return pt[t]||{packageSizes:[],cartonSizes:[]}; }
function sortedOrders(list){ return [...list].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)); }
function currentUserName(){ const u=state.currentUser; if(!u)return''; return u.role==='admin'?FIXED_ADMIN_NAME:u.name; }

/* auto receipt number — prefix by processing type: V0001 فاكيوم، J0001 دبس، P0001 عجينة، S0001 تعقيم */
const RECEIPT_PREFIX={'فاكيوم':'V','دبس':'J','عجينة':'P','تعقيم':'S'};
function nextReceiptNo(processingType){
  const prefix=RECEIPT_PREFIX[processingType]||'';
  const nums=state.orders
    .filter(o=>!prefix||(o.receiptNo||'').startsWith(prefix))
    .map(o=>{ const m=(o.receiptNo||'').match(/(\d+)\s*$/); return m?parseInt(m[1],10):0; });
  const next=(nums.length?Math.max(...nums):0)+1;
  return prefix+String(next).padStart(4,'0');
}

/* ============== Supabase Storage Layer (بدلاً من window.storage) ============== */
const SB_URL='https://epmkznzrjlaktxuefmgw.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVwbWt6bnpyamxha3R4dWVmbWd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5NjMzMDEsImV4cCI6MjA5ODUzOTMwMX0.YCdITP2C9_-_MaThJ2eANvRofrLfqgCLFPTtq-zTBGM';
const SB_HDR={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};

async function sbGet(key){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/sajjal_store?key=eq.${encodeURIComponent(key)}&select=value`,{headers:SB_HDR});
    if(!r.ok)return null;
    const d=await r.json();
    return d&&d.length?{value:d[0].value}:null;
  }catch(e){return null;}
}
async function sbSet(key,value){
  try{
    const r=await fetch(`${SB_URL}/rest/v1/sajjal_store`,{
      method:'POST',
      headers:{...SB_HDR,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({key,value,updated_at:new Date().toISOString()})
    });
    return r.ok;
  }catch(e){return false;}
}
async function storageSetRetry(key,value,_shared,retries=3,delayMs=500){
  for(let i=0;i<=retries;i++){
    const ok=await sbSet(key,value);
    if(ok)return true;
    if(i<retries)await new Promise(res=>setTimeout(res,delayMs*(i+1)));
  }
  return false;
}

}

function toast(msg,type='ok',duration=2600){
  const root=byId('toast-root');
  const el=document.createElement('div');
  el.className='toast'+(type==='error'?' error':'');
  el.textContent=msg;
  root.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),200); },duration);
}



/* ============== storage: config ============== */
async function loadConfig(){
  try{ const r=await sbGet('app-config'); if(r&&r.value)return JSON.parse(r.value); }catch(e){}
  return null;
}
async function saveConfig(cfg){
  return await storageSetRetry('app-config',JSON.stringify(cfg),true);
}
async function mutateConfig(fn,msg){
  let fresh=await loadConfig(); if(!fresh)fresh=defaultConfig();
  const updated=fn(fresh);
  const ok=await saveConfig(updated);
  if(ok){ state.config=updated; render(); if(msg)toast(msg); }
  else toast('حدث خطأ أثناء الحفظ','error');
  return ok;
}

/* ============== audit log helpers ============== */
const FIELD_LABELS={
  status:'الحالة',customerName:'اسم العميل',mobile:'الجوال',dateType:'نوع التمر',
  dateTypes:'أنواع التمر',qtyCartons:'الكمية المستلمة',processingType:'نوع التصنيع',
  packageSize:'حجم العبوة',cartonSize:'حجم الكرتون',urgent:'الأولوية',
  processingNotes:'ملاحظات التصنيع',placementLocation:'موقع التسكين',
  vacuumServices:'الخدمات الإضافية',date:'التاريخ',receiptNo:'رقم السند',
  dateCondition:'حالة التمر',qtyMfg:'الكمية المصنعة',mfgDate:'تاريخ التصنيع',
  serviceType:'نوع الخدمة',qtyReceived:'الكمية المستلمة',notes:'ملاحظات',
};
function describeChanges(oldObj,newPatch){
  const parts=[];
  for(const [k,nv] of Object.entries(newPatch)){
    if(['lastEditedBy','lastEditedAt','createdAt','id','monthKey'].includes(k))continue;
    const label=FIELD_LABELS[k]||k;
    const ov=oldObj?oldObj[k]:undefined;
    const ovStr=Array.isArray(ov)?ov.join('،'):(ov!=null?String(ov):'—');
    const nvStr=Array.isArray(nv)?nv.join('،'):(nv!=null?String(nv):'—');
    if(ovStr!==nvStr&&nvStr&&nvStr!=='—')parts.push(`${label}: ${ovStr!=='—'?`"${ovStr}" → `:''}"${nvStr}"`);
  }
  return parts.length?parts.join(' | '):'';
}
function addAudit(action){
  state.auditLog.unshift({action,user:currentUserName()||'غير معروف',time:nowIso()});
  if(state.auditLog.length>500)state.auditLog.length=500;
  saveAuditLog(state.auditLog);
}

/* ============== storage: customer notes (ملاحظة ثابتة لكل عميل) ============== */
async function loadCustomerNotes(){
  try{ const r=await sbGet('customer-notes'); if(r&&r.value)return JSON.parse(r.value); }catch(e){}
  return {};
}
async function saveCustomerNotes(map){
  return await storageSetRetry('customer-notes',JSON.stringify(map),true);
}
async function setCustomerNote(key,note){
  const fresh=await loadCustomerNotes();
  fresh[key]=note;
  const ok=await saveCustomerNotes(fresh);
  if(ok){ state.customerNotes=fresh; toast('تم حفظ ملاحظة العميل'); render(); }
  else toast('خطأ في حفظ الملاحظة','error');
  return ok;
}

/* ============== storage: service orders ============== */
async function loadServiceOrders(){
  try{ const r=await sbGet('service-orders'); if(r&&r.value)return JSON.parse(r.value); }catch(e){}
  return [];
}
async function saveServiceOrders(list){
  return await storageSetRetry('service-orders',JSON.stringify(list),true);
}
async function addServiceOrder(payload,silent){
  const newSO={id:genId(),createdAt:Date.now(),lastEditedBy:currentUserName(),lastEditedAt:nowIso(),...payload};
  const fresh=await loadServiceOrders();
  const ok=await saveServiceOrders([...fresh,newSO]);
  if(ok){ state.serviceOrders=[...state.serviceOrders,newSO]; addAudit(`إضافة خدمة ${newSO.receiptNo||''}`); render(); if(!silent)toast('تم تسجيل الخدمة'); }
  else toast('خطأ في الحفظ','error');
  return ok;
}
async function updateServiceOrder(id,patch,msg){
  const so=state.serviceOrders.find(x=>x.id===id);
  if(!so){ toast('السجل غير موجود','error'); return false; }
  const changes=describeChanges(so,patch);
  const fresh=await loadServiceOrders();
  const auditPatch={lastEditedBy:currentUserName(),lastEditedAt:nowIso()};
  const updated=fresh.map(x=>x.id===id?{...x,...patch,...auditPatch}:x);
  const ok=await saveServiceOrders(updated);
  if(ok){
    state.serviceOrders=state.serviceOrders.map(x=>x.id===id?{...x,...patch,...auditPatch}:x);
    addAudit(`تعديل خدمة ${patch.receiptNo||so.receiptNo||''}${changes?' — '+changes:''}`);
    render(); if(msg)toast(msg);
  } else toast('خطأ في الحفظ','error');
  return ok;
}
async function deleteServiceOrder(id,silent){
  const so=state.serviceOrders.find(x=>x.id===id);
  if(!so)return false;
  const fresh=await loadServiceOrders();
  const ok=await saveServiceOrders(fresh.filter(x=>x.id!==id));
  if(ok){ state.serviceOrders=state.serviceOrders.filter(x=>x.id!==id); if(!silent){addAudit(`حذف خدمة ${so.receiptNo||''}`); render(); toast('تم حذف السجل');} }
  else if(!silent) toast('خطأ في الحذف','error');
  return ok;
}

async function loadIndex(){
  try{ const r=await sbGet('orders-index'); if(r&&r.value)return JSON.parse(r.value); }catch(e){}

}
async function saveIndex(idx){

}
async function loadMonth(m){
  try{ const r=await sbGet('orders:'+m); if(r&&r.value)return JSON.parse(r.value); }catch(e){}
  return [];
}
async function saveMonth(m,list){

function genId(){ return 'o_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8); }

async function addOrder(payload){
  const now=Date.now();
  const monthKey=new Date(now).toISOString().slice(0,7);
  const newOrder={id:genId(),createdAt:now,monthKey,
    lastEditedBy:currentUserName(), lastEditedAt:nowIso(),
    ...payload};
  let idx=state.monthIndex.length?state.monthIndex:await loadIndex();
  if(!idx.includes(monthKey)){ idx=[...idx,monthKey].sort(); await saveIndex(idx); state.monthIndex=idx; }
  const fresh=await loadMonth(monthKey);
  const ok=await saveMonth(monthKey,[...fresh,newOrder]);
  if(ok){ state.orders=[...state.orders,newOrder]; addAudit(`إضافة طلب ${newOrder.receiptNo||''}`); render(); toast('تم تسجيل الطلب'); }
  else toast('خطأ في الحفظ','error');
  return ok;
}
async function updateOrder(id,patch,msg){
  const order=state.orders.find(o=>o.id===id);
  if(!order){ toast('الطلب غير موجود','error'); return false; }
  const changes=describeChanges(order,patch);
  const auditPatch={ lastEditedBy:currentUserName(), lastEditedAt:nowIso() };
  const fresh=await loadMonth(order.monthKey);
  const updated=fresh.map(o=>o.id===id?{...o,...patch,...auditPatch}:o);
  const ok=await saveMonth(order.monthKey,updated);
  if(ok){
    state.orders=state.orders.map(o=>o.id===id?{...o,...patch,...auditPatch}:o);
    addAudit(`تعديل طلب ${patch.receiptNo||order.receiptNo||''}${changes?' — '+changes:''}`);
    render(); if(msg)toast(msg);
  } else toast('خطأ في الحفظ','error');
  return ok;
}
async function deleteOrderById(id){
  const order=state.orders.find(o=>o.id===id);
  if(!order)return false;
  const fresh=await loadMonth(order.monthKey);
  const ok=await saveMonth(order.monthKey,fresh.filter(o=>o.id!==id));
  if(ok){
    state.orders=state.orders.filter(o=>o.id!==id);
    addAudit(`حذف طلب ${order.receiptNo||''}`);
    /* حذف الخدمات الإضافية المرتبطة تلقائيًا (حشو لوز / تقعيم تمور) */
    if(order.processingType==='فاكيوم'&&order.receiptNo){
      const linked=state.serviceOrders.filter(so=>so.receiptNo===order.receiptNo&&(so.serviceSource||'manual')==='auto');
      for(const so of linked) await deleteServiceOrder(so.id,true);
      if(linked.length) addAudit(`حذف ${linked.length} خدمة إضافية مرتبطة برقم ${order.receiptNo}`);
    }
    render(); toast('تم حذف الطلب');
  } else toast('خطأ في الحذف','error');
  return ok;
}
async function fullRefresh(){ state.orders=await loadAllOrders(); state.lastSync=nowTimeStr(); }
async function pollRefresh(){
  if(state.modalOpen||!state.currentUser)return;
  const idx=await loadIndex(); state.monthIndex=idx;
  const now=new Date();
  const months=[now.toISOString().slice(0,7),new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7)];
  const toRefresh=idx.filter(m=>months.includes(m));
  if(!toRefresh.length)return;
  const lists=await Promise.all(toRefresh.map(m=>loadMonth(m)));
  const merged=state.orders.filter(o=>!toRefresh.includes(o.monthKey));
  lists.forEach(l=>l.forEach(o=>merged.push(o)));
  state.orders=merged; state.lastSync=nowTimeStr(); render();
}

function isOverdue(o){
  if(!o.date||o.status==='تم التسليم')return false;
  const created=new Date(o.date);
  const diff=(Date.now()-created.getTime())/(1000*60*60*24);
  return diff>25;
}
function overdueBadge(o){
  if(!isOverdue(o))return'';
  return`<span class="overdue-badge"><span class="warn-icon">⚠️</span>متأخر</span>`;
}
/* تنبيه مبكر — الطلب قارب على التأخير (بين 18 و25 يوم) ولم يُسلَّم بعد */
function isNearingDelay(o){
  if(!o.date||o.status==='تم التسليم')return false;
  const diff=(Date.now()-new Date(o.date).getTime())/(1000*60*60*24);
  return diff>=18&&diff<=25;
}
function nearingDelayBadge(o){
  if(!isNearingDelay(o))return'';
  return`<span class="nearing-badge"><span class="warn-icon">🟡</span>قرّب يتأخر</span>`;
}

/* ترتيب مواقع التسكين: الصف الأول ثم العمود — 1-1, 1-2, 1-3, 2-1, 2-2... */
function parsePlacement(loc){
  const m=(loc||'').trim().match(/^(\d+)\s*-\s*(\d+)$/);
  if(!m)return{row:9999,col:9999};
  return{row:parseInt(m[1],10),col:parseInt(m[2],10)};
}
function sortByPlacement(list){
  return [...list].sort((a,b)=>{
    const pa=parsePlacement(a.placementLocation),pb=parsePlacement(b.placementLocation);
    if(pa.row!==pb.row)return pa.row-pb.row;
    return pa.col-pb.col;
  });
}
/* عدد الأيام منذ تاريخ التصنيع إن وُجد، وإلا منذ تاريخ استلام الطلب */
function daysInWarehouse(o){
  const refDate=o.mfgDate||o.date;
  if(!refDate)return 0;
  const created=new Date(refDate);
  return Math.max(0,Math.floor((Date.now()-created.getTime())/(1000*60*60*24)));
}
/* عداد صغير: عدد الأيام بدون تصنيع (من تاريخ الطلب لحد الآن)، ولو تم التصنيع يتجمّد على عدد الأيام التي استغرقها */
function daysWithoutMfgBadge(o){
  if(!o||!o.date)return'';
  const start=new Date(o.date);
  if(isNaN(start))return'';
  if((o.qtyMfg||'').toString().trim()){
    const end=o.mfgDate?new Date(o.mfgDate):new Date();
    const days=Math.max(0,Math.floor((end.getTime()-start.getTime())/(1000*60*60*24)));
    return `<div class="days-counter days-counter-done">✓ استغرق ${days} يوم للتصنيع</div>`;
  }
  const days=Math.max(0,Math.floor((Date.now()-start.getTime())/(1000*60*60*24)));
  const cls=days>25?'days-counter-danger':(days>=18?'days-counter-warn':'days-counter-ok');
  return `<div class="days-counter ${cls}">${days} يوم بدون تصنيع</div>`;
}

  const parts=(name||'').trim().split(/\s+/).filter(Boolean);
  if(!parts.length)return'؟';
  return parts[0].charAt(0);
}
function renderTopbar(){
  if(!state.currentUser)return'';

/* ============== render dispatcher ============== */
function render(){
  if(!state.currentUser)return;
  /* body tinting */
  document.body.className='';
  if(PAGE_BODY_CLASS[state.view])document.body.classList.add(PAGE_BODY_CLASS[state.view]);
  renderSidebar();
  const main=byId('main');
  if(!state.loaded){ main.innerHTML=`<div class="loading-row">جاري تحميل البيانات…</div>`; return; }
  if(state.view==='audit'&&!isAdmin())state.view='dashboard';
  if(state.view==='customers'&&!isAdmin())state.view='dashboard';
  let pageHtml='';
  if(state.view==='dashboard')   pageHtml=renderDashboard();
  else if(state.view==='registry')  pageHtml=renderRegistry();
  else if(state.view==='services')  pageHtml=renderServices();
  else if(state.view==='search')    pageHtml=renderSearch();
  else if(state.view==='settings')  pageHtml=renderSettings();
  else if(state.view==='audit')     pageHtml=renderAudit();
  else if(state.view==='customers') pageHtml=renderCustomers();
  else if(state.view==='warehouse') pageHtml=renderWarehouse();
  else pageHtml=renderProduction(state.view);
  main.innerHTML=renderTopbar()+pageHtml;
  attachViewEvents();
}

  const delivered = orders.filter(o=>o.status==='تم التسليم').length;

  const deliveredWithDates=orders.filter(o=>o.status==='تم التسليم'&&o.date&&o.lastEditedAt);

/* ============== customers database (admin only) ============== */
/* تجميع العملاء من الطلبات — التجميع برقم الجوال (الرقم الأصح) لمنع تكرار نفس العميل أكثر من مرة */
function buildCustomerDirectory(){
  const map=new Map();
  sortedOrders(state.orders).slice().reverse().forEach(o=>{
    const mobileNorm=(o.mobile||'').replace(/[^0-9]/g,'');
    const key=mobileNorm?('m:'+mobileNorm):(o.customerName?('n:'+o.customerName.trim().toLowerCase()):null);
    if(!key)return;
    if(!map.has(key))map.set(key,{key,name:o.customerName||'بدون اسم',mobile:o.mobile||'',orderCount:0,totalQty:0,lastDate:'',orders:[]});
    const rec=map.get(key);
    rec.orderCount+=1;
    rec.totalQty+=Number(o.qtyCartons)||0;
    rec.orders.push(o);
    if(!rec.mobile&&o.mobile)rec.mobile=o.mobile;
    if(!rec.lastDate||(o.date||'')>=rec.lastDate){ rec.lastDate=o.date||rec.lastDate; rec.name=o.customerName||rec.name; }
  });
  return Array.from(map.values()).sort((a,b)=>b.totalQty-a.totalQty);
}

    (o.receiptNo||'').toLowerCase().includes(term)||

/* ============== search ============== */
function renderSearch(){
  const term=state.searchTerm.trim().toLowerCase();
  /* orders only ever appear after the user actually types something (receipt code / name / mobile) —
     choosing a status alone is not enough, by design */
  const hasSearch=term.length>0;
  let results=[];

/* ============== print: production order (A4) ============== */
function printOrder(id){
  const o=state.orders.find(x=>x.id===id);
  if(!o)return;
  const cfg=currentConfig();
  const qrPayload=`سند:${o.receiptNo||''} | عميل:${o.customerName||''} | جوال:${o.mobile||''} | نوع:${o.dateType||''} | كمية:${o.qtyCartons||''}`;
  const pa=byId('print-area');
  pa.innerHTML=`
  <div class="print-sheet">
    <div class="print-head">
      ${cfg.logoDataUrl?`<img src="${escapeHtml(cfg.logoDataUrl)}">`:''}
      <div>
        <h2>${escapeHtml(cfg.factoryName||'مصنع تمور مزرعة الرفايع')}</h2>
        <div class="sub">أمر تصنيع — تاريخ الطباعة: ${formatDateTime(nowIso())}</div>
      </div>
    </div>
    <div class="print-title">أمر تصنيع — سند رقم ${escapeHtml(o.receiptNo||'—')}</div>
    <div class="print-grid">
      <div><div class="pk">العميل</div><div class="pv">${escapeHtml(o.customerName||'—')}</div></div>
      <div><div class="pk">رقم الجوال</div><div class="pv">${escapeHtml(o.mobile||'—')}</div></div>
      <div><div class="pk">نوع التمر</div><div class="pv">${escapeHtml(o.dateType||'—')}</div></div>
      <div><div class="pk">الكمية (كراتين)</div><div class="pv">${escapeHtml(o.qtyCartons||'—')}</div></div>
      <div><div class="pk">نوع التصنيع</div><div class="pv">${escapeHtml(o.processingType||'—')}</div></div>
      <div><div class="pk">الحالة</div><div class="pv">${escapeHtml(o.status||'—')}</div></div>
    </div>
    <div class="pk" style="margin-bottom:6px;">الملاحظات</div>
    <div class="print-notes">${escapeHtml(o.processingNotes||'لا توجد ملاحظات')}</div>
    <div class="print-foot">
      <div class="print-sign">توقيع المسؤول عن التصنيع<div class="line"></div></div>
      <div class="print-qr"><div id="print-qr-box"></div><span>سند ${escapeHtml(o.receiptNo||'')}</span></div>
    </div>
  </div>`;
  const qrBox=byId('print-qr-box');
  qrBox.innerHTML='';
  if(window.QRCode){ try{ new QRCode(qrBox,{text:qrPayload,width:96,height:96,colorDark:'#1F3325',colorLight:'#ffffff'}); }catch(e){} }
  /* show print-area, print, then hide again */
  pa.style.display='block';
  setTimeout(()=>{
    window.print();
    setTimeout(()=>{ pa.style.display=''; pa.innerHTML=''; },500);
  },350);
}

    else if(!pkgVal){firstInvalid=get('packageSize');errorMsg='حجم العبوة مطلوب';}
    else if(!ctnVal){firstInvalid=get('cartonSize');errorMsg='حجم الكرتون مطلوب';}
    if(firstInvalid){firstInvalid.classList.add('field-error');firstInvalid.focus();toast(errorMsg,'error');return;}
    if(errorMsg&&!firstInvalid){toast(errorMsg,'error');return;}
    const dupExists=state.orders.some(ord=>ord.receiptNo===receiptNoVal&&(!isEdit||ord.id!==o.id));
    if(dupExists){ get('receiptNo').classList.add('field-error'); toast('رقم السند موجود بالفعل','error'); return; }
    const dateTypeOtherVal=(formEl.querySelector('#dateTypeOther-input')?.value||'').trim();
    /* خدمات الفاكيوم المختارة فعليًا من صناديق الاختيار (تشمل سحب هواء — قابلة للإزالة الآن) */
    const vacuumServices=processingTypeVal==='فاكيوم'?VACUUM_SERVICES.filter(s=>formEl.querySelector(`[name="vs-${s}"]`)?.checked):[];
    const payload={
      date:dateVal,receiptNo:receiptNoVal,customerName:customerNameVal,
      mobile:mobileRaw,
      dateTypes:selectedDateTypes,
      dateType:selectedDateTypes.length===1&&selectedDateTypes[0]!=='أخرى'?selectedDateTypes[0]:(dateTypeOtherVal||selectedDateTypes.join('،')),
      dateTypeOther:dateTypeOtherVal,
      qtyCartons:qtyVal,processingType:processingTypeVal,
      status:isEdit?o.status||'جديد':'جديد',
      packageSize:pkgVal,cartonSize:ctnVal,urgent:get('urgent').checked,
      processingNotes:get('processingNotes').value.trim(),
      vacuumServices,
      dateCondition:{good:byId('cond-good').checked,hasNotes:byId('cond-hasnotes').checked,detail:byId('cond-detail').value.trim()},
    };
    if(isEdit){
      const ok=await updateOrder(o.id,payload,'تم حفظ التعديلات');
      if(ok&&processingTypeVal==='فاكيوم')await syncExtraServiceRecords(payload,vacuumServices);
    }else{
      const ok=await addOrder(payload);
      if(ok&&processingTypeVal==='فاكيوم')await syncExtraServiceRecords(payload,vacuumServices);
    }
    close();
  });
}

/* خدمات "تقعيم تمور" و"حشو لوز" — إذا اختيرت مع الفاكيوم (عند التسجيل أو التعديل) تُنشئ نسخة في صفحة الخدمات الإضافية أيضاً، بدون تكرار سجل موجود لنفس رقم السند ونفس الخدمة */
async function syncExtraServiceRecords(payload,extraVacSvcs){
  const extraForServices=extraVacSvcs.filter(s=>VACUUM_SERVICES_EXTRA.includes(s));
  if(!extraForServices.length)return;
  const existingTypes=state.serviceOrders.filter(so=>so.receiptNo===payload.receiptNo).map(so=>so.serviceType);
  const toCreate=extraForServices.filter(s=>!existingTypes.includes(s));
  const created=[],failed=[];
  for(const svc of toCreate){
    const ok=await addServiceOrder({
      date:payload.date,receiptNo:payload.receiptNo,customerName:payload.customerName,
      dateTypes:payload.dateTypes||[],dateType:payload.dateType,serviceType:svc,
      qtyReceived:payload.qtyCartons||'',qtyMfg:'',mfgDate:'',notes:'',serviceSource:'auto',
    },true);
    if(ok)created.push(svc); else failed.push(svc);
  }
  if(created.length>0)toast(`✅ نُسخ سند ${payload.receiptNo||''} إلى الخدمات الإضافية (${created.join('، ')})`,'ok',5000);
  if(failed.length>0)toast(`⚠️ تعذّر نسخ (${failed.join('، ')}) إلى الخدمات الإضافية — جرّب الحفظ مرة أخرى`,'error',6000);
  if(created.length===0&&failed.length===0)toast(`ℹ️ سند ${payload.receiptNo||''} موجود بالفعل في الخدمات الإضافية`,'ok',3500);
}

  byId('overlay').addEventListener('click',ev=>{ if(ev.target.id==='overlay')close(); });
  byId('submit-emp-btn').addEventListener('click',async()=>{
    const formEl=byId('emp-form');

    },isEdit?'تم حفظ بيانات الموظف':'تم إضافة الموظف');
    close();
  });
}

async function importOrdersFromExcel(file){
  if(!window.XLSX){ toast('تعذّر تحميل مكتبة Excel — تأكد من الاتصال بالإنترنت','error'); return; }
  toast('جارٍ قراءة الملف…');
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const sheetName=wb.SheetNames[0];
    const ws=wb.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!rows.length){ toast('الملف فارغ أو بدون بيانات صالحة','error'); return; }
    await fullRefresh();

    const norm=s=>String(s||'').replace(/\(.*?\)/g,'').trim();
    const getVal=(row,...names)=>{
      for(const key of Object.keys(row)){
        const nk=norm(key);
        if(names.some(n=>nk.includes(n)))return row[key];
      }
      return '';
    };

    const valid=[],errors=[];
    const seqCounters={};
    rows.forEach((row,i)=>{
      const rowNum=i+2;
      const dateRaw=getVal(row,'التاريخ');
      let dateVal='';
      if(dateRaw instanceof Date&&!isNaN(dateRaw)){
        dateVal=`${dateRaw.getFullYear()}-${String(dateRaw.getMonth()+1).padStart(2,'0')}-${String(dateRaw.getDate()).padStart(2,'0')}`;
      }else if(typeof dateRaw==='number'&&window.XLSX&&XLSX.SSF){
        const d=XLSX.SSF.parse_date_code(dateRaw);
        if(d)dateVal=`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
      }else if(typeof dateRaw==='string'&&dateRaw.trim()){
        const s=dateRaw.trim();
        const m1=/^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(s);
        const m2=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
        if(m1)dateVal=`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
        else if(m2)dateVal=`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
      }
      const processingType=String(getVal(row,'نوع التصنيع')||'').trim();
      let receiptNo=String(getVal(row,'رقم السند')||'').trim();
      const customerName=String(getVal(row,'اسم العميل')||'').trim();
      let mobile=String(getVal(row,'رقم الجوال','الجوال')||'').trim().replace(/\D/g,'');
      if(mobile&&mobile.length<10)mobile=mobile.padStart(10,'0');
      const qtyCartons=String(getVal(row,'الكمية المستلمة','كراتين')||'').trim();
      const dateTypeRaw=String(getVal(row,'نوع التمر')||'').trim();
      const dateTypes=dateTypeRaw?dateTypeRaw.split(/[,،]/).map(s=>s.trim()).filter(Boolean):[];
      const packageSize=String(getVal(row,'حجم العبوة')||'').trim();
      const cartonSize=String(getVal(row,'حجم الكرتون')||'').trim();
      const urgentRaw=String(getVal(row,'مستعجل')||'').trim();
      const urgent=/^(نعم|yes|true|1)$/i.test(urgentRaw);
      const processingNotes=String(getVal(row,'ملاحظات')||'').trim();

      if(!dateVal&&!processingType&&!customerName&&!mobile&&!qtyCartons&&!dateTypes.length&&!packageSize&&!cartonSize)return;

      const rowErrors=[];
      if(!dateVal)rowErrors.push('تاريخ غير صالح');
      if(!PROCESSING_TYPES.includes(processingType))rowErrors.push('نوع التصنيع غير صحيح');
      if(!customerName)rowErrors.push('اسم العميل مطلوب');
      if(!mobile||!/^\d{10}$/.test(mobile))rowErrors.push('رقم الجوال يجب أن يكون 10 أرقام');
      if(!qtyCartons)rowErrors.push('الكمية المستلمة مطلوبة');
      if(!dateTypes.length)rowErrors.push('نوع التمر مطلوب');
      if(!packageSize)rowErrors.push('حجم العبوة مطلوب');
      if(!cartonSize)rowErrors.push('حجم الكرتون مطلوب');
      if(rowErrors.length){ errors.push(`صف ${rowNum}: ${rowErrors.join('، ')}`); return; }

      if(!receiptNo){
        const prefix=RECEIPT_PREFIX[processingType]||'';
        if(seqCounters[prefix]===undefined){
          const nums=state.orders.filter(o=>!prefix||(o.receiptNo||'').startsWith(prefix))
            .map(o=>{ const m=(o.receiptNo||'').match(/(\d+)\s*$/); return m?parseInt(m[1],10):0; });
          seqCounters[prefix]=nums.length?Math.max(...nums):0;
        }
        seqCounters[prefix]+=1;
        receiptNo=prefix+String(seqCounters[prefix]).padStart(4,'0');
      }else{
        const dup=state.orders.some(o=>o.receiptNo===receiptNo)||valid.some(v=>v.receiptNo===receiptNo);
        if(dup){ errors.push(`صف ${rowNum}: رقم السند "${receiptNo}" مستخدم بالفعل`); return; }
      }

      valid.push({
        date:dateVal,receiptNo,customerName,mobile,
        dateTypes,dateType:dateTypes.length===1?dateTypes[0]:dateTypes.join('،'),
        qtyCartons,processingType,status:'جديد',
        packageSize,cartonSize,urgent,processingNotes,vacuumServices:[],
        dateCondition:{good:false,hasNotes:false,detail:''},
      });
    });

    if(!valid.length){
      toast('لم يتم استيراد أي صف — راجع الملاحظات','error',5000);
      if(errors.length)showImportErrorsModal(errors);
      return;
    }

    const now=Date.now();
    const byMonth={};
    valid.forEach((payload,idx2)=>{
      const monthKey=(payload.date||todayIso()).slice(0,7);
      const newOrder={id:genId(),createdAt:now+idx2,monthKey,lastEditedBy:currentUserName(),lastEditedAt:nowIso(),...payload};
      (byMonth[monthKey]=byMonth[monthKey]||[]).push(newOrder);
    });
    let idx=state.monthIndex.length?state.monthIndex:await loadIndex();
    const newMonths=Object.keys(byMonth).filter(m=>!idx.includes(m));
    if(newMonths.length){ idx=[...idx,...newMonths].sort(); await saveIndex(idx); state.monthIndex=idx; }
    let savedOrders=[];
    for(const monthKey of Object.keys(byMonth)){
      const fresh=await loadMonth(monthKey);
      const merged=[...fresh,...byMonth[monthKey]];
      const ok=await saveMonth(monthKey,merged);
      if(ok)savedOrders=savedOrders.concat(byMonth[monthKey]);
      else errors.push(`تعذّر حفظ بيانات شهر ${monthKey}`);
    }
    if(savedOrders.length){
      state.orders=[...state.orders,...savedOrders];
      addAudit(`استيراد ${savedOrders.length} طلب من ملف Excel`);
      render();
    }
    if(savedOrders.length&&!errors.length){
      toast(`✅ تم استيراد ${savedOrders.length} طلب بنجاح`,'ok',4000);
    }else if(savedOrders.length&&errors.length){
      toast(`تم استيراد ${savedOrders.length} طلب، وتعذّر استيراد ${errors.length} صف`,'error',5000);
      showImportErrorsModal(errors);
    }else{
      toast('تعذّر استيراد أي بيانات','error');
      showImportErrorsModal(errors);
    }
  }catch(e){
    console.error(e);
    toast('تعذّر قراءة ملف Excel — تأكد من صيغة الملف','error');
  }
}

  /* click anywhere on an order row/card (but not on an interactive control inside it) opens the details view */
  document.querySelectorAll('tbody tr[data-id]').forEach(tr=>tr.addEventListener('click',e=>{
    if(e.target.closest('button,select,textarea,input,a,label'))return;
    openOrderDetailModal(tr.dataset.id);
  }));
  document.querySelectorAll('.result-card[data-id]').forEach(card=>card.addEventListener('click',e=>{
    if(e.target.closest('button,select,textarea,input,a,label'))return;
    openOrderDetailModal(card.dataset.id);
  }));

  document.querySelectorAll('.status-select').forEach(s=>s.addEventListener('change',async()=>updateOrder(s.dataset.id,{status:s.value,statusDate:nowIso()},'تم تحديث الحالة')));
  document.querySelectorAll('.delivered-checkbox').forEach(cb=>cb.addEventListener('change',async()=>{
    const id=cb.dataset.id;
    if(cb.checked){
      await updateOrder(id,{status:'تم التسليم',statusDate:nowIso()},'تم تحديد الطلب كـ "تم التسليم"');
    }else{
      await updateOrder(id,{status:'جاهز للتسليم',statusDate:nowIso()},'تم إلغاء "تم التسليم"');
    }
  }));
  document.querySelectorAll('.notes-input').forEach(ta=>ta.addEventListener('blur',async()=>updateOrder(ta.dataset.id,{processingNotes:ta.value})));
  document.querySelectorAll('.placement-input').forEach(inp=>inp.addEventListener('blur',async()=>{
    inp.style.outline='';
    await updateOrder(inp.dataset.id,{placementLocation:inp.value.trim()});
  }));

  /* الكمية المصنعة — تُكتب يدويًا في سجل الطلبات، وأول مرة تُكتب فيها يُسجَّل تاريخ التصنيع تلقائيًا */
  document.querySelectorAll('.qty-mfg-input').forEach(inp=>inp.addEventListener('blur',async()=>{
    const val=inp.value.trim();
    const o=state.orders.find(x=>x.id===inp.dataset.id);
    if(!o)return;
    if(val===''){
      if(o.qtyMfg)await updateOrder(o.id,{qtyMfg:'',mfgDate:''});
      return;
    }
    if(val===String(o.qtyMfg||''))return;
    const patch={qtyMfg:val};
    if(!o.mfgDate)patch.mfgDate=todayIso();
    /* لما تُكتب الكمية المصنعة لأول مرة، ينتقل الطلب تلقائيًا لحالة "تم التصنيع" ويُسجَّل تاريخ الحالة */
    if(!o.qtyMfg&&o.status!=='جاهز للتسليم'&&o.status!=='تم التسليم'){
      patch.status='جاهز للتسليم';
      patch.statusDate=nowIso();
    }
    await updateOrder(o.id,patch,'تم تسجيل الكمية المصنعة');
  }));

  const si=byId('search-input');
  if(si){
    si.focus(); si.setSelectionRange(si.value.length,si.value.length);
    let t; si.addEventListener('input',()=>{ clearTimeout(t); t=setTimeout(()=>{ state.searchTerm=si.value; render(); },250); });
  }
  const sf=byId('status-filter');
  if(sf)sf.addEventListener('change',()=>{ state.searchStatus=sf.value; render(); });

  /* customers database page */
  const becBtn=byId('btn-export-customers');
  if(becBtn)becBtn.addEventListener('click',exportCustomersExcel);
  const csi=byId('customer-search-input');
  if(csi){
    csi.focus(); csi.setSelectionRange(csi.value.length,csi.value.length);
    let t2; csi.addEventListener('input',()=>{ clearTimeout(t2); t2=setTimeout(()=>{ state.customersSearchTerm=csi.value; render(); },250); });
  }
  document.querySelectorAll('.cust-card[data-key]').forEach(card=>card.addEventListener('click',()=>openCustomerDetailModal(card.dataset.key)));

  /* registry page search */
  const rsi=byId('registry-search-input');
  if(rsi){
    rsi.focus(); rsi.setSelectionRange(rsi.value.length,rsi.value.length);
    let t3; rsi.addEventListener('input',()=>{ clearTimeout(t3); t3=setTimeout(()=>{ state.registrySearchTerm=rsi.value; render(); },250); });
  }

  /* warehouse page search + click-through to detail */
  const wsi=byId('warehouse-search-input');
  if(wsi){
    wsi.focus(); wsi.setSelectionRange(wsi.value.length,wsi.value.length);
    let t4; wsi.addEventListener('input',()=>{ clearTimeout(t4); t4=setTimeout(()=>{ state.warehouseSearchTerm=wsi.value; render(); },250); });
  }
  document.querySelectorAll('.wh-row[data-id]').forEach(row=>row.addEventListener('click',e=>{
    if(e.target.closest('button,select,textarea,input,a,label'))return;
    openOrderDetailModal(row.dataset.id);
  }));
  const dcu=byId('dash-card-urgent');
  if(dcu)dcu.addEventListener('click',()=>{ state.view='registry'; state.registryFilter='urgent'; render(); });
  const dco=byId('dash-card-overdue');
  if(dco)dco.addEventListener('click',()=>{ state.view='registry'; state.registryFilter='overdue'; render(); });
  const whMnp=byId('wh-card-mfg-not-placed');
  if(whMnp)whMnp.addEventListener('click',()=>{ state.view='registry'; state.registryFilter='mfg-not-placed'; render(); });
  const dcn=byId('dash-card-nearing');
  if(dcn)dcn.addEventListener('click',()=>{ state.view='registry'; state.registryFilter='nearing'; render(); });
  const dcw=byId('dash-card-warehouse');
  if(dcw)dcw.addEventListener('click',()=>{ state.view='warehouse'; render(); });
  const cfBtn=byId('btn-clear-registry-filter');
  if(cfBtn)cfBtn.addEventListener('click',()=>{ state.registryFilter='all'; render(); });
  const scr=byId('stat-chip-remaining-registry');
  if(scr)scr.addEventListener('click',()=>{ state.registryFilter=state.registryFilter==='remaining'?'all':'remaining'; render(); });
  document.querySelectorAll('#stat-chip-remaining-prod').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const v=chip.dataset.view;
      state.productionFilter=state.productionFilter||{};
      state.productionFilter[v]=(state.productionFilter[v]==='remaining')?'all':'remaining';
      render();
    });
  });
  document.querySelectorAll('#btn-clear-prod-filter').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const v=btn.dataset.view;
      state.productionFilter=state.productionFilter||{};
      state.productionFilter[v]='all';
      render();
    });
  });
  const pwBtn=byId('btn-print-warehouse');
  if(pwBtn)pwBtn.addEventListener('click',printWarehouse);

  /* بحث صفحات التصنيع (فاكيوم / دبس / عجينة / تعقيم) */
  document.querySelectorAll('[id^="prod-search-"]').forEach(psi=>{
    psi.focus(); psi.setSelectionRange(psi.value.length,psi.value.length);
    const view=psi.id.replace('prod-search-','');
    let t5; psi.addEventListener('input',()=>{ clearTimeout(t5); t5=setTimeout(()=>{
      state.productionSearchTerm=state.productionSearchTerm||{};
      state.productionSearchTerm[view]=psi.value;
      render();
    },250); });
  });

  /* بحث سجل العمليات */
  const ausi=byId('audit-search-input');
  if(ausi){
    ausi.focus(); ausi.setSelectionRange(ausi.value.length,ausi.value.length);
    let t6; ausi.addEventListener('input',()=>{ clearTimeout(t6); t6=setTimeout(()=>{ state.auditSearchTerm=ausi.value; render(); },250); });
  }

  /* settings */
  const soBtn=byId('btn-save-options');
  if(soBtn)soBtn.addEventListener('click',async()=>{
    const perType={};
    document.querySelectorAll('.type-size-input').forEach(ta=>{
      const t=ta.dataset.type,k=ta.dataset.kind;
      if(!perType[t])perType[t]={packageSizes:[],cartonSizes:[]};
      const lines=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
      if(k==='package')perType[t].packageSizes=lines; else perType[t].cartonSizes=lines;
    });
    const dateTypes=byId('opt-dateTypes').value.split('\n').map(s=>s.trim()).filter(Boolean);
    await mutateConfig(cfg=>({...cfg,fieldOptions:{dateTypes,perType}}),'تم حفظ القوائم');
  });

  const aeBtn=byId('btn-add-emp');
  if(aeBtn)aeBtn.addEventListener('click',()=>openEmployeeModal(null));
  document.querySelectorAll('.btn-edit-emp').forEach(b=>b.addEventListener('click',()=>{ const e=(state.config.employees||[]).find(x=>x.id===b.dataset.id); if(e)openEmployeeModal(e); }));
  document.querySelectorAll('.btn-delete-emp').forEach(b=>b.addEventListener('click',()=>{
    const e=(state.config.employees||[]).find(x=>x.id===b.dataset.id); if(!e)return;
    showConfirm(`هل تريد حذف حساب "${e.name}"؟`,async()=>mutateConfig(cfg=>({...cfg,employees:(cfg.employees||[]).filter(x=>x.id!==e.id)}),'تم حذف الموظف'));
  }));

  const spBtn=byId('btn-save-pin');
  if(spBtn)spBtn.addEventListener('click',async()=>{
    const v=byId('new-admin-pin').value.trim();
    if(!v){toast('اكتب رمز جديد أولًا','error');return;}
    await mutateConfig(cfg=>({...cfg,adminPin:v}),'تم تغيير الرمز');
  });

  const liBtn=byId('logo-file-input');
  if(liBtn)liBtn.addEventListener('change',()=>{
    const file=liBtn.files[0]; if(!file)return;
    const r=new FileReader();
    r.onload=()=>{ state.pendingLogoDataUrl=r.result; toast('تم اختيار الشعار — اضغط حفظ للتأكيد'); };
    r.readAsDataURL(file);
  });
  const sfBtn=byId('btn-save-factory');
  if(sfBtn)sfBtn.addEventListener('click',async()=>{
    const extra=state.pendingLogoDataUrl?{logoDataUrl:state.pendingLogoDataUrl}:{};
    await mutateConfig(cfg=>({...cfg,factoryName:byId('factory-name-input').value.trim(),...extra}),'تم حفظ بيانات المصنع');
    state.pendingLogoDataUrl=null;
  });
  const rlBtn=byId('btn-remove-logo');
  if(rlBtn)rlBtn.addEventListener('click',async()=>mutateConfig(cfg=>({...cfg,logoDataUrl:''}),'تم إزالة الشعار'));

  const ebBtn=byId('btn-export-backup');
  if(ebBtn)ebBtn.addEventListener('click',exportBackupCSV);
}

/* ============== login ============== */
function renderLoginGate(){
  const cfg=currentConfig(); const emps=cfg.employees||[];
  byId('login-root').innerHTML=`
  <div class="login-wrap"><div class="login-card">
    ${brandMarkHtml(70,'brand-mark-lg')}
    <h2 style="margin:14px 0 0;">${escapeHtml(cfg.factoryName||'مصنع تمور مزرعة الرفايع')}</h2>
    <div class="page-desc">تسجيل الدخول لمتابعة الطلبات</div>
    <div class="login-tabs">
      <button class="login-tab ${state.loginTab==='employee'?'active':''}" id="tab-employee">موظف</button>
      <button class="login-tab ${state.loginTab==='admin'?'active':''}" id="tab-admin">مسؤول</button>
    </div>
    ${state.loginTab==='admin'?`
      <div class="field"><label>رمز دخول المسؤول</label><input type="password" id="admin-pin-input" placeholder="••••" autofocus></div>
      <button class="btn btn-primary" id="btn-admin-login" style="width:100%;">دخول</button>
    `:`
      ${emps.length===0?`<div class="hint" style="margin:10px 0;">لا يوجد موظفون بعد. سجّل دخولك كمسؤول وأضفهم من الإعدادات.</div>`:`
        <div class="field"><label>الاسم</label>
          <select id="emp-select">${emps.map(e=>`<option value="${e.id}">${escapeHtml(e.name)}</option>`).join('')}</select>
        </div>
        <div class="field"><label>الرمز السري</label><input type="password" id="emp-pin-input" placeholder="••••" autofocus></div>
        <button class="btn btn-primary" id="btn-emp-login" style="width:100%;">دخول</button>
      `}
    `}
    <div class="login-note">الجلسة تنتهي عند إغلاق الصفحة.</div>
    <div class="login-credit">
      <span>تم بواسطة: مصطفى أمين - 0507993971</span>
      <a href="https://wa.me/966507993971" target="_blank" rel="noopener" class="login-credit-wa" title="تواصل عبر واتساب">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="#25D366"><path d="M17.6 6.32A8.86 8.86 0 0 0 12.02 3.5c-4.9 0-8.87 3.97-8.87 8.87 0 1.56.4 3.05 1.17 4.36L3 20.9l4.32-1.28a8.83 8.83 0 0 0 4.7 1.35h.01c4.9 0 8.87-3.97 8.87-8.87a8.8 8.8 0 0 0-2.3-6.28zm-5.58 13.6h-.01a7.38 7.38 0 0 1-3.76-1.03l-.27-.16-2.79.83.82-2.72-.18-.28a7.35 7.35 0 0 1-1.14-3.95 7.4 7.4 0 0 1 7.41-7.4 7.34 7.34 0 0 1 5.24 2.18 7.35 7.35 0 0 1 2.16 5.23c0 4.09-3.33 7.4-7.48 7.3z"/></svg>
      </a>
    </div>
  </div></div>`;

  byId('tab-employee').addEventListener('click',()=>{ state.loginTab='employee'; renderLoginGate(); });
  byId('tab-admin').addEventListener('click',()=>{ state.loginTab='admin'; renderLoginGate(); });

  const adminBtn=byId('btn-admin-login');
  const adminInput=byId('admin-pin-input');
  if(adminBtn)adminBtn.addEventListener('click',async()=>{
    const val=adminInput.value.trim();
    const fresh=(await loadConfig())||defaultConfig(); state.config=fresh;
    if(val&&val===fresh.adminPin)enterApp({role:'admin',id:'admin'});
    else toast('رمز الدخول غير صحيح','error');
  });
  if(adminInput)adminInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();byId('btn-admin-login').click();} });

  const empBtn=byId('btn-emp-login');
  const empInput=byId('emp-pin-input');
  if(empBtn)empBtn.addEventListener('click',async()=>{
    const empId=byId('emp-select').value;
    const pinVal=empInput.value.trim();
    const fresh=(await loadConfig())||defaultConfig(); state.config=fresh;
    const emp=(fresh.employees||[]).find(e=>e.id===empId);
    if(emp&&pinVal&&pinVal===emp.pin)enterApp({role:'employee',id:emp.id,name:emp.name,allowedViews:emp.allowedViews});
    else toast('الاسم أو الرمز غير صحيح','error');
  });
  if(empInput)empInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();byId('btn-emp-login').click();} });
}

async function enterApp(user){
  state.currentUser=user;
  state.previousLogin=await getLastLogin();
  await setLastLogin();
  const visible=visibleNavItems();
  state.view=visible.length?visible[0].key:null;
  byId('login-root').innerHTML='';
  byId('login-root').style.display='none';
  byId('app').style.display='';
  render();
}

/* ============== boot ============== */
async function boot(){
  byId('login-root').innerHTML=`<div class="login-wrap"><div class="loading-row">جاري التحميل…</div></div>`;
  state.config=(await loadConfig())||defaultConfig();
  state.orders=await loadAllOrders();
  state.serviceOrders=await loadServiceOrders();
  state.auditLog=await loadAuditLog();
  state.customerNotes=await loadCustomerNotes();
  state.loaded=true; state.lastSync=nowTimeStr();
  renderLoginGate();
  setInterval(async()=>{
    if(!state.currentUser)return;
    await pollRefresh();
    state.serviceOrders=await loadServiceOrders();
    if(!state.modalOpen){ const fc=await loadConfig(); if(fc)state.config=fc; }
  },90000);
}
boot();
</script>
</body>
</html>
