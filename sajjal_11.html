async function importOrdersFromExcel(file){
  if(!window.XLSX){ toast('تعذّر تحميل مكتبة Excel — تأكد من الاتصال بالإنترنت','error'); return; }
  toast('جارٍ قراءة الملف…');
  try{
    const buf=await file.arrayBuffer();
    const wb=XLSX.read(buf,{type:'array',cellDates:true});
    const sheetName=wb.SheetNames[0];
    const ws=wb.Sheets[sheetName];
    const rows=XLSX.utils.sheet_to_json(ws,{defval:''});
    if(!rows.length){ toast('الملف فارغ أو بدون بيانات صالحة','error'); return; }
    await fullRefresh();

    const norm=s=>String(s||'').replace(/\(.*?\)/g,'').trim();
    const getVal=(row,...names)=>{
      for(const key of Object.keys(row)){
        const nk=norm(key);
        if(names.some(n=>nk.includes(n)))return row[key];
      }
      return '';
    };

    const valid=[],errors=[];
    const seqCounters={};
    rows.forEach((row,i)=>{
      const rowNum=i+2;
      const dateRaw=getVal(row,'التاريخ');
      let dateVal='';
      if(dateRaw instanceof Date&&!isNaN(dateRaw)){
        dateVal=`${dateRaw.getFullYear()}-${String(dateRaw.getMonth()+1).padStart(2,'0')}-${String(dateRaw.getDate()).padStart(2,'0')}`;
      }else if(typeof dateRaw==='number'&&window.XLSX&&XLSX.SSF){
        const d=XLSX.SSF.parse_date_code(dateRaw);
        if(d)dateVal=`${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;
      }else if(typeof dateRaw==='string'&&dateRaw.trim()){
        const s=dateRaw.trim();
        const m1=/^(\d{4})-(\d{1,2})-(\d{1,2})$/.exec(s);
        const m2=/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/.exec(s);
        if(m1)dateVal=`${m1[1]}-${m1[2].padStart(2,'0')}-${m1[3].padStart(2,'0')}`;
        else if(m2)dateVal=`${m2[3]}-${m2[2].padStart(2,'0')}-${m2[1].padStart(2,'0')}`;
      }
      const processingType=String(getVal(row,'نوع التصنيع')||'').trim();
      let receiptNo=String(getVal(row,'رقم السند')||'').trim();
      const customerName=String(getVal(row,'اسم العميل')||'').trim();
      let mobile=String(getVal(row,'رقم الجوال','الجوال')||'').trim().replace(/\D/g,'');
      if(mobile&&mobile.length<10)mobile=mobile.padStart(10,'0');
      const qtyCartons=String(getVal(row,'الكمية المستلمة','كراتين')||'').trim();
      const dateTypeRaw=String(getVal(row,'نوع التمر')||'').trim();
      const dateTypes=dateTypeRaw?dateTypeRaw.split(/[,،]/).map(s=>s.trim()).filter(Boolean):[];
      const packageSize=String(getVal(row,'حجم العبوة')||'').trim();
      const cartonSize=String(getVal(row,'حجم الكرتون')||'').trim();
      const urgentRaw=String(getVal(row,'مستعجل')||'').trim();
      const urgent=/^(نعم|yes|true|1)$/i.test(urgentRaw);
      const processingNotes=String(getVal(row,'ملاحظات')||'').trim();

      if(!dateVal&&!processingType&&!customerName&&!mobile&&!qtyCartons&&!dateTypes.length&&!packageSize&&!cartonSize)return;

      const rowErrors=[];
      if(!dateVal)rowErrors.push('تاريخ غير صالح');
      if(!PROCESSING_TYPES.includes(processingType))rowErrors.push('نوع التصنيع غير صحيح');
      if(!customerName)rowErrors.push('اسم العميل مطلوب');
      if(!mobile||!/^\d{10}$/.test(mobile))rowErrors.push('رقم الجوال يجب أن يكون 10 أرقام');
      if(!qtyCartons)rowErrors.push('الكمية المستلمة مطلوبة');
      if(!dateTypes.length)rowErrors.push('نوع التمر مطلوب');
      if(!packageSize)rowErrors.push('حجم العبوة مطلوب');
      if(!cartonSize)rowErrors.push('حجم الكرتون مطلوب');
      if(rowErrors.length){ errors.push(`صف ${rowNum}: ${rowErrors.join('، ')}`); return; }

      if(!receiptNo){
        const prefix=RECEIPT_PREFIX[processingType]||'';
        if(seqCounters[prefix]===undefined){
          const nums=state.orders.filter(o=>!prefix||(o.receiptNo||'').startsWith(prefix))
            .map(o=>{ const m=(o.receiptNo||'').match(/(\d+)\s*$/); return m?parseInt(m[1],10):0; });
          seqCounters[prefix]=nums.length?Math.max(...nums):0;
        }
        seqCounters[prefix]+=1;
        receiptNo=prefix+String(seqCounters[prefix]).padStart(4,'0');
      }else{
        const dup=state.orders.some(o=>o.receiptNo===receiptNo)||valid.some(v=>v.receiptNo===receiptNo);
        if(dup){ errors.push(`صف ${rowNum}: رقم السند "${receiptNo}" مستخدم بالفعل`); return; }
      }

      valid.push({
        date:dateVal,receiptNo,customerName,mobile,
        dateTypes,dateType:dateTypes.length===1?dateTypes[0]:dateTypes.join('،'),
        qtyCartons,processingType,status:'جديد',
        packageSize,cartonSize,urgent,processingNotes,vacuumServices:[],
        dateCondition:{good:false,hasNotes:false,detail:''},
      });
    });

    if(!valid.length){
      toast('لم يتم استيراد أي صف — راجع الملاحظات','error',5000);
      if(errors.length)showImportErrorsModal(errors);
      return;
    }

    const now=Date.now();
    const byMonth={};
    valid.forEach((payload,idx2)=>{
      const monthKey=(payload.date||todayIso()).slice(0,7);
      const newOrder={id:genId(),createdAt:now+idx2,monthKey,createdBy:currentUserName(),lastEditedBy:currentUserName(),lastEditedAt:nowIso(),...payload};
      (byMonth[monthKey]=byMonth[monthKey]||[]).push(newOrder);
    });
    let idx=state.monthIndex.length?state.monthIndex:await loadIndex();
    const newMonths=Object.keys(byMonth).filter(m=>!idx.includes(m));
    if(newMonths.length){ idx=[...idx,...newMonths].sort(); await saveIndex(idx); state.monthIndex=idx; }
    let savedOrders=[];
    for(const monthKey of Object.keys(byMonth)){
      const fresh=await loadMonth(monthKey);
      const merged=[...fresh,...byMonth[monthKey]];
      const ok=await saveMonth(monthKey,merged);
      if(ok)savedOrders=savedOrders.concat(byMonth[monthKey]);
      else errors.push(`تعذّر حفظ بيانات شهر ${monthKey}`);
    }
    if(savedOrders.length){
      state.orders=[...state.orders,...savedOrders];
      addAudit(`استيراد ${savedOrders.length} طلب من ملف Excel`);
      render();
    }
    if(savedOrders.length&&!errors.length){
      toast(`✅ تم استيراد ${savedOrders.length} طلب بنجاح`,'ok',4000);
    }else if(savedOrders.length&&errors.length){
      toast(`تم استيراد ${savedOrders.length} طلب، وتعذّر استيراد ${errors.length} صف`,'error',5000);
      showImportErrorsModal(errors);
    }else{
      toast('تعذّر استيراد أي بيانات','error');
      showImportErrorsModal(errors);
    }
  }catch(e){
    console.error(e);
    toast('تعذّر قراءة ملف Excel — تأكد من صيغة الملف','error');
  }
}

/* ============== حساب سعر تلقائي من قوائم الأسعار المعتمدة (بدون تدخّل يدوي) — نفس منطق حاسبة الأسعار بالظبط،
   يُستخدم لما محدش يكون عمل حساب يدوي وحفظه للسند ده، فيتحسب تلقائيًا من الجدول لو الحجم متطابق ولو الطلب اتصنّع بالفعل ============== */
function numOnlyStr(s){ const m=String(s||'').match(/[\d.]+/); return m?m[0]:''; }
function tokenizeSizeStr(s){ return String(s||'').split(/[\s\-–—]+/).filter(Boolean).sort().join('|'); }
/* بيستخرج وزن العبوة الواحدة بالكيلو من نص حجم الحبة (مثلاً "عبوة - 390 غ" → 0.39، "سطل - 1.5 ك" → 1.5) */
function parsePackageWeightKg(sizeStr){
  const m=String(sizeStr||'').match(/([\d.]+)\s*(غ|جم|جرام|ك|كجم|kg|g)\b/i);
  if(!m)return null;
  const num=parseFloat(m[1]);
  if(isNaN(num))return null;
  const unit=m[2].toLowerCase();
  return (unit==='غ'||unit==='جم'||unit==='جرام'||unit==='g')?num/1000:num;
}
function matchWeightRowIn(table,pieceSize,cartonSize){
  const psTok=tokenizeSizeStr(pieceSize);
  const csNum=numOnlyStr(cartonSize);
  let match=table.find(r=>tokenizeSizeStr(r.size)===psTok&&String(r.weight)===csNum);
  if(match)return match;
  if(csNum){
    match=table.find(r=>!tokenizeSizeStr(r.size)&&String(r.weight)===csNum);
    if(match)return match;
  }
  /* لو حجم الكرتون اتكتب "عدد الحبات" بدل وزن الكرتون (مثلاً "12 حبة" بدل "4.68 كجم")، نحسب الوزن الضمني
     من (وزن العبوة الواحدة × العدد) ونطابقه مع الجدول */
  const pkgWeightKg=parsePackageWeightKg(pieceSize);
  if(pkgWeightKg&&csNum){
    const impliedWeight=Math.round(pkgWeightKg*Number(csNum)*100)/100;
    match=table.find(r=>tokenizeSizeStr(r.size)===psTok&&Math.abs(Number(r.weight)-impliedWeight)<0.01);
    if(match)return match;
  }
  return null;
}
function computeOrderPricingAuto(o){
  if(!o||!(o.qtyMfg||'').toString().trim())return null;
  const isDibs=o.processingType==='دبس';
  const isDough=o.processingType==='عجينة';
  const isVacuum=o.processingType==='فاكيوم';
  if(!isDibs&&!isDough&&!isVacuum)return null;
  const table=isDibs?getDibsWeightTable():isDough?getDoughWeightTable():getVacuumWeightTable();
  const match=matchWeightRowIn(table,o.packageSize,o.cartonSize);
  if(!match)return null;
  const qtyMfg=Number(o.qtyMfg)||0;
  const priceNoTax=isDibs?Number(match.pricePerKilo):Number(match.priceCarton);
  if(!priceNoTax)return null;
  const priceWithTax=priceNoTax*1.15;
  const cartonWeight=isDibs?Number(match.weight):'';
  const totalWeightKg=isDibs?qtyMfg*cartonWeight:'';
  const total=isDibs?(totalWeightKg*priceWithTax):(qtyMfg*priceWithTax);
  const finalTotal=total>0?Math.max(total,100):0;
  return {priceNoTax,priceWithTax:Number(priceWithTax.toFixed(2)),total:Number(finalTotal.toFixed(2)),auto:true};
}
function findReceiptPricingFor(o){
  const map=state.receiptPricing||{};
  const norm=s=>(s||'').toString().replace(/\s+/g,'').toLowerCase();
  const rn=(o.receiptNo||'').toString().trim();
  if(!rn)return null;
  if(map[rn])return map[rn];
  const target=norm(rn);
  const key=Object.keys(map).find(k=>norm(k)===target);
  return key?map[key]:null;
}
/* يفصل رقم السند لحروف البادئة (كحلي) والأرقام (أحمر) لعرضه بشكل بارز للعميل */
function splitReceiptParts(rn){
  const s=(rn||'').toString();
  const m=s.match(/^([^\d]*)(\d.*)$/);
  return m?{prefix:m[1],num:m[2]}:{prefix:'',num:s};
}

/* يشيل الأصفار الزيادة بعد الفاصلة (الهللات) لو السعر رقم صحيح، ويضيف فواصل الآلاف */
function formatPriceDisplay(n){
  const num=Number(n)||0;
  const rounded=Math.round(num*100)/100;
  let numStr;
  if(Math.abs(rounded-Math.round(rounded))<0.001){ numStr=Math.round(rounded).toString(); }
  else{ numStr=rounded.toFixed(2).replace(/0$/,'').replace(/\.$/,''); }
  const parts=numStr.split('.');
  parts[0]=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,',');
  return parts.join('.');
}

  const err=errorMsg!==undefined?errorMsg:state.trackLastError;

        ${err?`<div class="track-error">⚠️ ${escapeHtml(err)}</div>`:''}
        <div class="track-refresh-note">${tt('refreshNote')} <button type="button" id="btn-track-refresh" class="track-refresh-icon" title="Refresh">🔄</button></div>
      </div>

  const btn=byId('btn-track-search');
  if(btn)btn.addEventListener('click',handleTrackSearch);

  if(ri)ri.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); byId('track-mobile-input').focus(); } });
  const mi=byId('track-mobile-input');
  if(mi){
    mi.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); handleTrackSearch(); } });
    mi.addEventListener('input',()=>{
      const digits=mi.value.replace(/[^0-9]/g,'');
      const hint=byId('track-mobile-hint');
      if(!hint)return;
      if(digits.length>0&&digits.length!==10)hint.innerHTML=tt('mobileHint');
      else hint.innerHTML='';
    });
  }
  const refreshBtn=byId('btn-track-refresh');
  if(refreshBtn)refreshBtn.addEventListener('click',()=>{ window.location.href=window.location.pathname+window.location.search; });
  const langBtn=byId('btn-track-lang');
  const langMenu=byId('track-lang-menu');
  if(langBtn&&langMenu){
    langBtn.addEventListener('click',e=>{ e.stopPropagation(); langMenu.style.display=langMenu.style.display==='none'?'flex':'none'; });
    document.querySelectorAll('.track-lang-opt').forEach(opt=>opt.addEventListener('click',()=>{
      state.trackLang=opt.dataset.lang;
      renderTrackPage(state.trackLastResult,state.trackLastError);
    }));
    document.addEventListener('click',()=>{ if(langMenu)langMenu.style.display='none'; });
  }
}
function handleTrackSearch(){
  const receipt=(byId('track-receipt-input').value||'').trim().toLowerCase();
  const mobileRaw=(byId('track-mobile-input').value||'').trim();
  if(!receipt||!mobileRaw){ renderTrackPage(null,tt('errEmpty')); return; }
  const mobileNorm=formatWhatsAppNumber(mobileRaw);
  const match=state.orders.find(o=>
    (o.receiptNo||'').toString().trim().toLowerCase()===receipt&&
    formatWhatsAppNumber(o.mobile||'')===mobileNorm
  );
  if(!match){ renderTrackPage(null,tt('errNoMatch')); return; }
  renderTrackPage(match,null);
}

  ensureCoreDataLoaded();
}

/* زر الصعود لأعلى — يظهر عند النزول لأسفل، وبيرجّع فوق بسلاسة */
(function(){
  const btn=document.getElementById('btn-scroll-top');
  if(!btn)return;
  window.addEventListener('scroll',()=>{
    if(window.scrollY>300)btn.classList.add('show'); else btn.classList.remove('show');
  },{passive:true});
  btn.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
})();
/* مراقبة حالة الاتصال بالإنترنت — تُظهر بانر تحذير واضح فوق كل الصفحات عند انقطاع النت،
   وتُخفيه فورًا مع إشعار عند رجوع الاتصال. تُستدعى أيضًا من داخل render() عشان الكلاس
   ميتمسحش مع إعادة رسم الصفحة — لذلك بنتتبّع الحالة السابقة بمتغيّر منفصل، مش من الـ DOM. */
let _wasOffline=false;
function updateOnlineStatus(){
  const isOffline=!navigator.onLine;
  document.body.classList.toggle('offline-active',isOffline);
  if(_wasOffline&&!isOffline)toast('✅ تم استعادة الاتصال بالإنترنت');
  _wasOffline=isOffline;
}
window.addEventListener('online',updateOnlineStatus);
window.addEventListener('offline',updateOnlineStatus);
updateOnlineStatus();
/* ============== كشف تحديث جديد للنظام ============== */
/* بما إن التطبيق مستضاف كملف واحد على GitHub Pages، بنتحقق دوريًا من النسخة المنشورة فعليًا على السيرفر
   ولو لقينا رقم نسخة مختلف عن اللي شغال حاليًا في المتصفح، نظهر بانر تحديث فوق كل الصفحات */
let _updateAvailable=false;
async function checkForAppUpdate(){
  try{
    const res=await fetch(window.location.pathname+'?_v='+Date.now(),{cache:'no-store'});
    if(!res.ok)return;
    const html=await res.text();
    const m=html.match(/APP_VERSION\s*=\s*'([^']+)'/);
    if(m&&m[1]&&m[1]!==APP_VERSION){
      if(!_updateAvailable){ _updateAvailable=true; render(); }
    }
  }catch(e){ /* تجاهل أخطاء الشبكة أثناء الفحص — هنحاول تاني في المرة الجاية */ }
}
function updateBannerHtml(){
  if(!_updateAvailable)return'';
  return `<div class="app-update-banner" id="app-update-banner">
    🔄 يوجد تحديث جديد للنظام — <button type="button" id="btn-app-update-reload">اضغط هنا للتحميل</button>
  </div>`;
}
function historyLoadingBannerHtml(){
  if(state.allHistoryLoaded===false||state.allServiceHistoryLoaded===false){
    return `<div class="app-update-banner" id="app-history-banner" style="background:#B5651D;">
    🔄 جارٍ تحميل الأرشيف الكامل في الخلفية بسبب البحث… البيانات الحديثة (آخر ${FAST_BOOT_MONTHS===1?'شهر':FAST_BOOT_MONTHS+' شهور'}) شغالة دلوقتي، والبحث في السجل القديم هيبقى متاح خلال ثواني
  </div>`;
  }
  return'';
}
setTimeout(checkForAppUpdate,4000);
setInterval(checkForAppUpdate,5*60*1000);
document.addEventListener('visibilitychange',()=>{ if(!document.hidden)checkForAppUpdate(); });
/* تسجيل Service Worker — لتفعيل التثبيت كتطبيق (PWA) */
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
/* اختصارات لوحة المفاتيح: F2 لفتح شاشة "تسجيل طلب جديد"، / أو Ctrl+K للبحث الفوري، ؟ لعرض قائمة الاختصارات، ESC لإغلاق أي نافذة (مودال) مفتوحة */
document.addEventListener('keydown',(e)=>{
  const typingInField=['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)||e.target.isContentEditable;
  if(e.key==='F2'){
    if(state.modalOpen||!state.currentUser||!canAddOrders())return;
    e.preventDefault();
    openOrderModal();
  }else if(!typingInField&&(e.key==='/'||((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='k'))){
    if(state.modalOpen||!state.currentUser)return;
    e.preventDefault();
    if(state.view!=='search'){ state.view='search'; render(); }
    const si=byId('search-input');
    if(si){ si.focus(); si.select(); }
  }else if(!typingInField&&e.key==='?'){
    if(state.modalOpen||!state.currentUser)return;
    e.preventDefault();
    openShortcutsModal();
  }else if(e.key==='Escape'){
    if(document.getElementById('col-filter-dropdown')){ closeColumnFilterDropdown(); return; }
    if(!state.modalOpen)return;
    e.preventDefault();
    byId('modal-root').innerHTML='';
    state.modalOpen=false;
  }
});
document.addEventListener('click',()=>{ closeColumnFilterDropdown(); });
if(new URLSearchParams(window.location.search).get('track')==='1'){ bootTrackPage(); } else { boot(); }
</script>
